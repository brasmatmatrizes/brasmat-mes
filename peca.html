<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRASMAT MES — Buscar Peça</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0F1117;--bg2:#181C27;--bg3:#1F2433;--border:#2A3045;--border2:#3A4560;--text:#E8ECF5;--text2:#A8B2C8;--text3:#6E7A92;--accent:#3B7FFF;--ok:#2DBF7E;--warn:#F5A623;--danger:#F04545;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans)}
.topbar{height:56px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;gap:12px}
.brand{display:flex;align-items:center;gap:10px}.bm{width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:500;color:#fff}
.bn{font-size:14px;font-weight:600;letter-spacing:0.04em}.bs{font-size:11px;color:var(--text3);font-family:var(--mono)}
.nav{display:flex;gap:4px}
.nb{font-size:12px;padding:6px 12px;border-radius:6px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-family:var(--sans);transition:all 0.15s;white-space:nowrap}
.nb:hover{background:var(--bg3);color:var(--text)}.nb.active{background:var(--accent);color:#fff}
.tr-right{display:flex;align-items:center;gap:8px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--ok);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.sync-lbl{font-size:11px;color:var(--text3);font-family:var(--mono)}
.shell{display:grid;grid-template-columns:340px 1fr;height:calc(100vh - 56px)}
.left{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.search-sec{padding:20px 20px 16px;border-bottom:1px solid var(--border)}
.stitle{font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px}
.sdesc{font-size:12px;color:var(--text3);margin-bottom:14px;line-height:1.5}
.si-wrap{position:relative;margin-bottom:8px}
.si-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:11px 14px 11px 38px;font-size:14px;color:var(--text);font-family:var(--mono);outline:none;transition:border-color 0.15s}
.si-input:focus{border-color:var(--accent)}.si-input::placeholder{color:var(--text3);font-family:var(--sans);font-size:13px}
.si-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px;pointer-events:none}
.shint{font-size:11px;color:var(--text3);font-family:var(--mono)}
.res-sec{flex:1;overflow-y:auto;padding:10px}
.res-lbl{font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);font-family:var(--mono);padding:4px 8px 8px}
.ri{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;border:1px solid transparent;margin-bottom:3px}
.ri:hover{background:var(--bg3)}.ri.sel{background:var(--bg3);border-color:var(--accent)}
.ri-stripe{width:3px;height:34px;border-radius:2px;flex-shrink:0}
.ri-info{flex:1;min-width:0}
.ri1{font-size:13px;font-weight:700;color:var(--text);font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ri2{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:1px}
.ri3{font-size:11px;color:var(--text2);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ri-badge{font-size:10px;font-family:var(--mono);padding:2px 7px;border-radius:8px;flex-shrink:0;text-align:right}
.right{overflow-y:auto;background:var(--bg)}
.placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text3);gap:12px}
.ph-ico{font-size:48px;opacity:0.3}.ph-txt{font-size:14px;text-align:center;line-height:1.6;max-width:280px}
.loading{display:flex;align-items:center;justify-content:center;height:200px;color:var(--text3);font-family:var(--mono);font-size:12px;gap:10px}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* shared detalhe styles */
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.mb{background:var(--bg3);border-radius:8px;padding:10px 12px}.ml{font-size:10px;color:var(--text3);font-family:var(--mono);margin-bottom:3px;text-transform:uppercase;letter-spacing:0.07em}.mv{font-size:13px;font-weight:500;color:var(--text)}
.pos-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:12px}
.tl-lbl{font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);font-family:var(--mono);margin-bottom:12px}
.timeline{list-style:none;position:relative;padding-left:28px}
.timeline::before{content:"";position:absolute;left:9px;top:0;bottom:0;width:1px;background:var(--border)}
.tl-item{position:relative;margin-bottom:12px}.tl-item:last-child{margin-bottom:0}
.tl-dot{position:absolute;left:-28px;top:4px;width:13px;height:13px;border-radius:50%;border:2px solid var(--bg)}
.tl-dot.entrada{background:var(--accent)}.tl-dot.saida{background:var(--ok)}.tl-dot.atual{background:var(--warn);box-shadow:0 0 0 3px rgba(245,166,35,0.2)}
.tl-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.tl-card.atual{border-color:rgba(245,166,35,0.4)}
.tl-top{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:5px}
.tl-proc{font-size:12px;font-weight:500;color:var(--text)}
.tl-evt{font-size:10px;padding:1px 7px;border-radius:8px}
.ent{background:rgba(59,127,255,0.12);color:var(--accent)}.sai{background:rgba(45,191,126,0.1);color:var(--ok)}
.tl-tag{font-size:10px;padding:1px 7px;border-radius:8px;background:rgba(245,166,35,0.12);color:var(--warn)}
.tl-ret{font-size:10px;padding:1px 7px;border-radius:8px;background:rgba(240,69,69,0.12);color:var(--danger)}
.tl-sub{font-size:11px;color:var(--text2);margin-bottom:6px}
.tl-foot{display:flex;gap:12px;flex-wrap:wrap}.tl-m{font-size:11px;color:var(--text3);font-family:var(--mono)}
.tl-obs{margin-top:6px;font-size:11px;color:var(--text3);border-top:1px solid var(--border);padding-top:6px;line-height:1.5}
</style>
</head>
<body>
<div style="display:grid;grid-template-rows:56px 1fr;height:100vh">
<div class="topbar">
  <div class="brand"><div class="bm">BM</div><div><div class="bn">BRASMAT MES</div><div class="bs">sistema de execução de manufatura</div></div></div>
  <div class="nav">
    <button class="nb" onclick="navTo('index.html')">Posição</button>
    <button class="nb" onclick="navTo('kanban.html')">Kanban</button>
    <button class="nb active">Buscar peça</button>
    <button class="nb" onclick="navTo('paradas.html')">Peças paradas</button>
  </div>
  <div class="tr-right">
    <div class="sync-dot"></div>
    <span class="sync-lbl" id="slbl">carregando...</span>
  </div>
</div>
<div class="shell">
  <div class="left">
    <div class="search-sec">
      <div class="stitle">Localizar peça</div>
      <div class="sdesc">Busque pelo código da peça ou número do pedido.</div>
      <div class="si-wrap"><span class="si-ico">⌕</span><input class="si-input" id="search" placeholder="Código ou pedido..." autocomplete="off"></div>
      <div class="shint" id="shint">aguardando dados...</div>
    </div>
    <div class="res-sec" id="res-sec">
      <div style="text-align:center;padding:40px 16px;color:var(--text3);font-size:13px"><div style="font-size:32px;margin-bottom:10px">🔍</div>Digite ao menos 2 caracteres.</div>
    </div>
  </div>
  <div class="right" id="right">
    <div class="placeholder"><div class="ph-ico">📋</div><div class="ph-txt">Selecione uma peça para ver o histórico completo.</div></div>
  </div>
</div>
</div>
<script src="status.js"></script>
<script>
let POS=[];
let sel=null;

async function init(){
  POS=await buscarPosicao();
  document.getElementById("slbl").textContent=`${POS.length} peças carregadas`;
  document.getElementById("shint").textContent=`${POS.length} peças disponíveis`;
}

document.getElementById("search").addEventListener("input",function(){
  const q=this.value.trim().toUpperCase();
  const sec=document.getElementById("res-sec");
  if(q.length<2){
    sec.innerHTML=`<div style="text-align:center;padding:40px 16px;color:var(--text3);font-size:13px"><div style="font-size:32px;margin-bottom:10px">🔍</div>Digite ao menos 2 caracteres.</div>`;
    return;
  }
  const found=POS.filter(r=>String(r.codigo_peca||"").toUpperCase().includes(q)||String(r.pedido||"").toUpperCase().includes(q))
    .sort((a,b)=>{
      const ca=String(a.codigo_peca||"").toUpperCase();
      const cb=String(b.codigo_peca||"").toUpperCase();
      if(ca.startsWith(q)&&!cb.startsWith(q)) return -1;
      if(!ca.startsWith(q)&&cb.startsWith(q)) return 1;
      return 0;
    }).slice(0,40);
  if(!found.length){sec.innerHTML=`<div style="text-align:center;padding:40px 16px;color:var(--text3);font-size:13px"><div style="font-size:32px;margin-bottom:10px">😕</div>Nenhuma peça encontrada.</div>`;return;}
  const lbl=`<div class="res-lbl">${found.length} resultado(s)</div>`;
  const items=found.map(r=>{
    const st=status(r);const d=diasDesde(r);
    const isSel=sel&&sel.pedido===r.pedido&&sel.codigo===r.codigo_peca;
    return `<div class="ri${isSel?" sel":""}" onclick="selPeca('${esc(r.pedido)}','${esc(r.codigo_peca)}')">
      <div class="ri-stripe" style="background:${st.cor}"></div>
      <div class="ri-info">
        <div class="ri1">${r.codigo_peca||"—"}</div>
        <div class="ri2">Ped: ${r.pedido||"—"}</div>
        <div class="ri3">${r.cliente||""} ${r.operador?"· "+r.operador:""}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div class="ri-badge" style="background:${st.cor}22;color:${st.cor}">${st.ico} ${st.label}</div>
        ${st.s==="em_producao"?`<div style="font-size:10px;font-family:var(--mono);color:var(--text3);margin-top:4px">${diasStr(d)}</div>`:""}
      </div>
    </div>`;
  }).join("");
  sec.innerHTML=lbl+items;
});

async function selPeca(pedido,codigo){
  sel={pedido,codigo};
  document.getElementById("search").dispatchEvent(new Event("input"));
  const right=document.getElementById("right");
  right.innerHTML=`<div class="loading"><div class="spinner"></div>carregando histórico...</div>`;
  // Cria elementos temporários para o renderDetalhe
  const tmpTitle=document.createElement("div");
  const tmpBody=document.createElement("div");
  // Monta painel fake para capturar o resultado
  const fakePanel=document.createElement("div");
  fakePanel.id="__fp__";fakePanel.style.display="none";
  const fakeTitle=document.createElement("div");fakeTitle.id="__ft__";
  const fakeBody=document.createElement("div");fakeBody.id="__fb__";
  fakePanel.appendChild(fakeTitle);fakePanel.appendChild(fakeBody);
  document.body.appendChild(fakePanel);
  await abrirPainelDetalhe(pedido,codigo,"__fp__","__ft__","__fb__");
  right.innerHTML=`<div style="padding:20px 24px"><div style="margin-bottom:16px">${fakeTitle.innerHTML}</div>${fakeBody.innerHTML}</div>`;
  document.body.removeChild(fakePanel);
}

function navTo(p){window.location.href=p;}
init();
</script>
</body>
</html>
