<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRASMAT MES — Buscar Peça</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0F1117;--bg2:#181C27;--bg3:#1F2433;--bg4:#252A3A;--border:#2A3045;--border2:#3A4560;--text:#E8ECF5;--text2:#A8B2C8;--text3:#6E7A92;--accent:#3B7FFF;--ok:#2DBF7E;--warn:#F5A623;--danger:#F04545;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans)}
.topbar{height:56px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;gap:16px;flex-shrink:0}
.topbar-brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:500;color:#fff}
.brand-name{font-size:14px;font-weight:600;letter-spacing:0.04em}
.brand-sub{font-size:11px;color:var(--text3);font-family:var(--mono)}
.topbar-nav{display:flex;gap:4px}
.nav-btn{font-size:12px;padding:6px 14px;border-radius:6px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-family:var(--sans);transition:all 0.15s}
.nav-btn:hover{background:var(--bg3);color:var(--text)}
.nav-btn.active{background:var(--accent);color:#fff}
.topbar-right{display:flex;align-items:center;gap:8px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--ok);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.sync-label{font-size:11px;color:var(--text3);font-family:var(--mono)}
.shell{display:grid;grid-template-columns:360px 1fr;height:calc(100vh - 56px)}
.left{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.search-section{padding:20px 20px 16px;border-bottom:1px solid var(--border)}
.search-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px}
.search-desc{font-size:12px;color:var(--text3);margin-bottom:14px;line-height:1.5}
.search-wrap{position:relative;margin-bottom:8px}
.search-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:11px 14px 11px 40px;font-size:14px;color:var(--text);font-family:var(--mono);outline:none;transition:border-color 0.15s}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--text3);font-family:var(--sans);font-size:13px}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px;pointer-events:none}
.search-hint{font-size:11px;color:var(--text3);font-family:var(--mono)}
.results-section{flex:1;overflow-y:auto;padding:10px}
.results-label{font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);font-family:var(--mono);padding:4px 8px 8px}
.result-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;transition:background 0.12s;border:1px solid transparent;margin-bottom:3px}
.result-item:hover{background:var(--bg3)}
.result-item.selected{background:var(--bg3);border-color:var(--accent)}
.result-stripe{width:3px;height:34px;border-radius:2px;flex-shrink:0}
.result-info{flex:1;min-width:0}
.result-pedido{font-size:12px;font-weight:500;color:var(--text);font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.result-codigo{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:1px}
.result-meta{font-size:11px;color:var(--text2);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.result-badge{font-size:10px;font-family:var(--mono);padding:2px 7px;border-radius:8px;flex-shrink:0;text-align:right}
.empty-results{text-align:center;padding:40px 16px;color:var(--text3);font-size:13px;line-height:1.6}
.right{overflow-y:auto;background:var(--bg)}
.placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text3);gap:12px}
.placeholder-icon{font-size:48px;opacity:0.3}
.placeholder-text{font-size:14px;text-align:center;line-height:1.6;max-width:280px}
.detail{padding:24px 28px}
.detail-topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.detail-id{font-size:22px;font-weight:600;color:var(--text);font-family:var(--mono)}
.detail-codigo{font-size:14px;color:var(--text2);font-family:var(--mono);margin-top:2px}
.status-pill{font-size:12px;font-weight:500;padding:6px 14px;border-radius:20px;flex-shrink:0;border:1px solid transparent}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.metric{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.metric-val{font-size:22px;font-weight:600;font-family:var(--mono);line-height:1;margin-bottom:4px}
.metric-val.accent{color:var(--accent)}.metric-val.ok{color:var(--ok)}.metric-val.warn{color:var(--warn)}.metric-val.danger{color:var(--danger)}
.metric-label{font-size:11px;color:var(--text3)}
.pos-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:14px}
.pos-stripe{width:4px;height:44px;border-radius:2px;flex-shrink:0}
.pos-info{flex:1}
.pos-label{font-size:10px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:3px}
.pos-proc{font-size:15px;font-weight:600;color:var(--text)}
.pos-subop{font-size:12px;color:var(--text2);margin-top:2px}
.pos-right{text-align:right}
.pos-dias{font-size:18px;font-weight:600;font-family:var(--mono)}
.pos-dias-label{font-size:11px;color:var(--text3)}
.info-row{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:20px;display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.info-item-label{font-size:10px;color:var(--text3);font-family:var(--mono);margin-bottom:3px;text-transform:uppercase;letter-spacing:0.07em}
.info-item-val{font-size:13px;font-weight:500;color:var(--text)}
.section-title{font-size:11px;font-weight:500;letter-spacing:0.09em;text-transform:uppercase;color:var(--text3);font-family:var(--mono);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-title::after{content:"";flex:1;height:1px;background:var(--border)}
.timeline{list-style:none;position:relative;padding-left:30px;margin-bottom:20px}
.timeline::before{content:"";position:absolute;left:9px;top:6px;bottom:6px;width:1px;background:var(--border)}
.tl-item{position:relative;margin-bottom:12px}
.tl-item:last-child{margin-bottom:0}
.tl-dot{position:absolute;left:-30px;top:5px;width:13px;height:13px;border-radius:50%;border:2px solid var(--bg)}
.tl-dot.entrada{background:var(--accent)}.tl-dot.saida{background:var(--ok)}.tl-dot.atual{background:var(--warn);box-shadow:0 0 0 4px rgba(245,166,35,0.15)}
.tl-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.tl-card.atual{border-color:rgba(245,166,35,0.4)}
.tl-card.saida-op{opacity:0.7}
.tl-top{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:5px}
.tl-proc{font-size:12px;font-weight:500;color:var(--text)}
.tl-evt{font-size:10px;padding:2px 7px;border-radius:8px}
.evt-entrada{background:rgba(59,127,255,0.12);color:var(--accent)}
.evt-saida{background:rgba(45,191,126,0.1);color:var(--ok)}
.tl-atual-tag{font-size:10px;padding:2px 7px;border-radius:8px;background:rgba(245,166,35,0.12);color:var(--warn)}
.tl-ret-tag{font-size:10px;padding:2px 7px;border-radius:8px;background:rgba(240,69,69,0.12);color:var(--danger)}
.tl-sub{font-size:11px;color:var(--text2);margin-bottom:6px}
.tl-foot{display:flex;gap:14px;flex-wrap:wrap}
.tl-meta{font-size:11px;color:var(--text3);font-family:var(--mono)}
.tl-dur{font-size:11px;font-family:var(--mono);padding:2px 7px;border-radius:8px;background:var(--bg3);color:var(--text2)}
.tl-obs{margin-top:7px;font-size:11px;color:var(--text3);border-top:1px solid var(--border);padding-top:7px;line-height:1.5}
.irmaos-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:20px}
.irmao-item{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;cursor:pointer;transition:border-color 0.15s}
.irmao-item:hover{border-color:var(--accent)}
.irmao-item.atual{border-color:rgba(245,166,35,0.4)}
.loading{display:flex;align-items:center;justify-content:center;height:200px;color:var(--text3);font-family:var(--mono);font-size:12px;gap:10px}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div style="display:grid;grid-template-rows:56px 1fr;height:100vh">
<div class="topbar">
  <div class="topbar-brand">
    <div class="brand-mark">BM</div>
    <div><div class="brand-name">BRASMAT MES</div><div class="brand-sub">sistema de execução de manufatura</div></div>
  </div>
  <div class="topbar-nav">
    <button class="nav-btn" onclick="navTo('index.html')">Posição</button>
    <button class="nav-btn" onclick="navTo('kanban.html')">Kanban</button>
    <button class="nav-btn active">Buscar peça</button>
    <button class="nav-btn" onclick="navTo('paradas.html')">Peças paradas</button>
  </div>
  <div class="topbar-right">
    <div class="sync-dot"></div>
    <span class="sync-label" id="sync-label">carregando...</span>
  </div>
</div>
<div class="shell">
  <div class="left">
    <div class="search-section">
      <div class="search-title">Localizar peça</div>
      <div class="search-desc">Busque pelo número do pedido ou código da peça.</div>
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input class="search-input" id="search" placeholder="Digite pedido ou código..." autocomplete="off">
      </div>
      <div class="search-hint" id="search-hint">aguardando dados...</div>
    </div>
    <div class="results-section" id="results-section">
      <div class="empty-results"><div style="font-size:32px;margin-bottom:10px">🔍</div>Digite ao menos 2 caracteres para buscar.</div>
    </div>
  </div>
  <div class="right" id="right-panel">
    <div class="placeholder">
      <div class="placeholder-icon">📋</div>
      <div class="placeholder-text">Selecione uma peça para ver o histórico completo.</div>
    </div>
  </div>
</div>
</div>

<script src="status.js"></script>
<script>
const SUPABASE_URL="https://hjvlznijsgdwurtsyukl.supabase.co";
const SUPABASE_KEY="sb_publishable_3N0kbWDpJ542n_aWeFzUqQ_pmVGrFiB";
let TODOS=[];
let pecaSel=null;

async function fetchSupabase(path){
  const r=await fetch(SUPABASE_URL+path,{headers:{apikey:SUPABASE_KEY,Authorization:"Bearer "+SUPABASE_KEY}});
  return r.json();
}

async function carregarDados(force){
  document.getElementById("sync-label").textContent="carregando...";
  TODOS = await carregarEventos(false);
  document.getElementById("sync-label").textContent=`${todos.length} eventos · ${new Date().toLocaleTimeString("pt-BR")}`;
  document.getElementById("search-hint").textContent=`${todos.length} eventos carregados`;
}

document.getElementById("search").addEventListener("input",function(){
  const q=this.value.trim().toUpperCase();
  const sec=document.getElementById("results-section");
  if(q.length<2){sec.innerHTML=`<div class="empty-results"><div style="font-size:32px;margin-bottom:10px">🔍</div>Digite ao menos 2 caracteres.</div>`;return;}
  const mapa={};
  TODOS.forEach(r=>{
    const p=String(r.pedido||"").toUpperCase();
    const c=String(r.codigo_peca||"").toUpperCase();
    if(!p.includes(q)&&!c.includes(q)) return;
    const k=r.pedido+"||"+r.codigo_peca;
    if(!mapa[k]||r.id>mapa[k].id) mapa[k]=r;
  });
  const resultados=Object.values(mapa).sort((a,b)=>{
    const pa=String(a.pedido||"").toUpperCase();
    const pb=String(b.pedido||"").toUpperCase();
    if(pa.startsWith(q)&&!pb.startsWith(q)) return -1;
    if(!pa.startsWith(q)&&pb.startsWith(q)) return 1;
    return b.id-a.id;
  }).slice(0,40);
  if(!resultados.length){sec.innerHTML=`<div class="empty-results"><div style="font-size:32px;margin-bottom:10px">😕</div>Nenhuma peça encontrada.</div>`;return;}
  const label=`<div class="results-label">${resultados.length} resultado(s)</div>`;
  const items=resultados.map(r=>{
    const st=calcularStatus(r);
    const dias=diasDesde(r);
    const isSelected=pecaSel&&pecaSel.pedido===r.pedido&&pecaSel.codigo===r.codigo_peca;
    return `<div class="result-item${isSelected?" selected":""}" onclick="selecionarPeca('${esc(r.pedido)}','${esc(r.codigo_peca)}')">
      <div class="result-stripe" style="background:${st.cor}"></div>
      <div class="result-info">
        <div class="result-pedido">${r.codigo_peca||"—"}</div>
        <div class="result-codigo">Ped: ${r.pedido||"—"}</div>
        <div class="result-meta">${r.cliente||""} ${r.operador?"· "+r.operador:""}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div class="result-badge" style="background:${st.cor}22;color:${st.cor}">${st.icone} ${st.label.split("—")[0].trim()}</div>
        ${st.status==="em_producao"?`<div style="font-size:10px;font-family:var(--mono);color:var(--text3);margin-top:4px">${diasLabel(dias)}</div>`:""}
      </div>
    </div>`;
  }).join("");
  sec.innerHTML=label+items;
});

function selecionarPeca(pedido,codigo){
  pecaSel={pedido,codigo};
  document.getElementById("search").dispatchEvent(new Event("input"));
  const right=document.getElementById("right-panel");
  right.innerHTML=`<div class="loading"><div class="spinner"></div>carregando histórico...</div>`;
  const eventos=TODOS.filter(r=>r.pedido===pedido&&r.codigo_peca===codigo).sort((a,b)=>a.id-b.id);
  if(!eventos.length){right.innerHTML=`<div class="placeholder"><div class="placeholder-icon">😕</div><div class="placeholder-text">Nenhum evento encontrado.</div></div>`;return;}
  const ultimo=eventos[eventos.length-1];
  const st=calcularStatus(ultimo);
  const proc=String(ultimo.processo||"").trim();
  const corProc=COR_PROCESSO[proc.toUpperCase()]||"#4E5A72";
  const subopAtual=getSubop(ultimo);
  const diasAtual=diasDesde(ultimo);
  const dc=diasClass(diasAtual);
  const retrabalhos=eventos.filter(r=>String(r.retrabalho||"").trim()).length;
  const dtIni=new Date(eventos[0].data_evento);
  const dtFim=new Date(ultimo.data_evento);
  const leadDias=Math.max(0,Math.floor((dtFim-dtIni)/(1000*60*60*24)));
  const prazo=ultimo.prazo_entrega||"—";
  const prazoDate=prazo!=="—"?new Date(prazo):null;
  const prazoStatus=prazoDate?(prazoDate>new Date()?`<span style="color:var(--ok)">✓</span>`:`<span style="color:var(--danger)">⚠</span>`):"";

  const tlHtml=eventos.map((ev,i)=>{
    const isUlt=i===eventos.length-1;
    const evtStr=String(ev.evento||"").trim().toUpperCase();
    const isEnt=evtStr==="ENTRADA";
    const dotC=isUlt&&isEnt?"atual":isEnt?"entrada":"saida";
    const cardC=isUlt&&isEnt?"atual":!isEnt?"saida-op":"";
    const subop=getSubop(ev);
    let durHtml="";
    if(!isEnt&&i>0){
      const ant=eventos[i-1];
      if(ant&&String(ant.evento||"").trim().toUpperCase()==="ENTRADA"){
        const ms=new Date(ev.data_evento)-new Date(ant.data_evento);
        if(ms>0){const h=Math.floor(ms/3600000);const d=Math.floor(h/24);durHtml=`<span class="tl-dur">${d>0?d+"d ":""}${h%24}h</span>`;}
      }
    }
    return `<li class="tl-item">
      <div class="tl-dot ${dotC}"></div>
      <div class="tl-card ${cardC}">
        <div class="tl-top">
          <span class="tl-proc">${ev.processo||"—"}</span>
          <span class="tl-evt ${isEnt?"evt-entrada":"evt-saida"}">${evtStr}</span>
          ${isUlt?`<span class="tl-atual-tag">${st.icone} ${st.label}</span>`:""}
          ${ev.retrabalho&&String(ev.retrabalho).trim()?`<span class="tl-ret-tag">retrabalho</span>`:""}
        </div>
        <div class="tl-sub">${subop}</div>
        <div class="tl-foot">
          <span class="tl-meta">👤 ${ev.operador||"—"}</span>
          <span class="tl-meta">📅 ${fmtData(ev.data_evento)}</span>
          ${ev.sequencial_operacao?`<span class="tl-meta">op. ${ev.sequencial_operacao}</span>`:""}
          ${durHtml}
        </div>
        ${ev.observacao&&String(ev.observacao).trim()?`<div class="tl-obs">${ev.observacao}</div>`:""}
      </div>
    </li>`;
  }).join("");

  const irmaos=(() => {
    const mapa={};
    TODOS.forEach(r=>{if(r.pedido!==pedido) return;const k=r.codigo_peca;if(!mapa[k]||r.id>mapa[k].id) mapa[k]=r;});
    return Object.values(mapa).filter(r=>r.codigo_peca!==codigo);
  })();

  const irmaoHtml=irmaos.length===0?"<p style='font-size:12px;color:var(--text3)'>Nenhuma outra peça neste pedido.</p>"
    :irmaos.map(r=>{
      const s=calcularStatus(r);
      const isAtual=r.codigo_peca===codigo;
      return `<div class="irmao-item${isAtual?" atual":""}" onclick="selecionarPeca('${esc(r.pedido)}','${esc(r.codigo_peca)}')">
        <div style="font-size:12px;font-weight:500;color:var(--text);font-family:var(--mono)">${r.pedido}</div>
        <div style="font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:1px">${r.codigo_peca}</div>
        <div style="font-size:11px;margin-top:4px;color:${s.cor}">${s.icone} ${s.label.split("—")[0].trim()}</div>
      </div>`;
    }).join("");

  right.innerHTML=`<div class="detail">
    <div class="detail-topbar">
      <div><div class="detail-id">${codigo}</div><div class="detail-codigo">Pedido: ${pedido}</div></div>
      <span class="status-pill" style="background:${st.cor}22;color:${st.cor};border-color:${st.cor}44">${st.icone} ${st.label}</span>
    </div>
    <div class="metrics">
      <div class="metric"><div class="metric-val accent">${eventos.length}</div><div class="metric-label">eventos</div></div>
      <div class="metric"><div class="metric-val ${dc}">${diasLabel(diasAtual)}</div><div class="metric-label">no processo atual</div></div>
      <div class="metric"><div class="metric-val ${retrabalhos>0?"danger":"ok"}">${retrabalhos}</div><div class="metric-label">retrabalho(s)</div></div>
      <div class="metric"><div class="metric-val warn">${leadDias}d</div><div class="metric-label">lead time total</div></div>
    </div>
    ${st.status==="em_producao"?`<div class="pos-card">
      <div class="pos-stripe" style="background:${corProc}"></div>
      <div class="pos-info"><div class="pos-label">posição atual</div><div class="pos-proc">${proc}</div><div class="pos-subop">${subopAtual}</div></div>
      <div class="pos-right"><div class="pos-dias" style="color:var(--${dc})">${diasLabel(diasAtual)}</div><div class="pos-dias-label">neste setor</div></div>
    </div>`:""}
    <div class="info-row">
      <div><div class="info-item-label">cliente</div><div class="info-item-val">${ultimo.cliente||"—"}</div></div>
      <div><div class="info-item-label">prazo</div><div class="info-item-val">${prazo} ${prazoStatus}</div></div>
      <div><div class="info-item-label">qtd solicitada</div><div class="info-item-val">${ultimo.quantidade_solicitada||"—"}</div></div>
      <div><div class="info-item-label">qtd produzida</div><div class="info-item-val">${ultimo.quantidade_produzida||"—"}</div></div>
    </div>
    <div class="section-title">linha do tempo</div>
    <ul class="timeline">${tlHtml}</ul>
    ${irmaos.length>0?`<div class="section-title">outras peças do pedido (${irmaos.length})</div><div class="irmaos-grid">${irmaoHtml}</div>`:""}
  </div>`;
}

function navTo(p){window.location.href=p;}
function limparCacheERecarregar(){ limparCache(); carregarDados(true); }
carregarDados(false);
</script>
</body>
</html>
