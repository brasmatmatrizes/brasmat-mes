<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRASMAT MES — Performance de Operadores</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="design.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans)}
.topbar{height:56px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;gap:12px;flex-shrink:0}
.brand{display:flex;align-items:center;gap:10px}.bm{width:28px;height:28px;border-radius:6px;object-fit:cover;flex-shrink:0}
.bn{font-size:14px;font-weight:500;letter-spacing:0.04em}.bs{font-size:9px;color:var(--text3);font-family:var(--mono)}
.nav{display:flex;gap:4px}
.nb{font-size:12px;padding:6px 12px;border-radius:6px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-family:var(--sans);transition:all 0.15s;white-space:nowrap}
.nb:hover{background:var(--bg3);color:var(--text)}.nb.active{background:var(--accent);color:#fff}
.tr-right{display:flex;align-items:center;gap:8px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--ok);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.sync-lbl{font-size:11px;color:var(--text3);font-family:var(--mono)}
.btn-sm{background:transparent;border:1px solid var(--border);border-radius:6px;padding:3px 10px;font-size:11px;color:var(--text3);cursor:pointer;font-family:var(--mono)}
.btn-sm:hover{border-color:var(--border2);color:var(--text2)}

/* TOOLBAR */
.toolbar{height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:0 20px;flex-shrink:0;flex-wrap:wrap}
.flbl{font-size:11px;color:var(--text3);font-family:var(--mono);white-space:nowrap}
.fsel,.fdate{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:12px;color:var(--text2);outline:none;height:32px;cursor:pointer}
.fsel:focus,.fdate:focus{border-color:var(--accent)}
.btn-g{background:transparent;border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-size:12px;color:var(--text2);cursor:pointer}
.btn-g:hover{border-color:var(--border2);color:var(--text)}


/* LAYOUT */
.main{display:grid;grid-template-columns:340px 1fr;height:calc(100vh - 108px);overflow:hidden}

/* RANKING SIDEBAR */
.ranking{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.rank-hdr{padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.rank-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:8px}
.rank-sub{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:6px}
.rank-btns{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:2px}
.rank-btn{font-size:10px;padding:3px 9px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-family:var(--sans);transition:all 0.15s;white-space:nowrap}
.rank-btn:hover{border-color:var(--border2);color:var(--text)}
.rank-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.rank-list{overflow-y:auto;flex:1;padding:8px}
.rank-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;border:1px solid transparent;margin-bottom:4px;transition:all 0.12s}
.rank-item:hover{background:var(--bg3)}
.rank-item.selected{background:var(--bg3);border-color:var(--accent)}
.rank-num{font-size:13px;font-weight:500;font-family:var(--mono);color:var(--text3);width:22px;flex-shrink:0;text-align:center}
.rank-num.gold{color:#F59E0B}.rank-num.silver{color:#94A3B8}.rank-num.bronze{color:#92400E}
.rank-info{flex:1;min-width:0}
.rank-nome{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-meta{font-size:11px;color:var(--text);margin-top:2px}
.rank-badge{font-size:10px;padding:2px 8px;border-radius:10px;white-space:nowrap;flex-shrink:0;font-family:var(--mono);font-weight:500}
.badge-ok{background:rgba(45,191,126,0.12);color:var(--ok)}
.badge-warn{background:rgba(245,166,35,0.12);color:var(--warn)}
.badge-danger{background:rgba(240,69,69,0.12);color:var(--danger)}
.rank-vol{font-size:12px;font-weight:500;font-family:var(--mono);color:var(--text);white-space:nowrap;flex-shrink:0}

/* DETALHE */
.detalhe{overflow-y:auto;padding:20px 24px}
.placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text3);gap:12px}
.ph-ico{font-size:48px;opacity:0.3}.ph-txt{font-size:14px;text-align:center;line-height:1.6;max-width:280px}

.det-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.det-nome{font-size:22px;font-weight:500;color:var(--text)}
.det-periodo{font-size:12px;color:var(--text3);font-family:var(--mono);margin-top:3px}
.perf-badge{font-size:12px;font-weight:500;padding:6px 14px;border-radius:20px;border:1px solid transparent;flex-shrink:0}

/* MÉTRICAS */
.mrow{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px}
.met{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.mv{font-size:22px;font-weight:500;font-family:var(--mono);line-height:1;margin-bottom:4px}
.mv.ok{color:var(--ok)}.mv.warn{color:var(--warn)}.mv.danger{color:var(--danger)}.mv.accent{color:var(--accent)}.mv.text{color:var(--text)}
.ml{font-size:10px;color:var(--text2)}
.met-tip{font-size:10px;color:var(--text2);margin-top:4px;line-height:1.4;border-top:1px solid var(--border);padding-top:4px}

/* ALERTAS */
.alertas{margin-bottom:20px}
.alerta-title{font-size:11px;font-weight:500;letter-spacing:0.09em;text-transform:uppercase;color:var(--text3);font-family:var(--mono);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.alerta-title::after{content:"";flex:1;height:1px;background:var(--border)}
.alerta-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:8px;margin-bottom:6px;border:1px solid}
.alerta-item.danger{background:rgba(240,69,69,0.05);border-color:rgba(240,69,69,0.2)}
.alerta-item.warn{background:rgba(245,166,35,0.05);border-color:rgba(245,166,35,0.2)}
.alerta-item.info{background:rgba(59,127,255,0.05);border-color:rgba(59,127,255,0.15)}
.alerta-ico{font-size:16px;flex-shrink:0;margin-top:1px}
.alerta-txt{flex:1}
.alerta-txt strong{font-size:12px;font-weight:500;color:var(--text);display:block;margin-bottom:2px}
.alerta-txt span{font-size:11px;color:var(--text2);line-height:1.5}

/* SEÇÕES */
.sec-title{font-size:11px;font-weight:500;letter-spacing:0.09em;text-transform:uppercase;color:var(--text3);font-family:var(--mono);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sec-title::after{content:"";flex:1;height:1px;background:var(--border)}

/* TABELA DE OPERAÇÕES */
.op-table{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:20px}
.op-thead{display:grid;grid-template-columns:110px 100px 130px 90px 80px 90px 100px;border-bottom:1px solid var(--border);padding:0 14px}
.op-th{font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--text2);font-family:var(--mono);padding:8px 6px}
.op-tbody{display:flex;flex-direction:column;max-height:280px;overflow-y:auto}
.op-tr{display:grid;grid-template-columns:110px 100px 130px 90px 80px 90px 100px;padding:0 14px;border-bottom:1px solid var(--border);transition:background 0.1s}
.op-tr:last-child{border-bottom:none}.op-tr:hover{background:var(--bg3)}
.op-tr.suspeito{border-left:2px solid var(--danger)}
.op-tr.atencao{border-left:2px solid var(--warn)}
.op-td{font-size:11px;color:var(--text2);padding:8px 6px;display:flex;align-items:center;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.op-chip{font-size:10px;font-family:var(--mono);padding:2px 7px;border-radius:8px;white-space:nowrap}

/* COMPARATIVO */
.comp-grid{display:flex;flex-direction:column;gap:0;margin-bottom:20px}
.comp-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.comp-peca{font-size:13px;font-weight:500;color:var(--text);font-family:var(--mono);margin-bottom:2px}
.comp-subop{font-size:11px;color:var(--text3);margin-bottom:10px}
.comp-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:11px}
.comp-row:last-child{border-bottom:none}
.comp-op{color:var(--text2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.comp-tempo{font-family:var(--mono);font-size:11px;font-weight:500}
.comp-row.destaque .comp-op{color:var(--accent);font-weight:500}
.comp-row.melhor .comp-tempo{color:var(--ok)}
.comp-row.pior .comp-tempo{color:var(--danger)}

/* LOADING */
.flag-btn{display:flex;align-items:center;gap:5px;font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;white-space:nowrap;height:28px;transition:all 0.15s}
.flag-btn:hover{border-color:var(--border2);color:var(--text2)}
.flag-btn.on{background:var(--bg4);border-color:var(--border2);color:var(--text)}
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--text3);font-family:var(--mono);font-size:12px;gap:10px}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay{position:fixed;inset:0;background:rgba(15,17,23,0.55);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:9999}
.loading-overlay.show{display:flex}
.loading-overlay .spinner-big{width:38px;height:38px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}
.loading-overlay .loading-txt{color:var(--text2);font-family:var(--mono);font-size:13px}
</style>
</head>

<div style="display:grid;grid-template-rows:56px 52px 1fr;height:100vh">

<div class="topbar">
  <div class="brand"><img class="bm" src="assets/logo-icone.jpg" alt="Brasmat"><div><div class="bn">BRASMAT MES</div><div class="bs">sistema de execução de manufatura</div></div></div>

  <div class="tr-right">

<!-- TOOLBAR -->

<script src="status.js"></script>
<script>
let TODOS = [];
let opSelecionado = null;
let rankingAtivo = "volume";
const filtros = { ignorarMaisUmDia: true, ignorarMenosCincoMin: true };

// Datas padrão: mês atual
const hoje = new Date();
const iniMes = new Date(hoje.getFullYear(), hoje.getMonth(), 1);
function fmtD(d){ return d.toISOString().slice(0,10); }
document.getElementById("di").value = fmtD(iniMes);
document.getElementById("df").value = fmtD(hoje);

function toggleFiltro(tipo){
  if(tipo==="dia"){
    filtros.ignorarMaisUmDia = !filtros.ignorarMaisUmDia;
    document.getElementById("tog-dia").classList.toggle("on", filtros.ignorarMaisUmDia);
  } else {
    filtros.ignorarMenosCincoMin = !filtros.ignorarMenosCincoMin;
    document.getElementById("tog-min").classList.toggle("on", filtros.ignorarMenosCincoMin);
  }
  aplicarFiltro();
}

async function init(){
  const overlay = document.getElementById("loadingOverlay");
  const btnA = document.getElementById("btn-aplicar");
  const btnL = document.getElementById("btn-limpar");
  overlay.classList.add("show");
  btnA.disabled = true; btnL.disabled = true;
  document.getElementById("slbl").textContent = "carregando...";
  try{
    // Busca só o período selecionado (padrão: mês corrente) — evita baixar o histórico inteiro
    const di = document.getElementById("di").value;
    const df = document.getElementById("df").value;
    const diUTC = di + "T03:00:00.000Z";
    const dfUTC = df + "T23:59:59-03:00";
    let todos=[], offset=0;
    while(true){
      const chunk = await supaFetch(
        `/rest/v1/producao_eventos?select=id,pedido,codigo_peca,processo,operador,evento,data_evento,quantidade_produzida,retrabalho,operacao_retifica_plana,operacao_retifica_cilindrica_interna,operacao_retifica_cilindrica_externa,operacao_erosao_fio,operacao_forma,operacao_polimento,operacao_brunidora,operacao_prensa,operacao_torno,operacao_qualidade,operacao_administrativo,operacao_servico_externo,operacao_erosao_penetracao&data_evento=gte.${diUTC}&data_evento=lte.${dfUTC}&order=id.asc&limit=1000&offset=${offset}`
      );
      if(!Array.isArray(chunk)||chunk.length===0) break;
      todos = todos.concat(chunk);
      if(chunk.length<1000) break;
      offset+=1000;
    }
    TODOS = todos;
    popularProcessos();
    aplicarFiltro();
    document.getElementById("slbl").textContent = `${todos.length} eventos carregados · ${new Date().toLocaleTimeString("pt-BR")}`;
  } finally {
    overlay.classList.remove("show");
    btnA.disabled = false; btnL.disabled = false;
  }
}

function dadosFiltrados(){
  const di = new Date(document.getElementById("di").value+"T00:00:00");
  const df = new Date(document.getElementById("df").value+"T23:59:59");
  const proc = document.getElementById("fproc").value.trim().toUpperCase();
  return TODOS.filter(r=>{
    const dt = r.data_evento ? new Date(r.data_evento) : null;
    if(!dt || dt<di || dt>df) return false;
    if(proc && String(r.processo||"").trim().toUpperCase()!==proc) return false;
    if(!r.operador || !String(r.operador).trim()) return false;
    return true;
  });
}

function popularProcessos(){
  const procs = [...new Set(TODOS.map(r=>String(r.processo||"").trim()).filter(Boolean))].sort();
  document.getElementById("fproc").innerHTML = '<option value="">Todos os processos</option>' +
    procs.map(p=>`<option value="${p}">${p}</option>`).join("");
}

function nomeOperador(raw){
  // Remove prefixo numérico tipo "7_FELIPE DA SILVEIRA" → "FELIPE DA SILVEIRA"
  return String(raw||"").replace(/^\d+_/,"").trim();
}

function fmtTempo(ms){
  if(ms<0) return "—";
  const s = Math.floor(ms/1000);
  if(s<60) return s+"s";
  const m = Math.floor(s/60);
  if(m<60) return m+"min";
  const h = Math.floor(m/60);
  const rm = m%60;
  return h+"h "+rm+"min";
}

function fmtTempoNum(ms){
  if(ms<0) return 0;
  return Math.floor(ms/60000); // em minutos
}

// Calcula par entrada→saída para um operador numa peça+processo
function calcularPares(eventos){
  const pares = [];
  // Agrupa por pedido+codigo+processo
  const grupos = {};
  eventos.forEach(ev=>{
    const k = (ev.pedido||"")+"||"+(ev.codigo_peca||"")+"||"+(ev.processo||"");
    if(!grupos[k]) grupos[k]=[];
    grupos[k].push(ev);
  });

  Object.values(grupos).forEach(evs=>{
    evs.sort((a,b)=>new Date(a.data_evento)-new Date(b.data_evento));

    // Percorre sequencialmente: cada ENTRADA consome a próxima SAÍDA disponível
    const usados = new Set();
    for(let i=0;i<evs.length;i++){
      if(usados.has(i)) continue;
      const ev = evs[i];
      const evtStr = String(ev.evento||"").trim().toUpperCase();
      if(evtStr!=="ENTRADA") continue;

      // Procura a PRÓXIMA saída ainda não usada
      let saidaIdx = -1;
      for(let j=i+1;j<evs.length;j++){
        if(usados.has(j)) continue;
        const eStr = String(evs[j].evento||"").trim().toUpperCase();
        if(eStr==="SAÍDA"||eStr==="SAIDA"){ saidaIdx=j; break; }
        // Se encontrou outra ENTRADA antes da saída, para (entrada sem saída)
        if(eStr==="ENTRADA") break;
      }

      const prox = saidaIdx>=0 ? evs[saidaIdx] : null;
      if(prox) usados.add(saidaIdx);
      usados.add(i);

      const durMs = prox ? new Date(prox.data_evento)-new Date(ev.data_evento) : -1;
      const qtd   = prox ? Number(prox.quantidade_produzida||0) : 0;

      pares.push({
        entrada: ev,
        saida: prox||null,
        durMs,
        qtd,
        semSaida: !prox,
        muitoRapido: prox && durMs>=0 && durMs < 2*60*1000,
        menosCincoMin: prox && durMs>=0 && durMs < 5*60*1000,
        maisUmDia: prox && durMs >= 24*60*60*1000,
        fimDeSemana: [0,6].includes(new Date(ev.data_evento).getDay())
      });
    }
  });
  return pares;
}

function analisarOperador(nome, eventos){
  const pares = calcularPares(eventos);
  const totalPares = pares.length;
  const comSaida = pares.filter(p=>!p.semSaida).length;
  const semSaida = pares.filter(p=>p.semSaida).length;
  const muitoRapidos = pares.filter(p=>p.muitoRapido).length;
  const maisUmDiaCount = pares.filter(p=>p.maisUmDia).length;
  const totalPecas = pares.filter(p=>!p.semSaida&&!(filtros.ignorarMenosCincoMin&&p.menosCincoMin)&&!(filtros.ignorarMaisUmDia&&p.maisUmDia)).reduce((s,p)=>s+p.qtd,0);
  const duracoes = pares.filter(p=>!p.semSaida&&p.durMs>0&&!p.muitoRapido&&!p.fimDeSemana&&!(filtros.ignorarMaisUmDia&&p.maisUmDia)&&!(filtros.ignorarMenosCincoMin&&p.menosCincoMin)).map(p=>p.durMs);
  const tempoMedio = duracoes.length ? duracoes.reduce((s,d)=>s+d,0)/duracoes.length : 0;
  const indiceApontamento = totalPares>0 ? Math.round(comSaida/totalPares*100) : 100;
  const totalRetrabalhos = eventos.filter(r=>String(r.retrabalho||"").trim()).length;

  // Score de performance
  let score = "ok";
  if(indiceApontamento < 70 || muitoRapidos > 3) score = "danger";
  else if(indiceApontamento < 85 || muitoRapidos > 1 || semSaida > 5) score = "warn";

  return { nome, pares, totalPares, comSaida, semSaida, muitoRapidos, totalPecas, tempoMedio, indiceApontamento, score };
}

function setRanking(tipo){
  rankingAtivo = tipo;
  document.querySelectorAll(".rank-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("rb-"+tipo).classList.add("active");
  aplicarFiltro();
}

function ordenarPorRanking(analises){
  switch(rankingAtivo){
    case "volume":
      return [...analises].sort((a,b)=>b.totalPecas-a.totalPecas);
    case "apontamento":
      return [...analises].sort((a,b)=>b.indiceApontamento-a.indiceApontamento);
    case "operacoes":
      return [...analises].sort((a,b)=>b.totalPares-a.totalPares);
    case "velocidade":
      // Mais rápido = menor tempo médio (excluindo quem tem tempo médio 0)
      return [...analises].filter(a=>a.tempoMedio>0).sort((a,b)=>a.tempoMedio-b.tempoMedio)
        .concat(analises.filter(a=>a.tempoMedio===0));
    case "sem_saida":
      // Mais sem saída = pior apontamento (ranking invertido — mais é pior)
      return [...analises].sort((a,b)=>b.semSaida-a.semSaida);
    case "retrabalho":
      return [...analises].sort((a,b)=>b.totalRetrabalhos-a.totalRetrabalhos);
    default:
      return analises;
  }
}

function aplicarFiltro(){
  const dados = dadosFiltrados();
  const porOp = {};
  dados.forEach(r=>{
    const op = nomeOperador(r.operador);
    if(!porOp[op]) porOp[op]=[];
    porOp[op].push(r);
  });

  const analises = Object.entries(porOp).map(([nome,evs])=>analisarOperador(nome,evs));
  const ordenadas = ordenarPorRanking(analises);

  renderRanking(ordenadas, dados);

  if(opSelecionado){
    const an = analises.find(a=>a.nome===opSelecionado);
    if(an) renderDetalhe(an, dados);
  }
}

        metricaSec = `${an.semSaida} sem saída`;
        break;
      case "operacoes":
        metricaPrincipal = `<span style="font-size:15px;font-weight:500;font-family:var(--mono);color:var(--accent)">${an.totalPares}</span>`;
        metricaSec = `operações registradas`;
        break;
      case "velocidade":
        metricaPrincipal = `<span style="font-size:13px;font-weight:500;font-family:var(--mono);color:var(--ok)">${an.tempoMedio>0?fmtTempo(an.tempoMedio):"sem dados"}</span>`;
        metricaSec = `tempo médio por op.`;
        break;
      case "sem_saida":

        metricaPrincipal = `<span style="font-size:15px;font-weight:500;font-family:var(--mono);color:${ssCor}">${an.semSaida}</span>`;
        metricaSec = `sem saída de ${an.totalPares} op.`;

        const retCor = an.totalRetrabalhos>5?"var(--danger)":an.totalRetrabalhos>2?"var(--warn)":"var(--text3)";

        metricaSec = `retrabalhos registrados`;
        break;
    }
    return `<div class="rank-item${opSelecionado===an.nome?" selected":""}" onclick="selOp('${esc(an.nome)}')">
      <div class="rank-num ${nc}">${medal||("#"+(i+1))}</div>
      <div class="rank-info">
        <div class="rank-nome">${an.nome}</div>

      </div>
      <div style="text-align:right;flex-shrink:0">
        ${metricaPrincipal}
      </div>
    </div>`;
  }).join("");

  // Guarda analises globalmente para uso no detalhe
  window._analises = analises;
  window._todosDados = todosDados;
}

function selOp(nome){
  opSelecionado = nome;
  const an = window._analises.find(a=>a.nome===nome);
  if(an) renderDetalhe(an, window._todosDados);
  // Atualiza selected no ranking
  document.querySelectorAll(".rank-item").forEach(el=>{
    el.classList.toggle("selected", el.querySelector(".rank-nome")&&el.querySelector(".rank-nome").textContent===nome);
  });
}

  }

    alertas.push({tipo:"warn",ico:"⚠",titulo:"Índice de apontamento abaixo do ideal",desc:"Menos de 85% das entradas têm saída correspondente. Recomenda-se conversar com o operador para entender o padrão."});
  }

  if(an.totalPecas===0&&an.totalPares>0){
    alertas.push({tipo:"warn",ico:"📦",titulo:"Nenhuma peça produzida registrada",desc:"O operador tem operações lançadas mas a quantidade produzida está zerada em todas. Verifique se está preenchendo corretamente o campo de quantidade no formulário."});

function renderComparativo(an, todosDados){
  const pecasOp = new Set();
  an.pares.filter(p=>!p.semSaida&&!p.muitoRapido&&p.durMs>0).forEach(p=>{
    pecasOp.add(p.entrada.codigo_peca+"||"+getSubop(p.entrada));
  });

  if(pecasOp.size===0) return "";

  const comparativos = [];

  pecasOp.forEach(chave=>{
    const [codigo, subop] = chave.split("||");
    if(!codigo||subop==="—") return;

    const evsPeca = todosDados.filter(r=>r.codigo_peca===codigo&&getSubop(r)===subop);
    const porOp = {};
    evsPeca.forEach(r=>{
      const op = nomeOperador(r.operador);
      if(!porOp[op]) porOp[op]=[];
      porOp[op].push(r);
    });

    // Cada operador tem uma lista de ocorrências individuais
    const operadores = [];
    Object.entries(porOp).forEach(([op,evs])=>{
      const pares = calcularPares(evs);
      const validos = pares.filter(p=>{
        if(p.semSaida) return false;           // sem saída: descarta
        if(p.durMs<=0) return false;           // duração inválida
        if(p.fimDeSemana) return false;        // fim de semana: descarta
        if(p.durMs < 5*60*1000) return false;  // SEMPRE ignora < 5 min no comparativo
        if(p.durMs >= 24*60*60*1000) return false; // SEMPRE ignora > 24h no comparativo
        return true;
      });
      if(validos.length===0) return;

      const ocorrencias = validos.map(p=>({
        durMs: p.durMs,
        qtd: p.qtd,
        data: new Date(p.entrada.data_evento).toLocaleDateString("pt-BR")
      }));

      const mediaMs = ocorrencias.reduce((s,o)=>s+o.durMs,0)/ocorrencias.length;
      const totalQtd = ocorrencias.reduce((s,o)=>s+o.qtd,0);

      operadores.push({op, ocorrencias, mediaMs, totalQtd, isEste: op===an.nome});
    });

    if(operadores.length<2) return;

    // Ordena por média (mais rápido primeiro)
    operadores.sort((a,b)=>a.mediaMs-b.mediaMs);
    comparativos.push({codigo, subop, operadores});
  });

  if(comparativos.length===0) return `
    <div class="sec-title">comparativo com outros operadores</div>
    <p style="font-size:12px;color:var(--text3);margin-bottom:20px">Não há dados suficientes para comparativo — nenhuma peça deste operador foi feita por outros no período.</p>`;

  const cards = comparativos.map(comp=>{
    const melhorMedia = comp.operadores[0].mediaMs;
    const piorMedia   = comp.operadores[comp.operadores.length-1].mediaMs;

    const blocos = comp.operadores.map(op=>{
      const isMelhor = op.mediaMs===melhorMedia;
      const isPior   = op.mediaMs===piorMedia && comp.operadores.length>1;
      const corNome  = op.isEste?"var(--accent)":isMelhor?"var(--ok)":isPior?"var(--danger)":"var(--text2)";
      const prefix   = op.isEste?"→ ":"";

      // Linha de resumo do operador
      const resumo = `<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:var(--bg3);border-radius:6px;margin-bottom:4px;gap:8px">
        <span style="font-size:12px;font-weight:500;color:${corNome};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px">${prefix}${op.op}</span>
        <div style="display:flex;gap:10px;flex-shrink:0;align-items:center">
          <span style="font-size:10px;color:var(--text3)">média</span>
          <span style="font-size:12px;font-family:var(--mono);font-weight:500;color:${isMelhor?"var(--ok)":isPior?"var(--danger)":"var(--text)"}">${fmtTempo(op.mediaMs)}</span>
          <span style="font-size:10px;color:var(--text3)">total</span>
          <span style="font-size:12px;font-family:var(--mono);color:var(--text)">${op.totalQtd}pç</span>
        </div>
      </div>`;

      // Ocorrências individuais
      const ocRows = op.ocorrencias.map((oc,idx)=>`
        <div style="display:grid;grid-template-columns:20px 80px 1fr 60px 50px;gap:6px;align-items:center;padding:4px 10px;border-bottom:1px solid var(--border);font-size:11px">
          <span style="color:var(--text3);font-family:var(--mono)">${idx+1}</span>
          <span style="color:var(--text3)">${oc.data}</span>
          <div style="height:4px;background:var(--bg4);border-radius:2px;overflow:hidden">
            <div style="height:100%;border-radius:2px;background:${corNome};width:${Math.min(100,Math.round(oc.durMs/Math.max(...comp.operadores.flatMap(o=>o.ocorrencias.map(x=>x.durMs)))*100))}%"></div>
          </div>
          <span style="font-family:var(--mono);color:var(--text);text-align:right">${fmtTempo(oc.durMs)}</span>
          <span style="font-family:var(--mono);color:var(--text3);text-align:right">${oc.qtd}pç</span>
        </div>`).join("");

      return resumo + `<div style="border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:10px">${ocRows}</div>`;
    }).join("");

    return `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <div>
          <div style="font-size:14px;font-weight:500;color:var(--text);font-family:var(--mono)">${comp.codigo}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px">${comp.subop} · ${comp.operadores.length} operador(es)</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:20px 80px 1fr 60px 50px;gap:6px;padding:4px 10px;margin-bottom:4px">
        <span style="font-size:10px;color:var(--text3)">#</span>
        <span style="font-size:10px;color:var(--text3)">Data</span>
        <span style="font-size:10px;color:var(--text3)">Tempo visual</span>
        <span style="font-size:10px;color:var(--text3);text-align:right">Duração</span>
        <span style="font-size:10px;color:var(--text3);text-align:right">Qtd</span>
      </div>
      ${blocos}
    </div>`;
  }).join("");

  return `
    <div class="sec-title">comparativo com outros operadores (mesma peça + suboperação)</div>
    <p style="font-size:11px;color:var(--text3);margin-bottom:14px">
      Cada operador mostra a média e todas as ocorrências individuais. 
      <span style="color:var(--ok)">Verde</span> = mais rápido · 
      <span style="color:var(--danger)">Vermelho</span> = mais lento · 
      <span style="color:var(--accent)">→ Azul</span> = operador selecionado.
      Barra visual proporcional ao tempo de cada ocorrência.
    </p>
    ${cards}`;
}

function limpar(){
  document.getElementById("di").value = fmtD(iniMes);
  document.getElementById("df").value = fmtD(hoje);
  document.getElementById("fproc").value = "";
  init();
}

function navTo(p){ window.location.href=p; }
init();
</script>
