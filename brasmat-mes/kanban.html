<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRASMAT MES — Kanban</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0F1117;--bg2:#181C27;--bg3:#1F2433;--bg4:#252A3A;
  --border:#2A3045;--border2:#3A4560;
  --text:#E8ECF5;--text2:#8892AA;--text3:#4E5A72;
  --accent:#3B7FFF;--accent2:#1A4FCC;
  --ok:#2DBF7E;--warn:#F5A623;--danger:#F04545;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans)}

/* TOPBAR */
.topbar{height:56px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;gap:16px;flex-shrink:0}
.topbar-brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:500;color:#fff}
.brand-name{font-size:14px;font-weight:600;letter-spacing:0.04em}
.brand-sub{font-size:11px;color:var(--text3);font-family:var(--mono)}
.topbar-nav{display:flex;gap:4px}
.nav-btn{font-size:12px;padding:6px 14px;border-radius:6px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-family:var(--sans);transition:all 0.15s}
.nav-btn:hover{background:var(--bg3);color:var(--text)}
.nav-btn.active{background:var(--accent);color:#fff}
.topbar-right{display:flex;align-items:center;gap:8px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--ok);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.sync-label{font-size:11px;color:var(--text3);font-family:var(--mono)}

/* TOOLBAR */
.toolbar{height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:0 24px;flex-shrink:0}
.filter-select,.filter-date{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:12px;color:var(--text2);font-family:var(--sans);outline:none;height:32px;cursor:pointer}
.filter-select:focus,.filter-date:focus{border-color:var(--accent)}
.filter-label{font-size:11px;color:var(--text3);font-family:var(--mono);white-space:nowrap}
.toolbar-sep{width:1px;height:20px;background:var(--border);margin:0 4px}
.btn-ghost{background:transparent;border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-size:12px;color:var(--text2);font-family:var(--sans);cursor:pointer;height:32px;transition:all 0.15s}
.btn-ghost:hover{border-color:var(--border2);color:var(--text)}
.summary-chips{display:flex;gap:6px;margin-left:auto}
.chip{font-size:11px;font-family:var(--mono);padding:3px 10px;border-radius:10px;white-space:nowrap}
.chip-total{background:rgba(59,127,255,0.12);color:var(--accent)}
.chip-danger{background:rgba(240,69,69,0.12);color:var(--danger)}
.chip-warn{background:rgba(245,166,35,0.12);color:var(--warn)}

/* BOARD */
.board-shell{display:flex;flex-direction:column;height:calc(100vh - 108px);overflow:hidden}
.board{display:flex;gap:0;overflow-x:auto;padding:16px;height:100%;align-items:flex-start}
.board::-webkit-scrollbar{height:6px}
.board::-webkit-scrollbar-track{background:var(--bg)}
.board::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* COLUNA */
.col{min-width:200px;max-width:200px;display:flex;flex-direction:column;gap:0;margin-right:10px;flex-shrink:0;height:100%}
.col-header{background:var(--bg2);border:1px solid var(--border);border-radius:10px 10px 0 0;padding:10px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.col-stripe{width:3px;height:20px;border-radius:2px;flex-shrink:0}
.col-info{flex:1;min-width:0}
.col-name{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.col-count{font-size:11px;font-family:var(--mono);padding:1px 7px;border-radius:10px;background:var(--bg3);color:var(--text2);flex-shrink:0}
.col-body{background:var(--bg2);border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px;flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px}
.col-body::-webkit-scrollbar{width:3px}
.col-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.col-empty{font-size:11px;color:var(--text3);text-align:center;padding:24px 8px;font-family:var(--mono)}

/* CARTÃO */
.card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 11px;cursor:pointer;transition:border-color 0.15s,transform 0.1s}
.card:hover{border-color:var(--border2);transform:translateY(-1px)}
.card.warn{border-left:2px solid var(--warn)}
.card.danger{border-left:2px solid var(--danger);background:#1C1A1A}
.card-pedido{font-size:12px;font-weight:500;color:var(--text);font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.card-codigo{font-size:11px;color:var(--text3);font-family:var(--mono);margin-bottom:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-subop{font-size:10px;color:var(--text2);background:var(--bg4);border-radius:4px;padding:3px 7px;margin-bottom:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-footer{display:flex;align-items:center;justify-content:space-between;gap:4px}
.card-cliente{font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px}
.dias-chip{font-size:10px;font-family:var(--mono);font-weight:500;padding:2px 7px;border-radius:8px;white-space:nowrap;flex-shrink:0}
.dias-ok{background:rgba(45,191,126,0.12);color:var(--ok)}
.dias-warn{background:rgba(245,166,35,0.12);color:var(--warn)}
.dias-danger{background:rgba(240,69,69,0.12);color:var(--danger)}
.card-operador{font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px;margin-top:5px}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text3);font-family:var(--mono);font-size:12px;gap:10px}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* PAINEL DETALHE */
.detail-panel{display:none;position:fixed;right:0;top:0;bottom:0;width:460px;background:var(--bg2);border-left:1px solid var(--border);z-index:200;overflow-y:auto;animation:slideIn 0.18s ease}
.detail-panel.open{display:block}
@keyframes slideIn{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}
.detail-header{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;position:sticky;top:0;background:var(--bg2);z-index:1}
.detail-close{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:12px;color:var(--text2);cursor:pointer;flex-shrink:0}
.detail-pedido{font-size:15px;font-weight:600;color:var(--text);font-family:var(--mono)}
.detail-codigo{font-size:12px;color:var(--text2);font-family:var(--mono);margin-top:2px}
.detail-body{padding:16px 20px}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.meta-box{background:var(--bg3);border-radius:8px;padding:10px 12px}
.meta-label{font-size:10px;color:var(--text3);font-family:var(--mono);margin-bottom:3px;text-transform:uppercase;letter-spacing:0.07em}
.meta-val{font-size:13px;font-weight:500;color:var(--text)}
.tl-label{font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);font-family:var(--mono);margin-bottom:12px}
.timeline{list-style:none;position:relative;padding-left:28px}
.timeline::before{content:"";position:absolute;left:9px;top:0;bottom:0;width:1px;background:var(--border)}
.tl-item{position:relative;margin-bottom:12px}
.tl-item:last-child{margin-bottom:0}
.tl-dot{position:absolute;left:-28px;top:4px;width:13px;height:13px;border-radius:50%;border:2px solid var(--bg2)}
.tl-dot.entrada{background:var(--accent)}
.tl-dot.saida{background:var(--ok)}
.tl-dot.atual{background:var(--warn);box-shadow:0 0 0 3px rgba(245,166,35,0.2)}
.tl-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.tl-card.atual{border-color:var(--warn)}
.tl-top{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:5px}
.tl-proc{font-size:12px;font-weight:500;color:var(--text)}
.tl-evt{font-size:10px;padding:1px 7px;border-radius:8px}
.evt-entrada{background:rgba(59,127,255,0.12);color:var(--accent)}
.evt-saida{background:rgba(45,191,126,0.1);color:var(--ok)}
.tl-atual-tag{font-size:10px;padding:1px 7px;border-radius:8px;background:rgba(245,166,35,0.15);color:var(--warn)}
.tl-sub{font-size:11px;color:var(--text2);margin-bottom:6px}
.tl-foot{display:flex;gap:12px;flex-wrap:wrap}
.tl-meta{font-size:11px;color:var(--text3);font-family:var(--mono)}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-brand">
    <div class="brand-mark">BM</div>
    <div>
      <div class="brand-name">BRASMAT MES</div>
      <div class="brand-sub">sistema de execução de manufatura</div>
    </div>
  </div>
  <div class="topbar-nav">
    <button class="nav-btn" onclick="navTo('index.html')">Posição</button>
    <button class="nav-btn active">Kanban</button>
    <button class="nav-btn" onclick="navTo('peca.html')">Buscar peça</button>
  </div>
  <div class="topbar-right">
    <div class="sync-dot"></div>
    <span class="sync-label" id="sync-label">carregando...</span>
  </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <span class="filter-label">De</span>
  <input type="date" class="filter-date" id="dt-ini">
  <span class="filter-label">até</span>
  <input type="date" class="filter-date" id="dt-fim">
  <div class="toolbar-sep"></div>
  <select class="filter-select" id="f-operador">
    <option value="">Todos os operadores</option>
  </select>
  <select class="filter-select" id="f-cliente">
    <option value="">Todos os clientes</option>
  </select>
  <button class="btn-ghost" onclick="limparFiltros()">Limpar</button>
  <div class="summary-chips">
    <span class="chip chip-total" id="chip-total">— em aberto</span>
    <span class="chip chip-danger" id="chip-danger">— críticas</span>
    <span class="chip chip-warn" id="chip-warn">— atenção</span>
  </div>
</div>

<!-- BOARD -->
<div class="board-shell">
  <div class="board" id="board">
    <div class="loading" style="width:100%"><div class="spinner"></div>carregando dados...</div>
  </div>
</div>

<!-- DETALHE -->
<div class="detail-panel" id="detail-panel">
  <div class="detail-header">
    <div id="detail-title"></div>
    <button class="detail-close" onclick="fecharDetalhe()">✕ fechar</button>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<script>
const SUPABASE_URL = "https://hjvlznijsgdwurtsyukl.supabase.co";
const SUPABASE_KEY = "sb_publishable_3N0kbWDpJ542n_aWeFzUqQ_pmVGrFiB";

const PROCESSOS = [
  {key:"RETÍFICA PLANA",           label:"Retífica Plana",          cor:"#3B7FFF"},
  {key:"RETÍFICA CILÍNDRICA INTERNA", label:"Ret. Cil. Interna",    cor:"#9B5DE5"},
  {key:"RETÍFICA CILÍNDRICA EXTERNA", label:"Ret. Cil. Externa",    cor:"#7C3AED"},
  {key:"TORNO",                    label:"Torno",                   cor:"#059669"},
  {key:"EROSÃO A FIO",             label:"Erosão a Fio",            cor:"#DC2626"},
  {key:"EROSÃO PENETRAÇÃO",        label:"Erosão Penetração",       cor:"#B91C1C"},
  {key:"FORMA",                    label:"Forma",                   cor:"#D97706"},
  {key:"BRUNIDORA",                label:"Brunidora",               cor:"#0891B2"},
  {key:"POLIMENTO",                label:"Polimento",               cor:"#DB2777"},
  {key:"PRENSA",                   label:"Prensa",                  cor:"#65A30D"},
  {key:"QUALIDADE",                label:"Qualidade",               cor:"#F59E0B"},
  {key:"SERVIÇO EXTERNO",          label:"Serviço Externo",         cor:"#6B7280"},
  {key:"ADMINISTRATIVO",           label:"Administrativo",          cor:"#4B5563"}
];

let TODOS   = [];
let POSICAO = {};

// Datas padrão: últimos 90 dias até hoje
const hoje   = new Date();
const ini90  = new Date(hoje); ini90.setDate(hoje.getDate()-90);
function fmtDateInput(d){ return d.toISOString().slice(0,10); }
document.getElementById("dt-ini").value = fmtDateInput(ini90);
document.getElementById("dt-fim").value = fmtDateInput(hoje);

async function fetchSupabase(path){
  const r = await fetch(SUPABASE_URL+path,{
    headers:{apikey:SUPABASE_KEY,Authorization:"Bearer "+SUPABASE_KEY}
  });
  return r.json();
}

async function carregarDados(){
  let todos=[], offset=0;
  while(true){
    const chunk = await fetchSupabase(
      `/rest/v1/producao_eventos?select=id,pedido,codigo_peca,cliente,processo,operador,evento,data_evento,sequencial_operacao,observacao,retrabalho,prazo_entrega,quantidade_produzida,operacao_retifica_plana,operacao_retifica_cilindrica_interna,operacao_retifica_cilindrica_externa,operacao_erosao_fio,operacao_forma,operacao_polimento,operacao_brunidora,operacao_prensa,operacao_torno,operacao_qualidade,operacao_administrativo,operacao_servico_externo,operacao_erosao_penetracao&order=id.asc&limit=1000&offset=${offset}`
    );
    if(!Array.isArray(chunk)||chunk.length===0) break;
    todos=todos.concat(chunk);
    if(chunk.length<1000) break;
    offset+=1000;
  }
  TODOS=todos;
  popularFiltros();
  calcularERenderar();
  document.getElementById("sync-label").textContent=`${todos.length} eventos · ${new Date().toLocaleTimeString("pt-BR")}`;
}

function calcularPosicao(dados){
  const mapa={};
  dados.forEach(row=>{
    if(!row.pedido||!row.codigo_peca) return;
    const k=row.pedido+"||"+row.codigo_peca;
    if(!mapa[k]||row.id>mapa[k].id) mapa[k]=row;
  });
  const pos={};
  Object.values(mapa).forEach(row=>{
    const evt=String(row.evento||"").trim().toUpperCase();
    if(evt==="ENTRADA"){
      const k=row.pedido+"||"+row.codigo_peca;
      pos[k]=row;
    }
  });
  return pos;
}

function dadosFiltrados(){
  const ini = new Date(document.getElementById("dt-ini").value+"T00:00:00");
  const fim = new Date(document.getElementById("dt-fim").value+"T23:59:59");
  const op  = document.getElementById("f-operador").value;
  const cl  = document.getElementById("f-cliente").value;
  return TODOS.filter(r=>{
    const dt = r.data_evento ? new Date(r.data_evento) : null;
    if(dt && (dt<ini||dt>fim)) return false;
    if(op && String(r.operador||"").trim()!==op) return false;
    if(cl && String(r.cliente||"").trim()!==cl)  return false;
    return true;
  });
}

function getSubop(row){
  const cols=["operacao_retifica_plana","operacao_retifica_cilindrica_interna","operacao_retifica_cilindrica_externa","operacao_erosao_fio","operacao_forma","operacao_polimento","operacao_brunidora","operacao_prensa","operacao_torno","operacao_qualidade","operacao_administrativo","operacao_servico_externo","operacao_erosao_penetracao"];
  for(const c of cols){ if(row[c]&&String(row[c]).trim()) return String(row[c]).trim(); }
  return "—";
}

function diasNoSetor(row){
  if(!row.data_evento) return 0;
  return Math.floor((Date.now()-new Date(row.data_evento))/(1000*60*60*24));
}
function diasClass(d){ return d>=6?"danger":d>=3?"warn":"ok"; }
function diasLabel(d){ return d===0?"hoje":d===1?"1 dia":d+" dias"; }
function cardClass(d){ return d>=6?"danger":d>=3?"warn":""; }

function popularFiltros(){
  const ops=[...new Set(TODOS.map(r=>String(r.operador||"").trim()).filter(Boolean))].sort();
  const cls=[...new Set(TODOS.map(r=>String(r.cliente||"").trim()).filter(Boolean))].sort();
  const fo=document.getElementById("f-operador");
  const fc=document.getElementById("f-cliente");
  const vo=fo.value, vc=fc.value;
  fo.innerHTML='<option value="">Todos os operadores</option>'+ops.map(o=>`<option>${o}</option>`).join("");
  fc.innerHTML='<option value="">Todos os clientes</option>'+cls.map(c=>`<option>${c}</option>`).join("");
  fo.value=vo; fc.value=vc;
}

function calcularERenderar(){
  const filtrados = dadosFiltrados();
  POSICAO = calcularPosicao(filtrados);
  renderBoard();
  renderChips();
}

function renderChips(){
  const vals=Object.values(POSICAO);
  document.getElementById("chip-total").textContent=vals.length+" em aberto";
  document.getElementById("chip-danger").textContent=vals.filter(r=>diasNoSetor(r)>=6).length+" críticas";
  document.getElementById("chip-warn").textContent=vals.filter(r=>{const d=diasNoSetor(r);return d>=3&&d<6;}).length+" atenção";
}

function renderBoard(){
  const board=document.getElementById("board");
  board.innerHTML="";
  PROCESSOS.forEach(proc=>{
    // Filtra peças deste processo (comparação normalizada)
    const pecas=Object.values(POSICAO).filter(r=>{
      const p=String(r.processo||"").trim().toUpperCase();
      return p===proc.key || p.includes(proc.key) || proc.key.includes(p);
    }).sort((a,b)=>diasNoSetor(b)-diasNoSetor(a));

    const col=document.createElement("div");
    col.className="col";

    col.innerHTML=`<div class="col-header">
      <div class="col-stripe" style="background:${proc.cor}"></div>
      <div class="col-info"><div class="col-name">${proc.label}</div></div>
      <span class="col-count">${pecas.length}</span>
    </div>
    <div class="col-body" id="col-${proc.key.replace(/\s/g,'_')}">
      ${pecas.length===0
        ? `<div class="col-empty">sem peças</div>`
        : pecas.map(p=>{
            const dias=diasNoSetor(p);
            const dc=diasClass(dias);
            const cc=cardClass(dias);
            const subop=getSubop(p);
            return `<div class="card ${cc}" onclick="abrirDetalhe('${esc(p.pedido)}','${esc(p.codigo_peca)}')">
              <div class="card-pedido">${p.pedido||"—"}</div>
              <div class="card-codigo">${p.codigo_peca||"—"}</div>
              <div class="card-subop">${subop}</div>
              <div class="card-footer">
                <span class="card-cliente">${p.cliente||"—"}</span>
                <span class="dias-chip dias-${dc}">${diasLabel(dias)}</span>
              </div>
              <div class="card-operador">👤 ${p.operador||"—"}</div>
            </div>`;
          }).join("")
      }
    </div>`;
    board.appendChild(col);
  });
}

function esc(s){ return String(s||"").replace(/'/g,"\\'"); }

function limparFiltros(){
  document.getElementById("f-operador").value="";
  document.getElementById("f-cliente").value="";
  document.getElementById("dt-ini").value=fmtDateInput(ini90);
  document.getElementById("dt-fim").value=fmtDateInput(hoje);
  calcularERenderar();
}

// DETALHE
async function abrirDetalhe(pedido,codigo){
  const panel=document.getElementById("detail-panel");
  const body=document.getElementById("detail-body");
  panel.classList.add("open");
  body.innerHTML=`<div style="display:flex;align-items:center;gap:10px;padding:40px;color:var(--text3);font-family:var(--mono);font-size:12px"><div class="spinner"></div>carregando...</div>`;
  document.getElementById("detail-title").innerHTML=
    `<div class="detail-pedido">${pedido}</div><div class="detail-codigo">${codigo}</div>`;

  const eventos=TODOS.filter(r=>r.pedido===pedido&&r.codigo_peca===codigo).sort((a,b)=>a.id-b.id);
  if(!eventos.length){body.innerHTML="<p style='color:var(--text3);font-size:13px;padding:16px'>Sem eventos.</p>";return;}

  const ultimo=eventos[eventos.length-1];
  const cliente=ultimo.cliente||"—";
  const prazo=ultimo.prazo_entrega||"—";
  const retrabalhos=eventos.filter(r=>String(r.retrabalho||"").trim()).length;

  function fmtData(d){
    if(!d) return "—";
    const dt=new Date(d);
    return dt.toLocaleDateString("pt-BR")+" "+dt.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
  }

  const tl=eventos.map((ev,i)=>{
    const isUlt=i===eventos.length-1;
    const evt=String(ev.evento||"").trim().toUpperCase();
    const isEnt=evt==="ENTRADA";
    const dotC=isUlt&&isEnt?"atual":isEnt?"entrada":"saida";
    const cardC=isUlt&&isEnt?"atual":"";
    const evtChip=isEnt?`<span class="tl-evt evt-entrada">ENTRADA</span>`:`<span class="tl-evt evt-saida">SAÍDA</span>`;
    const atualTag=isUlt&&isEnt?`<span class="tl-atual-tag">posição atual · ${diasNoSetor(ev)} dias</span>`:"";
    const ret=ev.retrabalho&&String(ev.retrabalho).trim()?`<span style="font-size:10px;padding:1px 6px;border-radius:8px;background:rgba(240,69,69,0.12);color:var(--danger)">${ev.retrabalho}</span>`:"";
    const subop=getSubop(ev);
    return `<li class="tl-item">
      <div class="tl-dot ${dotC}"></div>
      <div class="tl-card ${cardC}">
        <div class="tl-top"><span class="tl-proc">${ev.processo||"—"}</span>${evtChip}${atualTag}${ret}</div>
        <div class="tl-sub">${subop}</div>
        <div class="tl-foot">
          <span class="tl-meta">👤 ${ev.operador||"—"}</span>
          <span class="tl-meta">📅 ${fmtData(ev.data_evento)}</span>
          ${ev.sequencial_operacao?`<span class="tl-meta">op. ${ev.sequencial_operacao}</span>`:""}
        </div>
        ${ev.observacao&&String(ev.observacao).trim()?`<div style="margin-top:6px;font-size:11px;color:var(--text3);border-top:1px solid var(--border);padding-top:5px">${ev.observacao}</div>`:""}
      </div>
    </li>`;
  }).join("");

  const prazoDate=prazo!=="—"?new Date(prazo):null;
  const prazoOk=prazoDate?(prazoDate>new Date()?`<span style="color:var(--ok)">✓ no prazo</span>`:`<span style="color:var(--danger)">⚠ atrasado</span>`):"";

  body.innerHTML=`
    <div class="meta-grid">
      <div class="meta-box"><div class="meta-label">cliente</div><div class="meta-val">${cliente}</div></div>
      <div class="meta-box"><div class="meta-label">prazo entrega</div><div class="meta-val">${prazo} ${prazoOk}</div></div>
      <div class="meta-box"><div class="meta-label">total eventos</div><div class="meta-val">${eventos.length}</div></div>
      <div class="meta-box"><div class="meta-label">retrabalhos</div><div class="meta-val" style="color:${retrabalhos>0?"var(--danger)":"var(--ok)"}">${retrabalhos}</div></div>
    </div>
    <div class="tl-label">linha do tempo</div>
    <ul class="timeline">${tl}</ul>`;
}

function fecharDetalhe(){document.getElementById("detail-panel").classList.remove("open");}
function navTo(p){window.location.href=p;}

// Eventos dos filtros
["dt-ini","dt-fim","f-operador","f-cliente"].forEach(id=>{
  document.getElementById(id).addEventListener("change",calcularERenderar);
});

carregarDados();
</script>
</body>
</html>
