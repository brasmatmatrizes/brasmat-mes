<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRASMAT MES — Separação de Material</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="design.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden}
.topbar{height:56px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;gap:12px;flex-shrink:0}
.brand{display:flex;align-items:center;gap:10px}.bm{width:28px;height:28px;border-radius:6px;object-fit:cover;flex-shrink:0}
.bn{font-size:14px;font-weight:500;letter-spacing:0.04em}.bs{font-size:9px;color:var(--text3);font-family:var(--mono)}
.nav{display:flex;gap:4px}
.nb{font-size:12px;padding:6px 12px;border-radius:6px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-family:var(--sans);transition:all 0.15s;white-space:nowrap}
.nb:hover{background:var(--bg3);color:var(--text)}.nb.active{background:var(--accent);color:#fff}
.tr-right{display:flex;align-items:center;gap:8px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--ok);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.sync-lbl{font-size:11px;color:var(--text3);font-family:var(--mono)}

.toolbar{height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:0 20px;flex-shrink:0}
.tt{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap}
.hint{font-size:11px;color:var(--text3);font-family:var(--mono)}
.btn-g{background:transparent;border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-size:12px;color:var(--text2);cursor:pointer;height:32px;font-family:var(--sans)}
.btn-g:hover{border-color:var(--border2);color:var(--text)}
.btn-acc{background:var(--accent);border:1px solid var(--accent);color:#fff}
.btn-acc:hover{opacity:0.9;color:#fff}
.search-wrap{position:relative;flex:1;max-width:420px}
.search-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:12px;color:var(--text);outline:none;font-family:var(--mono)}
.search-input:focus{border-color:var(--accent)}
.sugg{position:absolute;top:100%;left:0;right:0;margin-top:6px;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;z-index:80;max-height:340px;overflow-y:auto;box-shadow:0 12px 30px rgba(0,0,0,.5);display:none}
.sugg-item{padding:9px 13px;cursor:pointer;border-bottom:1px solid var(--border)}
.sugg-item:last-child{border-bottom:none}
.sugg-item:hover{background:var(--bg3)}
.sugg-cod{font-family:var(--mono);font-size:13px;color:var(--text);font-weight:500}
.sugg-desc{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:2px}
.badge-pill{font-size:10px;font-family:var(--mono);padding:2px 7px;border-radius:999px}

.board-wrap{height:calc(100vh - 108px);padding:14px 20px;display:flex;gap:12px;overflow-x:auto}
.board-empty{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);font-size:13px;text-align:center;gap:2px}
.col{width:250px;min-width:250px;display:flex;flex-direction:column;height:100%;flex-shrink:0}
.col.aguardando{width:220px;min-width:220px}
.col-hdr{background:var(--bg2);border:1px solid var(--border);border-radius:10px 10px 0 0;padding:9px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.col-stripe{width:3px;height:15px;border-radius:2px;flex-shrink:0}
.col-name{font-size:11.5px;font-weight:500;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.col-cnt{font-size:10px;font-family:var(--mono);padding:1px 7px;border-radius:10px;background:var(--bg3);color:var(--text2)}
.col-body{background:var(--bg3);border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px;flex:1;overflow-y:auto;padding:7px;display:flex;flex-direction:column;gap:6px;transition:background .12s}
.col-body.dragover{background:rgba(59,127,255,.12);outline:2px dashed var(--accent);outline-offset:-2px}
.col-empty{font-size:10.5px;color:var(--text3);text-align:center;padding:18px 4px;font-family:var(--mono)}

.mat-card{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:9px 10px;cursor:grab;transition:transform .1s,box-shadow .1s}
.mat-card:hover{border-color:var(--border2);box-shadow:0 4px 12px rgba(0,0,0,.25)}
.mat-card.dragging{opacity:.4}
.mc-top{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:4px}
.mc-cod{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mc-pos{font-size:9px;font-family:var(--mono);padding:1px 6px;border-radius:999px;font-weight:600;letter-spacing:.03em}
.mc-pos.nucleo{background:rgba(59,127,255,.15);color:var(--accent)}
.mc-pos.carcaca{background:rgba(124,58,237,.15);color:var(--roxo)}
.mc-pos.luva{background:rgba(249,115,22,.15);color:var(--orange)}
.mc-meta{font-size:9.5px;color:var(--text3);font-family:var(--mono);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mc-bottom{display:flex;align-items:center;justify-content:space-between;gap:6px;flex-wrap:wrap}
.mc-mat{font-size:9.5px;font-family:var(--mono);color:var(--text2)}
.mc-qtd{font-size:9px;font-family:var(--mono);color:var(--text3);background:var(--bg3);border-radius:999px;padding:1px 6px}
.mc-dias{font-size:9px;font-family:var(--mono);color:var(--text3);margin-left:auto}
.mc-dias.atraso{color:var(--warn)}
.mc-prazo{font-size:9px;font-family:var(--mono);color:var(--text3)}
.mc-prazo.hoje{color:var(--warn);font-weight:700}
.mc-prazo.atrasado{color:var(--danger);font-weight:700}
.mc-completo{margin-top:6px;font-size:9.5px;font-family:var(--mono);color:var(--ok);background:rgba(45,191,126,.12);border-radius:6px;padding:3px 6px;text-align:center}
.mc-aguardando{margin-top:6px;font-size:9.5px;font-family:var(--mono);color:var(--warn);background:rgba(245,166,35,.12);border-radius:6px;padding:3px 6px;text-align:center}
.mc-lotes{margin-top:6px;font-size:9.5px;font-family:var(--mono);border-radius:6px;padding:3px 6px;text-align:center}
.mc-lotes.ok{color:var(--ok);background:rgba(45,191,126,.12)}
.mc-lotes.warn{color:var(--warn);background:rgba(245,166,35,.12)}
.mc-trilha{display:flex;gap:3px;margin-top:6px}
.mc-dot{width:5px;height:5px;border-radius:50%;background:var(--border2);flex-shrink:0}
.mc-dot.filled{background:var(--accent)}
.mat-card.mc-dim{opacity:.28}
.mat-card.mc-lote-hover{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.col-sub{font-size:8.5px;color:var(--text3);font-family:var(--mono);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.col-body.drag-valid{outline:2px solid rgba(45,191,126,.3);outline-offset:-2px}
.col-body.drag-invalid{opacity:.35}
.andon{display:flex;gap:6px;flex-shrink:0}
.andon-chip{font-size:11px;font-family:var(--mono);padding:5px 10px;border-radius:999px;border:1px solid var(--border);background:transparent;cursor:pointer;white-space:nowrap;color:var(--text2)}
.andon-chip:hover{border-color:var(--border2)}
.andon-chip.ok{color:var(--ok);border-color:rgba(45,191,126,.35)}
.andon-chip.warn{color:var(--warn);border-color:rgba(245,166,35,.35)}
.andon-chip.active{outline:2px solid var(--accent);outline-offset:1px}

.loading{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text3);font-family:var(--mono);font-size:12px;gap:10px}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* PAINEL LATERAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:150;display:none}
.overlay.open{display:block}
.side-panel{position:fixed;top:0;right:0;bottom:0;width:420px;max-width:94vw;background:var(--bg2);border-left:1px solid var(--border2);z-index:160;transform:translateX(100%);transition:transform .2s;display:flex;flex-direction:column}
.side-panel.open{transform:translateX(0)}
.sp-hdr{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sp-title{font-size:15px;font-weight:500}
.sp-sub{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:3px}
.sp-close{background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;line-height:1}
.sp-close:hover{color:var(--text)}
.sp-body{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:16px}
.sp-f{display:flex;flex-direction:column;gap:4px}
.sp-l{font-size:9px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.07em}
.sp-inp{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:13px;color:var(--text);outline:none;font-family:var(--mono)}
.sp-inp:focus{border-color:var(--accent)}
.sp-static{font-size:13px;font-family:var(--mono);color:var(--text2)}
.chk-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2)}
.mat-hist{display:flex;flex-direction:column;gap:3px;margin-top:6px}
.mat-hist-item{font-size:10px;font-family:var(--mono);color:var(--text3);display:flex;justify-content:space-between;gap:6px}
.comp-block{border:1px solid var(--border);border-radius:10px;padding:10px 12px;background:var(--bg3)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg4);border:1px solid var(--border2);color:var(--text);padding:9px 18px;border-radius:9px;font-size:12px;font-family:var(--mono);z-index:300;display:none;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.toast-erro{border:2px solid var(--danger);color:var(--danger);font-size:14px;font-weight:600;padding:13px 22px;box-shadow:0 8px 28px rgba(240,69,69,.4)}

/* MESA DE PLANEJAMENTO — assistente em etapas (estrutura → 1 tela por posição → revisão) */
.mesa-panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-48%) scale(.98);width:min(1000px,94vw);height:min(88vh,760px);background:var(--bg2);border:1px solid var(--border2);border-radius:16px;z-index:170;opacity:0;pointer-events:none;transition:opacity .18s,transform .18s;display:flex;flex-direction:column;box-shadow:0 24px 70px rgba(0,0,0,.55)}
.mesa-panel.open{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
.wz-hdr{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;flex-shrink:0}
.wz-hdr-txt{flex:1;min-width:0}
.wz-title{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wz-sub{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wz-steps{display:flex;align-items:center;gap:5px;flex-shrink:0}
.wz-seg{width:30px;height:7px;border-radius:999px;background:var(--bg4);transition:background .25s}
.wz-seg.done{background:var(--ok)}
.wz-seg.cur{background:var(--accent)}
.wz-stepnum{font-size:10px;font-family:var(--mono);color:var(--text3);margin-left:5px}

.wz-body{flex:1;display:flex;min-height:0}
.wz-main{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:14px;min-width:0}
.wz-aside{width:220px;flex-shrink:0;border-left:1px solid var(--border);background:var(--bg3);padding:16px 14px;display:flex;flex-direction:column;gap:12px;overflow-y:auto}
.wz-aside-l{font-size:9px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.07em}
.wz-croqui{width:100%;max-width:170px;align-self:center}
.wz-legend{display:flex;flex-direction:column;gap:7px}
.wz-leg{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--text2)}
.wz-leg.off{opacity:.28}
.wz-leg.foco{color:var(--text);font-weight:600}
.wz-leg-sw{width:11px;height:11px;border-radius:3px;flex-shrink:0}
.wz-leg-q{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--text3);white-space:nowrap}

.wz-q{font-size:20px;font-weight:600;line-height:1.28}
.wz-q-sub{font-size:12.5px;color:var(--text3);margin-top:-7px;line-height:1.45}
.wz-sec-l{font-size:12.5px;font-weight:600;color:var(--text2)}

.wz-opts{display:flex;flex-direction:column;gap:10px}
.wz-opt{display:flex;align-items:center;gap:13px;width:100%;border:2px solid var(--border);border-radius:14px;padding:12px 15px;background:var(--bg3);cursor:pointer;text-align:left;font-family:var(--sans);color:var(--text);transition:transform .1s,border-color .12s,background .12s;box-shadow:0 3px 0 var(--border)}
.wz-opt:hover{border-color:var(--border2);transform:translateY(-1px)}
.wz-opt:active{transform:translateY(2px);box-shadow:none}
.wz-opt.lock{cursor:default;transform:none}
.wz-opt.c-acc.on{border-color:var(--accent);background:rgba(59,127,255,.12);box-shadow:0 3px 0 var(--accent)}
.wz-opt.c-aco.on{border-color:var(--text3);background:rgba(142,154,176,.14);box-shadow:0 3px 0 var(--text3)}
.wz-opt.c-roxo.on{border-color:var(--roxo);background:rgba(124,58,237,.14);box-shadow:0 3px 0 var(--roxo)}
.wz-opt.c-orange.on{border-color:var(--orange);background:rgba(249,115,22,.14);box-shadow:0 3px 0 var(--orange)}
.wz-opt-ic{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:21px;background:var(--bg4);flex-shrink:0}
.wz-opt-tx{display:flex;flex-direction:column;gap:2px;min-width:0}
.wz-opt-t{font-size:14.5px;font-weight:500}
.wz-opt-d{font-size:11.5px;color:var(--text3);line-height:1.35}
.wz-opt-ck{margin-left:auto;font-size:17px;opacity:0;transition:opacity .12s;flex-shrink:0}
.wz-opt.on .wz-opt-ck{opacity:1}
.wz-opt.lock .wz-opt-ck{opacity:.55}

.wz-nlotes{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.wz-nbtn{width:50px;height:50px;border-radius:14px;border:2px solid var(--border);background:var(--bg3);color:var(--text);font-size:17px;font-weight:600;cursor:pointer;font-family:var(--sans);box-shadow:0 3px 0 var(--border);transition:transform .1s,border-color .12s}
.wz-nbtn:hover{border-color:var(--border2)}
.wz-nbtn:active{transform:translateY(2px);box-shadow:none}
.wz-nbtn.on{border-color:var(--accent);background:rgba(59,127,255,.14);box-shadow:0 3px 0 var(--accent)}
.wz-nbtn.mais{width:auto;padding:0 14px;font-size:13px;color:var(--text2)}

.mesa-alloc-track{height:11px;background:var(--bg3);border:1px solid var(--border);border-radius:999px;overflow:hidden}
.mesa-alloc-fill{height:100%;background:var(--ok);border-radius:999px;transition:width .18s}
.mesa-alloc-fill.over{background:var(--warn)}
.mesa-alloc-lbl{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:5px}

.wz-lote{border:2px solid var(--border);border-radius:14px;padding:12px 14px;background:var(--bg3);display:flex;flex-direction:column;gap:11px}
.wz-lote-hdr{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.wz-lote-tag{font-size:12px;font-family:var(--mono);font-weight:600;color:var(--text);background:var(--bg4);border-radius:999px;padding:4px 12px;flex-shrink:0}
.wz-qtd-inp{width:80px;text-align:center;font-size:15px;padding:8px 6px}
.wz-qtd-suf{font-size:11px;color:var(--text3);font-family:var(--mono)}
.wz-obs-inp{flex:1;min-width:110px}
.wz-lote-acoes{display:flex;gap:5px;margin-left:auto}
.wz-lote-acoes .btn-g{padding:4px 9px;height:30px;font-size:12px}
.wz-lote-acoes .danger{color:var(--danger);border-color:var(--danger)}
.wz-pergunta{font-size:11.5px;color:var(--text2)}
.wz-trilha{display:flex;gap:6px;flex-wrap:wrap}
.wz-st{border:2px solid var(--border);background:var(--bg2);border-radius:11px;padding:7px 9px;min-width:78px;font-size:10.5px;color:var(--text2);cursor:pointer;font-family:var(--sans);display:flex;flex-direction:column;align-items:center;gap:3px;transition:transform .1s,border-color .12s}
.wz-st:hover{border-color:var(--border2);color:var(--text)}
.wz-st:active{transform:translateY(2px)}
.wz-st-ic{font-size:15px;line-height:1}
.wz-st.done{border-color:rgba(45,191,126,.5);background:rgba(45,191,126,.10);color:var(--ok)}
.wz-st.cur{border-color:var(--ok);background:var(--ok);color:#fff;font-weight:600}
.wz-st.intent{border-color:var(--warn);border-style:dashed;color:var(--warn)}
.mesa-intencao{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.mesa-intencao-lbl{font-size:10.5px;color:var(--text3);font-family:var(--mono)}
.mesa-chip{background:var(--bg2);border:1px solid var(--border);border-radius:999px;padding:5px 11px;font-size:10.5px;color:var(--text2);cursor:pointer;font-family:var(--sans);transition:all .12s}
.mesa-chip:hover{border-color:var(--border2);color:var(--text)}
.mesa-chip.on{background:var(--warn);border-color:var(--warn);color:#111}

.mesa-hint{font-size:12px;color:var(--text3);font-family:var(--mono);padding:16px;text-align:center;background:var(--bg3);border-radius:12px}
.mesa-existentes{display:flex;flex-direction:column;gap:5px}
.mesa-existente-row{display:flex;align-items:center;gap:10px;font-size:11px;font-family:var(--mono);color:var(--text2);padding:8px 11px;border:1px solid var(--border);border-radius:9px;cursor:pointer}
.mesa-existente-row:hover{border-color:var(--border2)}
.mesa-existente-row.ok{border-color:rgba(45,191,126,.3)}
.mesa-existente-num{color:var(--text)}
.mesa-existente-status{color:var(--text3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mesa-existente-badge{color:var(--ok)}

.wz-rev{display:flex;flex-direction:column;gap:8px}
.wz-rev-row{display:flex;align-items:center;gap:10px;border:2px solid var(--border);border-radius:12px;padding:11px 13px;background:var(--bg3);font-size:12.5px;color:var(--text2)}
.wz-rev-row.alerta{border-color:rgba(245,166,35,.5)}
.wz-rev-sw{width:11px;height:11px;border-radius:3px;flex-shrink:0}
.wz-rev-t{color:var(--text);font-weight:500}
.wz-rev-q{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--text3);text-align:right}
.wz-rev-warn{font-size:11px;color:var(--warn);font-family:var(--mono)}
.wz-final{display:flex;align-items:center;gap:10px;font-size:19px;font-weight:600}

.wz-footer{flex-shrink:0;border-top:1px solid var(--border);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--bg2);border-radius:0 0 16px 16px}
.wz-btn{border-radius:12px;padding:11px 22px;font-size:13.5px;font-weight:600;font-family:var(--sans);cursor:pointer;border:2px solid var(--border);background:transparent;color:var(--text2);box-shadow:0 3px 0 var(--border);transition:transform .1s,opacity .12s}
.wz-btn:hover{color:var(--text);border-color:var(--border2)}
.wz-btn:active{transform:translateY(3px);box-shadow:none}
.wz-btn.prim{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 3px 0 #1F5AD6}
.wz-btn.go{background:var(--ok);border-color:var(--ok);color:#fff;box-shadow:0 3px 0 #1E8F5C}
.wz-btn:disabled{opacity:.35;cursor:not-allowed;box-shadow:none;transform:none}

<script>
function navTo(p){ location.href = p; }

const POS_LABEL = { nucleo:"Núcleo", carcaca:"Carcaça", luva:"Luva" };
const MATERIAL_LABEL = { metal_duro:"Metal Duro", aco:"Aço" };

let ITENS_CAD = [];     // itens cadastrados (fonte da busca p/ criar lote)
let COMPONENTES = [];   // material_lote_componentes — cada linha já É um lote (uma posição/núcleo,carcaça,luva/
                        // com sua própria quantidade e numeração, independente das outras posições do item)
let ESTAGIOS = [];      // material_estagios (5 colunas reais, ordem 1-5)
let ULTIMOS = [];       // material_ultimo_evento (por componente_id)
let _dragCompId = null;
let _dragTipo = null;
let _dragEndedAt = 0;
let _filtroTexto = "";     // texto da busca, também usado pra esmaecer cartões no board
let _andonFiltro = null;   // 'prontos' | 'parados' | 'compra' | null — clique nos contadores da toolbar
let _tvMode = false;       // modo TV: monitor fixo na parede, só leitura, sem drag/clique

// modo TV — liga/desliga sem recarregar; a URL guarda o estado (?tv=1) pra uma TV fixa poder só abrir o link salvo
function toggleTvMode(){
  _tvMode = !_tvMode;
  aplicarTvMode();
  renderBoard();
}
function aplicarTvMode(){
  document.body.classList.toggle("tv-mode", _tvMode);
  const btn = document.getElementById("tvToggleBtn");
  if(btn) btn.textContent = _tvMode ? "✕ Sair do modo TV" : "📺 Modo TV";
  const url = new URL(location.href);
  if(_tvMode) url.searchParams.set("tv","1"); else url.searchParams.delete("tv");
  history.replaceState(null, "", url.toString());
}

async function supaWrite(path, method, body, prefer){
  const r = await fetch(SUPA_URL + path, {
    method,
    headers:{ apikey:SUPA_KEY, Authorization:"Bearer "+SUPA_KEY, "Content-Type":"application/json", Prefer: prefer||"return=representation" },
    body: body!==undefined ? JSON.stringify(body) : undefined
  });
  if(r.status===204) return null;
  const j = await r.json().catch(()=>null);
  if(!r.ok) throw new Error((j&&j.message)||("HTTP "+r.status));
  return j;
}
function toast(msg, tipo){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast" + (tipo==="erro" ? " toast-erro" : "");
  t.style.display = "block";
  clearTimeout(t._tm);
  t._tm = setTimeout(()=>{ t.style.display="none"; }, tipo==="erro"?4800:2200);
}
function setSync(s){ document.getElementById("slbl").textContent = s; }

// colunas: todas reais em material_estagios, incluindo "Aguardando" (ordem 0) — permite arrastar de volta pra lá
function colunas(){
  return ESTAGIOS.slice().sort((a,b)=>a.ordem-b.ordem);
}
function colunaAplica(col, tipoMaterial){
  return tipoMaterial==="metal_duro" ? col.aplica_metal_duro : col.aplica_aco;
}
// rótulo "só Aço" / "só Metal Duro" quando a coluna não vale pros dois materiais
function subLabelColuna(col){
  if(col.aplica_metal_duro && !col.aplica_aco) return "só Metal Duro";
  if(col.aplica_aco && !col.aplica_metal_duro) return "só Aço";
  return "";
}

function ultimoDoComponente(compId){
  return ULTIMOS.find(u=>u.componente_id===compId) || null;
}
function ordemAtual(compId){
  const u = ultimoDoComponente(compId);
  return u ? u.estagio_ordem : 0;
}
function itemDoComponente(comp){
  return ITENS_CAD.find(i=>i.id===comp.item_id) || null;
}
function diasParado(compId){
  const u = ultimoDoComponente(compId);
  if(!u) return null;
  const d = new Date(u.data_evento);
  if(isNaN(d)) return null;
  return Math.max(0, Math.floor((Date.now()-d.getTime())/86400000)); // relógio do servidor pode diferir por ms
}
// outros lotes da mesma posição (núcleo/carcaça/luva) do mesmo item — pra numerar "lote N de M"
function irmaosMesmaPosicao(comp){
  return COMPONENTES.filter(c=>c.item_id===comp.item_id && c.posicao===comp.posicao);
}

// chave de urgência: vencido (mais atrasado primeiro) > vence hoje/em breve (mais próximo primeiro) > sem prazo (mais dias parado primeiro)
function chavePrioridade(comp){
  const item = itemDoComponente(comp);
  const dias = diasParado(comp.id) || 0;
  let prazoRank = 2, prazoValor = 0;
  if(item && item.prazo_entrega){
    const hoje = new Date(); hoje.setHours(0,0,0,0);
    const pz = new Date(String(item.prazo_entrega).slice(0,10)+"T00:00:00");
    if(!isNaN(pz)){
      const diffDias = Math.round((pz-hoje)/86400000);
      prazoRank = diffDias<0 ? 0 : 1;
      prazoValor = diffDias;
    }
  }
  return { prazoRank, prazoValor, dias };
}
function ordenarPorUrgencia(comps){
  return comps.slice().sort((a,b)=>{
    const ka=chavePrioridade(a), kb=chavePrioridade(b);
    if(ka.prazoRank!==kb.prazoRank) return ka.prazoRank-kb.prazoRank;
    if(ka.prazoRank<2 && ka.prazoValor!==kb.prazoValor) return ka.prazoValor-kb.prazoValor;
    return kb.dias-ka.dias;
  });
}

// filtro de texto (mesmo campo que cria lote) — só esmaece, nunca esconde
function cardBateFiltro(item){
  if(!_filtroTexto) return true;
  if(!item) return false;
  const cod = String(item.codigo_peca||"").toUpperCase();
  const ped = String(item.pedido||"").toUpperCase();
  const os  = String(item.os||"").toUpperCase();
  return cod.includes(_filtroTexto) || ped.includes(_filtroTexto) || os.includes(_filtroTexto);
}
// filtro dos contadores Andon da toolbar
function cardBateAndon(comp){
  if(!_andonFiltro) return true;
  const maxOrdem = Math.max(...ESTAGIOS.map(e=>e.ordem), 0);
  if(_andonFiltro==="parados"){
    const d = diasParado(comp.id);
    return d!==null && d>=3 && ordemAtual(comp.id)<maxOrdem;
  }
  if(_andonFiltro==="compra"){
    const compraCol = ESTAGIOS.find(e=>/compra/i.test(e.descricao));
    return !!compraCol && ordemAtual(comp.id)===compraCol.ordem;
  }
  if(_andonFiltro==="prontos"){
    const item = itemDoComponente(comp);
    if(!item) return false;
    const r = materialResumoItem(item.id, {componentes:COMPONENTES, ultimos:ULTIMOS, estagios:ESTAGIOS});
    return !!(r && r.completo);
  }
  return true;
}
function calcAndon(){
  const maxOrdem = Math.max(...ESTAGIOS.map(e=>e.ordem), 0);
  let kitsProntos = 0;
  const itensComLote = new Set(COMPONENTES.map(c=>c.item_id));
  itensComLote.forEach(itemId=>{
    const r = materialResumoItem(itemId, {componentes:COMPONENTES, ultimos:ULTIMOS, estagios:ESTAGIOS});
    if(r && r.completo) kitsProntos++;
  });
  const parados = COMPONENTES.filter(c=>{
    const d = diasParado(c.id);
    return d!==null && d>=3 && ordemAtual(c.id)<maxOrdem;
  }).length;
  const compraCol = ESTAGIOS.find(e=>/compra/i.test(e.descricao));
  const emCompra = compraCol ? COMPONENTES.filter(c=>ordemAtual(c.id)===compraCol.ordem).length : 0;
  return { kitsProntos, parados, emCompra };
}
function renderAndon(){
  const box = document.getElementById("andonBar");
  if(!box) return;
  const a = calcAndon();
  box.innerHTML = `
    <button class="andon-chip ok${_andonFiltro==='prontos'?' active':''}" onclick="toggleAndonFiltro('prontos')" title="Itens com todos os lotes prontos p/ roteiro">✓ ${a.kitsProntos} pronto(s) p/ roteiro</button>
    <button class="andon-chip warn${_andonFiltro==='parados'?' active':''}" onclick="toggleAndonFiltro('parados')" title="Cartões sem movimento há 3 dias ou mais">⏱ ${a.parados} parado(s) ≥3d</button>
    <button class="andon-chip${_andonFiltro==='compra'?' active':''}" onclick="toggleAndonFiltro('compra')" title="Cartões parados na etapa de Compra">🛒 ${a.emCompra} em compra</button>
  `;
}
function toggleAndonFiltro(tipo){
  _andonFiltro = (_andonFiltro===tipo) ? null : tipo;
  renderBoard();
}

let _mostrarConcluidos = false;
function toggleConcluidos(){
  _mostrarConcluidos = !_mostrarConcluidos;
  renderBoard();
}

// ---- BOARD ----
function renderBoard(){
  renderAndon();
  const cols = colunas();
  const maxOrdem = Math.max(...ESTAGIOS.map(e=>e.ordem), 0);
  const wrap = document.getElementById("boardWrap");
  if(!COMPONENTES.length){
    wrap.innerHTML = `<div class="board-empty">
      <div style="font-size:24px;margin-bottom:8px">📦</div>
      <div>Nenhum lote criado ainda.</div>
      <div style="margin-top:4px">Busque um item no campo acima e clique nele para criar o primeiro lote.</div>
    </div>`;
    return;
  }
  wrap.innerHTML = cols.map(col=>{
    let comps = ordenarPorUrgencia(COMPONENTES.filter(c=>ordemAtual(c.id)===col.ordem));
    let concluidosCount = 0;
    // coluna Pronto: cartão cujo ITEM já está 100% completo (todas as posições, todos os lotes) some da vista por padrão
    if(col.ordem===maxOrdem){
      const itemCompleto = c=>{
        const item = itemDoComponente(c);
        const r = item ? materialResumoItem(item.id, {componentes:COMPONENTES, ultimos:ULTIMOS, estagios:ESTAGIOS}) : null;
        return !!(r && r.completo);
      };
      const pendentes = comps.filter(c=>!itemCompleto(c));
      const concluidos = comps.filter(c=>itemCompleto(c));
      concluidosCount = concluidos.length;
      comps = _mostrarConcluidos ? comps : pendentes;
    }
    const body = comps.length
      ? comps.map(c=>renderCard(c)).join("")
      : '<div class="col-empty">vazio</div>';
    const toggleHtml = concluidosCount
      ? `<button class="col-cnt" style="cursor:pointer;background:rgba(45,191,126,.15);color:var(--ok);border:none" onclick="toggleConcluidos()">${_mostrarConcluidos?'ocultar':'✓'} ${concluidosCount} concluído(s)</button>`
      : "";
    const cor = col.ordem===0 ? "var(--text3)" : (col.ordem>=maxOrdem ? "var(--ok)" : "var(--warn)");
    const sub = subLabelColuna(col);
    return `<div class="col${col.ordem===0?' aguardando':''}" data-ordem="${col.ordem}">
      <div class="col-hdr"><div class="col-stripe" style="background:${cor}"></div><div style="flex:1;min-width:0"><div class="col-name">${escHtml(col.descricao)}</div>${sub?`<div class="col-sub">${sub}</div>`:''}</div><div class="col-cnt">${comps.length}</div>${toggleHtml}</div>
      <div class="col-body" data-ordem="${col.ordem}" ondragover="onDragOver(event,${col.ordem})" ondragleave="onDragLeave(event)" ondrop="onDrop(event,${col.ordem})">${body}</div>
    </div>`;
  }).join("");
}

function renderCard(comp){
  const item = itemDoComponente(comp);
  const cod = item ? item.codigo_peca : "(?)";
  const dias = diasParado(comp.id);
  const diasHtml = dias===null ? "" : `<span class="mc-dias${dias>=3?' atraso':''}">${dias===0?"hoje":dias+"d parado"}</span>`;
  const resumoItem = item ? materialResumoItem(item.id, {componentes:COMPONENTES, ultimos:ULTIMOS, estagios:ESTAGIOS}) : null;
  const irmaos = irmaosMesmaPosicao(comp);
  const loteTag = irmaos.length>1 ? ` · lote ${comp.lote_numero} de ${irmaos.length}` : "";
  const lotesResumoHtml = resumoItem && resumoItem.total>1
    ? `<div class="mc-lotes ${resumoItem.completo?'ok':'warn'}">${resumoItem.completo ? `✓ todos os ${resumoItem.total} lotes prontos` : `⚠ ${resumoItem.prontos} de ${resumoItem.total} lotes prontos`}</div>`
    : "";
  const maxOrdem = Math.max(...ESTAGIOS.map(e=>e.ordem), 0);
  const estaNoPronto = ordemAtual(comp.id)>=maxOrdem;
  let prazoHtml = "";
  if(item && item.prazo_entrega && !estaNoPronto){
    const hoje = new Date();
    const hojeISO = hoje.getFullYear()+"-"+String(hoje.getMonth()+1).padStart(2,"0")+"-"+String(hoje.getDate()).padStart(2,"0");
    const pz = String(item.prazo_entrega).slice(0,10);
    const cls = pz<hojeISO ? " atrasado" : (pz===hojeISO ? " hoje" : "");
    prazoHtml = `<span class="mc-prazo${cls}">📅 ${new Date(pz+"T00:00:00").toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"})}</span>`;
  }
  const dimCls = (cardBateFiltro(item) && cardBateAndon(comp)) ? "" : " mc-dim";
  // modo TV: sem drag, sem clique, sem hover — só leitura, pra monitor fixo na parede
  const interAttrs = _tvMode ? "" : `draggable="true"
      ondragstart="onDragStart(event,${comp.id},'${comp.tipo_material}')" ondragend="onDragEnd(event)"
      onmouseenter="destacarItem(${comp.item_id})" onmouseleave="limparDestaqueItem()"
      onclick="abrirComponente(${comp.id})"`;
  return `<div class="mat-card${dimCls}" data-comp-id="${comp.id}" data-item-id="${comp.item_id}" ${interAttrs}>
    <div class="mc-top"><div class="mc-cod">${escHtml(cod)}</div><span class="mc-pos ${comp.posicao}">${POS_LABEL[comp.posicao]}</span></div>
    <div class="mc-meta">${item?("Pedido "+escHtml(item.pedido||"—")+" · OS "+escHtml(item.os||"—")):""}${loteTag}</div>
    <div class="mc-bottom"><span class="mc-mat">${MATERIAL_LABEL[comp.tipo_material]}</span><span class="mc-qtd">${comp.quantidade} pç</span>${prazoHtml}${diasHtml}</div>
    ${trilhaHtml(comp)}
    ${lotesResumoHtml}
  </div>`;
}
// pontinhos com as etapas aplicáveis ao material do cartão, preenchidos até a etapa atual
function trilhaHtml(comp){
  const aplicaveis = ESTAGIOS.filter(e=>colunaAplica(e, comp.tipo_material)).sort((a,b)=>a.ordem-b.ordem);
  if(aplicaveis.length<2) return "";
  const atual = ordemAtual(comp.id);
  return `<div class="mc-trilha">${aplicaveis.map(e=>`<span class="mc-dot${e.ordem<=atual?' filled':''}"></span>`).join("")}</div>`;
}
// realça no board os outros lotes do mesmo item (qualquer posição) — mostra sob demanda o quanto falta pra peça inteira
function destacarItem(itemId){
  document.querySelectorAll(`.mat-card[data-item-id="${itemId}"]`).forEach(el=>el.classList.add("mc-lote-hover"));
}
function limparDestaqueItem(){
  document.querySelectorAll(".mat-card.mc-lote-hover").forEach(el=>el.classList.remove("mc-lote-hover"));
}

// ---- DRAG AND DROP ----
function onDragStart(ev, compId, tipo){
  _dragCompId = compId; _dragTipo = tipo;
  ev.target.classList.add("dragging");
  ev.dataTransfer.effectAllowed = "move";
  destacarColunasDrag(tipo, ordemAtual(compId));
}
function onDragEnd(ev){
  ev.target.classList.remove("dragging");
  _dragEndedAt = Date.now();
  _dragCompId = null; _dragTipo = null;
  limparDestaqueColunasDrag();
}
// ao começar o arraste, mostra de cara em quais colunas o cartão pode ser solto (evita descobrir só tentando)
function destacarColunasDrag(tipo, ordemDoAtual){
  document.querySelectorAll(".col-body").forEach(el=>{
    const ordem = parseInt(el.dataset.ordem,10);
    const col = colunas().find(c=>c.ordem===ordem);
    if(!col || ordem===ordemDoAtual){ el.classList.remove("drag-valid","drag-invalid"); return; }
    const valida = colunaAplica(col, tipo);
    el.classList.toggle("drag-valid", valida);
    el.classList.toggle("drag-invalid", !valida);
  });
}
function limparDestaqueColunasDrag(){
  document.querySelectorAll(".col-body").forEach(el=>el.classList.remove("drag-valid","drag-invalid"));
}
function onDragOver(ev, ordem){
  const col = colunas().find(c=>c.ordem===ordem);
  if(!col || !_dragTipo || !colunaAplica(col,_dragTipo)) return; // não permite — sem preventDefault o navegador bloqueia o drop
  ev.preventDefault();
  ev.currentTarget.classList.add("dragover");
}
function onDragLeave(ev){
  ev.currentTarget.classList.remove("dragover");
}
async function onDrop(ev, ordem){
  ev.preventDefault();
  ev.currentTarget.classList.remove("dragover");
  const compId = _dragCompId;
  const comp = COMPONENTES.find(c=>c.id===compId);
  if(!comp) return;
  const col = colunas().find(c=>c.ordem===ordem);
  if(!col || !colunaAplica(col, comp.tipo_material)){
    toast("Essa etapa não se aplica a "+MATERIAL_LABEL[comp.tipo_material], "erro");
    return;
  }
  if(ordemAtual(compId)===ordem) return; // já está aí
  await registrarEvento(comp, col);
}

async function registrarEvento(comp, col){
  try{
    const novo = await supaWrite("/rest/v1/material_eventos","POST",{
      componente_id: comp.id,
      estagio_id: col.id, estagio_descricao: col.descricao, estagio_ordem: col.ordem
    });
    const row = Array.isArray(novo)?novo[0]:novo;
    const idx = ULTIMOS.findIndex(u=>u.componente_id===comp.id);
    const novoUltimo = { componente_id:comp.id, estagio_id:col.id, estagio_descricao:col.descricao, estagio_ordem:col.ordem, data_evento: row?row.data_evento:new Date().toISOString() };
    if(idx>=0) ULTIMOS[idx]=novoUltimo; else ULTIMOS.push(novoUltimo);
    renderBoard();
  }catch(e){ toast("Erro ao registrar: "+e.message, "erro"); }
}

// ---- BUSCA / CRIAR LOTE ----
let _suggTimer=null;
function onBusca(){
  const q = document.getElementById("buscaInput").value.trim();
  _filtroTexto = q.toUpperCase();
  renderBoard(); // mesmo campo também esmaece no board os cartões que não batem, sem precisar de outro controle
  clearTimeout(_suggTimer);
  if(q.length<2){ document.getElementById("sugg").style.display="none"; return; }
  _suggTimer = setTimeout(()=>buscarSugg(q), 180);
}
function buscarSugg(q){
  const qU = q.toUpperCase();
  const lista = ITENS_CAD.filter(r=>{
    const cod = String(r.codigo_peca||"").trim();
    return cod.toUpperCase().includes(qU) || String(r.pedido||"").toUpperCase().includes(qU) || String(r.os||"").toUpperCase().includes(qU);
  }).slice(0,12);
  const box = document.getElementById("sugg");
  if(!lista.length){
    box.innerHTML = `<div class="sugg-item" style="cursor:default"><div style="color:var(--text3);font-size:12px">Nenhum item encontrado com "${escHtml(q)}". Cadastre em Cadastro › Item.</div></div>`;
  }else{
    box.innerHTML = lista.map(r=>{
      const nLotes = COMPONENTES.filter(c=>c.item_id===r.id).length;
      const tag = nLotes ? `<span class="badge-pill" style="background:rgba(59,127,255,.15);color:var(--accent)">${nLotes} lote(s)</span>` : `<span class="badge-pill" style="background:var(--bg4);color:var(--text3)">sem lote</span>`;
      return `<div class="sugg-item" onclick="abrirMesa(${r.id})">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:6px">
          <div class="sugg-cod">${escHtml(r.codigo_peca)}</div>${tag}
        </div>
        <div class="sugg-desc">${[r.pedido?"Pedido: "+escHtml(r.pedido):"",r.os?"OS: "+escHtml(r.os):"",r.quantidade?"Qtd: "+escHtml(r.quantidade)+" pç":""].filter(Boolean).join(" · ")}</div>
      </div>`;
    }).join("");
  }
  box.style.display="block";
}
document.addEventListener("click", e=>{
  if(!e.target.closest(".search-wrap")) document.getElementById("sugg").style.display="none";
});

// ---- MESA DE PLANEJAMENTO (assistente em etapas) ----
// Planeja os lotes de um item ANTES de qualquer cartão existir no Kanban, uma decisão por tela:
//   etapa 0 = estrutura da peça (quais posições existem) → 1..N = uma tela por posição ativa → N+1 = revisão.
// Cada posição (núcleo/carcaça/luva) planeja sua PRÓPRIA lista de lotes, independente das outras — o núcleo
// pode ter 2 lotes enquanto a carcaça tem só 1, porque cada material tem sua própria lógica de fornecimento.
// Estado é só rascunho em memória até confirmar na última etapa — nada é gravado antes disso.
let _mesaItem = null;
let _mesaEstrutura = { nucleo:null, carcaca:false, luva:false }; // molde: quais posições existem na peça
let _mesaPosicoes = {};    // { nucleo:[linha,...], carcaca:[...], luva:[...] } — só existe a chave se a posição está ativa
let _mesaTempSeq = 1;
let _mesaConcluirChecked = false; // estado do checkbox "planejamento concluído" — em variável pra sobreviver a um clique sem precisar re-renderizar tudo
let _mesaStep = 0;         // etapa atual do assistente
let _mesaStepRenderizado = -1; // qual etapa está desenhada — troca de etapa volta o scroll pro topo, re-render da mesma etapa preserva

function abrirMesa(itemId){
  document.getElementById("sugg").style.display="none";
  document.getElementById("buscaInput").value="";
  _filtroTexto = "";
  renderBoard();
  const item = ITENS_CAD.find(i=>i.id===itemId);
  if(!item) return;
  _mesaItem = item;
  // a estrutura já reflete o que o item já tem salvo — reabrir a Mesa não pode "esconder" carcaça/luva já criadas
  const existentesDoItem = COMPONENTES.filter(c=>c.item_id===itemId);
  const nucleoExistente = existentesDoItem.find(c=>c.posicao==="nucleo");
  _mesaEstrutura = {
    nucleo: nucleoExistente ? nucleoExistente.tipo_material : null,
    carcaca: existentesDoItem.some(c=>c.posicao==="carcaca"),
    luva: existentesDoItem.some(c=>c.posicao==="luva")
  };
  _mesaPosicoes = {};
  mesaSincronizar(); // garante os arrays vazios pra "+ novo lote" já funcionar sem precisar re-clicar nos chips
  _mesaConcluirChecked = !!item.plano_separacao_concluido;
  _mesaStep = 0;
  _mesaStepRenderizado = -1;
  renderMesa();
  abrirMesaPainel();
}
function abrirMesaPainel(){
  document.getElementById("overlay").classList.add("open");
  document.getElementById("mesaPanel").classList.add("open");
}
function fecharMesa(){
  document.getElementById("overlay").classList.remove("open");
  document.getElementById("mesaPanel").classList.remove("open");
}

// posições ativas, na ordem em que viram etapa do assistente
function mesaPassos(){
  return ["nucleo","carcaca","luva"].filter(p => p==="nucleo" ? !!_mesaEstrutura.nucleo : !!_mesaEstrutura[p]);
}
function mesaTotalSteps(){ return mesaPassos().length + 2; } // estrutura + posições + revisão
// posição já tem lote salvo de verdade? então a estrutura dela não pode mais ser desmarcada aqui
function mesaTemLoteSalvo(pos){
  return !!(_mesaItem && COMPONENTES.some(c=>c.item_id===_mesaItem.id && c.posicao===pos));
}
function mesaTotalLinhasNovas(){
  return ["nucleo","carcaca","luva"].reduce((s,p)=>s+((_mesaPosicoes[p]||[]).length),0);
}
function mesaProximo(){
  if(_mesaStep===0 && !_mesaEstrutura.nucleo){ toast("Escolha o material do núcleo para continuar","erro"); return; }
  if(_mesaStep < mesaTotalSteps()-1){ _mesaStep++; renderMesa(); }
}
function mesaVoltar(){
  if(_mesaStep>0){ _mesaStep--; renderMesa(); }
}

function mesaNovaLinhaObj(qtd){
  return { tempId:_mesaTempSeq++, quantidade:qtd, observacao:"", fato:0, intencao:null };
}
// quanto já está alocado numa posição (lotes já salvos + rascunho) — cada posição soma só a si mesma
function mesaAlocado(pos){
  const drafts = (_mesaPosicoes[pos]||[]).reduce((s,l)=>s+(parseInt(l.quantidade,10)||0),0);
  return drafts + mesaAlocadoSalvo(pos);
}
function mesaAlocadoSalvo(pos){
  return _mesaItem
    ? COMPONENTES.filter(c=>c.item_id===_mesaItem.id && c.posicao===pos).reduce((s,c)=>s+(parseInt(c.quantidade,10)||0),0)
    : 0;
}
// garante que exista (ou não) a lista de rascunho de cada posição, conforme a estrutura da peça
function mesaSincronizar(){
  ["nucleo","carcaca","luva"].forEach(pos=>{
    const ativo = pos==="nucleo" ? !!_mesaEstrutura.nucleo : !!_mesaEstrutura[pos];
    if(ativo && !_mesaPosicoes[pos]) _mesaPosicoes[pos] = [];
    if(!ativo && _mesaPosicoes[pos]) delete _mesaPosicoes[pos];
  });
}
function mesaSetNucleo(tipo){
  if(mesaTemLoteSalvo("nucleo")){ toast("O núcleo já tem lote criado — o material não pode mudar","erro"); return; }
  _mesaEstrutura.nucleo = (_mesaEstrutura.nucleo===tipo) ? null : tipo;
  mesaSincronizar();
  renderMesa();
}
function mesaToggle(pos){
  if(mesaTemLoteSalvo(pos)){ toast(POS_LABEL[pos]+" já tem lote criado — não dá pra remover da estrutura aqui","erro"); return; }
  _mesaEstrutura[pos] = !_mesaEstrutura[pos];
  mesaSincronizar();
  renderMesa();
}

// "em quantos lotes?" — cria/remove linhas de rascunho e reparte a quantidade que falta alocar entre elas
function mesaDefinirNLotes(pos, n){
  const linhas = _mesaPosicoes[pos] || (_mesaPosicoes[pos] = []);
  if(n < linhas.length) linhas.splice(n);
  else while(linhas.length < n) linhas.push(mesaNovaLinhaObj(1));
  mesaRepartir(pos);
  renderMesa();
}
function mesaRepartir(pos){
  const linhas = _mesaPosicoes[pos] || [];
  if(!linhas.length) return;
  const total = parseInt(_mesaItem.quantidade,10)||0;
  const restante = Math.max(0, total - mesaAlocadoSalvo(pos));
  const base = Math.floor(restante/linhas.length), resto = restante - base*linhas.length;
  linhas.forEach((l,i)=>{ l.quantidade = Math.max(1, base + (i<resto?1:0)); });
}
function mesaAdicionarLinha(pos){
  const total = parseInt(_mesaItem.quantidade,10)||0;
  const restante = Math.max(0, total-mesaAlocado(pos));
  (_mesaPosicoes[pos] || (_mesaPosicoes[pos]=[])).push(mesaNovaLinhaObj(restante||1));
  renderMesa();
}
function mesaDividir(pos, tempId){
  const linhas = _mesaPosicoes[pos]; if(!linhas) return;
  const idx = linhas.findIndex(l=>l.tempId===tempId);
  if(idx<0) return;
  const l = linhas[idx];
  const qtd = parseInt(l.quantidade,10)||0;
  if(qtd<2){ toast("Quantidade insuficiente para dividir", "erro"); return; }
  const metade1 = Math.ceil(qtd/2), metade2 = qtd-metade1;
  l.quantidade = metade1;
  const nova = mesaNovaLinhaObj(metade2);
  nova.observacao = l.observacao; nova.fato = l.fato; nova.intencao = l.intencao;
  linhas.splice(idx+1,0,nova);
  renderMesa();
}
function mesaDuplicar(pos, tempId){
  const linhas = _mesaPosicoes[pos]; if(!linhas) return;
  const idx = linhas.findIndex(l=>l.tempId===tempId);
  if(idx<0) return;
  const l = linhas[idx];
  const nova = mesaNovaLinhaObj(l.quantidade);
  nova.observacao = l.observacao; nova.fato = l.fato; nova.intencao = l.intencao;
  linhas.splice(idx+1,0,nova);
  renderMesa();
}
function mesaRemoverLinha(pos, tempId){
  if(!_mesaPosicoes[pos]) return;
  _mesaPosicoes[pos] = _mesaPosicoes[pos].filter(l=>l.tempId!==tempId);
  renderMesa();
}
// digitação de quantidade/observação: só atualiza estado + a barra daquela posição (renderMesa() completo perderia o foco do campo)
function mesaOnQtdInput(pos, tempId, val){
  const l = (_mesaPosicoes[pos]||[]).find(x=>x.tempId===tempId);
  if(!l) return;
  l.quantidade = val;
  mesaAtualizarBarra(pos);
}
function mesaOnQtdChange(pos, tempId){
  const l = (_mesaPosicoes[pos]||[]).find(x=>x.tempId===tempId);
  if(!l) return;
  const n = parseInt(l.quantidade,10);
  l.quantidade = (n && n>0) ? n : 1;
  renderMesa();
}
function mesaOnObsInput(pos, tempId, val){
  const l = (_mesaPosicoes[pos]||[]).find(x=>x.tempId===tempId);
  if(l) l.observacao = val;
}
function mesaAtualizarBarra(pos){
  const fill = document.getElementById("mesaAllocFill_"+pos);
  const lbl = document.getElementById("mesaAllocLbl_"+pos);
  if(!fill || !_mesaItem) return;
  const total = parseInt(_mesaItem.quantidade,10)||0;
  const alocado = mesaAlocado(pos);
  const pct = total>0 ? Math.min(100, alocado/total*100) : 0;
  fill.style.width = pct+"%";
  fill.classList.toggle("over", alocado>total);
  lbl.textContent = alocado+" de "+total+" pç alocada"+(alocado>total?" — ⚠ passou do total":"");
}

// clique na trilha = FATO ("já está aqui" — vira evento real ao salvar); clicar de novo no mesmo ponto desfaz
function mesaSetFato(pos, tempId, ordem){
  const l = (_mesaPosicoes[pos]||[]).find(x=>x.tempId===tempId);
  if(!l) return;
  l.fato = (l.fato===ordem) ? 0 : ordem;
  if(l.fato>0) l.intencao = null;
  renderMesa();
}
// só disponível enquanto a linha ainda está em Aguardando (fato=0) — intenção nunca vira evento sozinha
function mesaSetIntencao(pos, tempId, ordem){
  const l = (_mesaPosicoes[pos]||[]).find(x=>x.tempId===tempId);
  if(!l) return;
  l.intencao = (l.intencao===ordem) ? null : ordem;
  renderMesa();
}

// ---- desenho da peça (croqui) e legenda: camadas concêntricas vistas de cima ----
const POS_COR = { nucleo:"var(--accent)", carcaca:"var(--roxo)", luva:"var(--orange)" };
const POS_ICONE = { nucleo:"⬤", carcaca:"⭕", luva:"🔘" };
function mesaCorPosicao(pos){
  return (pos==="nucleo" && _mesaEstrutura.nucleo==="aco") ? "var(--text3)" : POS_COR[pos];
}
function mesaCroquiSvg(destaque){
  const e = _mesaEstrutura;
  const camadas = [];
  if(e.luva) camadas.push({pos:"luva", r:78});
  if(e.carcaca) camadas.push({pos:"carcaca", r:57});
  if(e.nucleo) camadas.push({pos:"nucleo", r:35});
  if(!camadas.length){
    return `<svg viewBox="0 0 180 180" class="wz-croqui"><circle cx="90" cy="90" r="70" fill="none" stroke="var(--border2)" stroke-width="2" stroke-dasharray="7 7"/><text x="90" y="95" text-anchor="middle" font-size="11" fill="var(--text3)" font-family="IBM Plex Mono">nada ainda</text></svg>`;
  }
  const circles = camadas.map(c=>{
    const foco = !destaque || destaque===c.pos;
    const cor = mesaCorPosicao(c.pos);
    return `<circle cx="90" cy="90" r="${c.r}" fill="${cor}" fill-opacity="${foco?0.22:0.06}" stroke="${cor}" stroke-width="${(destaque&&foco)?4:2}" stroke-opacity="${foco?1:0.28}"/>`;
  }).join("");
  return `<svg viewBox="0 0 180 180" class="wz-croqui">${circles}</svg>`;
}
function mesaLegendaHtml(destaque){
  const e = _mesaEstrutura;
  const linhas = [
    {pos:"nucleo", on:!!e.nucleo, lbl:"Núcleo"+(e.nucleo?" · "+MATERIAL_LABEL[e.nucleo]:"")},
    {pos:"carcaca", on:!!e.carcaca, lbl:"Carcaça · Aço"},
    {pos:"luva", on:!!e.luva, lbl:"Luva · Aço"}
  ];
  return `<div class="wz-legend">` + linhas.map(x=>{
    const nNovos = (_mesaPosicoes[x.pos]||[]).length;
    const nSalvos = _mesaItem ? COMPONENTES.filter(c=>c.item_id===_mesaItem.id && c.posicao===x.pos).length : 0;
    const q = x.on ? (nSalvos+nNovos ? (nSalvos+nNovos)+" lote"+((nSalvos+nNovos)>1?"s":"") : "—") : "";
    return `<div class="wz-leg${x.on?"":" off"}${destaque===x.pos?" foco":""}">
      <span class="wz-leg-sw" style="background:${x.on?mesaCorPosicao(x.pos):"var(--border2)"}"></span>
      <span>${x.lbl}</span><span class="wz-leg-q">${q}</span></div>`;
  }).join("") + `</div>`;
}
function mesaAsideHtml(destaque){
  return `<div class="wz-aside-l">Estrutura da peça</div>
    ${mesaCroquiSvg(destaque)}
    ${mesaLegendaHtml(destaque)}`;
}

// ---- ETAPA 0: estrutura ----
function mesaOptHtml(on, cls, ic, titulo, desc, onclick, locked){
  return `<button type="button" class="wz-opt ${cls}${on?" on":""}${locked?" lock":""}" onclick="${onclick}">
    <span class="wz-opt-ic">${ic}</span>
    <span class="wz-opt-tx"><span class="wz-opt-t">${titulo}</span><span class="wz-opt-d">${desc}</span></span>
    <span class="wz-opt-ck">${locked?"🔒":"✅"}</span>
  </button>`;
}
function mesaStepEstruturaHtml(){
  const e = _mesaEstrutura;
  const lockN = mesaTemLoteSalvo("nucleo");
  return `<div class="wz-q">Do que essa peça é feita?</div>
  <div class="wz-q-sub">Marque tudo que compõe a estrutura. Depois você planeja os lotes de cada parte, uma por vez.</div>
  <div class="wz-sec-l">1 · Núcleo <span style="color:var(--text3);font-weight:400">(obrigatório — escolha o material)</span></div>
  <div class="wz-opts">
    ${mesaOptHtml(e.nucleo==="metal_duro","c-acc","⬤","Núcleo: Metal Duro","Comprado pronto — vai de Compra direto para Pronto.","mesaSetNucleo('metal_duro')",lockN)}
    ${mesaOptHtml(e.nucleo==="aco","c-aco","⬤","Núcleo: Aço","Passa por estoque, usinagem e tratamento térmico.","mesaSetNucleo('aco')",lockN)}
  </div>
  <div class="wz-sec-l">2 · Partes de aço em volta <span style="color:var(--text3);font-weight:400">(opcional)</span></div>
  <div class="wz-opts">
    ${mesaOptHtml(e.carcaca,"c-roxo","⭕","Carcaça de Aço","Anel que abraça o núcleo.","mesaToggle('carcaca')",mesaTemLoteSalvo("carcaca"))}
    ${mesaOptHtml(e.luva,"c-orange","🔘","Luva de Aço","Camada externa de reforço.","mesaToggle('luva')",mesaTemLoteSalvo("luva"))}
  </div>`;
}

// ---- ETAPAS 1..N: uma posição por tela ----
function estagioIcone(desc){
  const d = (desc||"").toLowerCase();
  if(d.includes("compra")) return "🛒";
  if(d.includes("receb")||d.includes("estoque")) return "📦";
  if(d.includes("usinag")) return "⚙️";
  if(d.includes("trat")) return "🔥";
  if(d.includes("pronto")) return "✅";
  return "•";
}
function mesaTrilhaHtml(pos, tempId, l, tipoMaterial){
  const maxOrdem = Math.max(...ESTAGIOS.map(e=>e.ordem), 0);
  const aplicaveis = ESTAGIOS.filter(e=>e.ordem>0 && colunaAplica(e,tipoMaterial)).sort((a,b)=>a.ordem-b.ordem);
  const aguardando = `<button type="button" class="wz-st${l.fato===0?" cur":""}" onclick="mesaSetFato('${pos}',${tempId},0)"><span class="wz-st-ic">⏳</span>Aguardando</button>`;
  const passos = aplicaveis.map(e=>{
    const cls = l.fato===e.ordem ? " cur" : (l.fato>0 && e.ordem<l.fato ? " done" : (l.fato===0 && l.intencao===e.ordem ? " intent" : ""));
    return `<button type="button" class="wz-st${cls}" onclick="mesaSetFato('${pos}',${tempId},${e.ordem})"><span class="wz-st-ic">${estagioIcone(e.descricao)}</span>${escHtml(e.ordem>=maxOrdem?"Pronto":e.descricao)}</button>`;
  }).join("");
  const intencaoHtml = l.fato===0 ? mesaIntencaoHtml(pos,tempId,l,tipoMaterial) : "";
  return `<div class="wz-pergunta">Onde este lote está agora?</div>
    <div class="wz-trilha">${aguardando}${passos}</div>
    ${intencaoHtml}`;
}
// "entra por" — só as etapas intermediárias (exclui Aguardando e Pronto, que não são pontos de entrada)
function mesaIntencaoHtml(pos, tempId, l, tipoMaterial){
  const maxOrdem = Math.max(...ESTAGIOS.map(e=>e.ordem), 0);
  const opcoes = ESTAGIOS.filter(e=>e.ordem>0 && e.ordem<maxOrdem && colunaAplica(e,tipoMaterial)).sort((a,b)=>a.ordem-b.ordem);
  if(!opcoes.length) return "";
  return `<div class="mesa-intencao"><span class="mesa-intencao-lbl">ainda vai começar — deve entrar por:</span>${opcoes.map(o=>
    `<button type="button" class="mesa-chip${l.intencao===o.ordem?" on":""}" onclick="mesaSetIntencao('${pos}',${tempId},${o.ordem})">${escHtml(o.descricao)}</button>`
  ).join("")}</div>`;
}
function mesaLinhaHtml(pos, l, i, tipoMaterial, offset){
  return `<div class="wz-lote">
    <div class="wz-lote-hdr">
      <span class="wz-lote-tag">Lote ${offset+i+1}</span>
      <input class="sp-inp wz-qtd-inp" type="number" min="1" value="${escHtml(String(l.quantidade))}" oninput="mesaOnQtdInput('${pos}',${l.tempId},this.value)" onchange="mesaOnQtdChange('${pos}',${l.tempId})">
      <span class="wz-qtd-suf">pç</span>
      <input class="sp-inp wz-obs-inp" placeholder="observação (opcional)" value="${escHtml(l.observacao||"")}" oninput="mesaOnObsInput('${pos}',${l.tempId},this.value)">
      <div class="wz-lote-acoes">
        <button type="button" class="btn-g mini" title="Dividir a quantidade em dois lotes" onclick="mesaDividir('${pos}',${l.tempId})">⑃</button>
        <button type="button" class="btn-g mini" title="Duplicar este lote" onclick="mesaDuplicar('${pos}',${l.tempId})">⧉</button>
        <button type="button" class="btn-g mini danger" title="Remover este lote do planejamento" onclick="mesaRemoverLinha('${pos}',${l.tempId})">🗑</button>
      </div>
    </div>
    ${mesaTrilhaHtml(pos,l.tempId,l,tipoMaterial)}
  </div>`;
}
function mesaLoteExistenteHtml(comp){
  const maxOrdem = Math.max(...ESTAGIOS.map(e=>e.ordem), 0);
  const u = ultimoDoComponente(comp.id);
  const completo = ordemAtual(comp.id) >= maxOrdem;
  return `<div class="mesa-existente-row${completo?" ok":""}" onclick="fecharMesa();abrirComponente(${comp.id})">
    <span class="mesa-existente-num">Lote ${comp.lote_numero}</span>
    <span class="wz-qtd-suf">${comp.quantidade} pç</span>
    <span class="mesa-existente-status">${escHtml(u?u.estagio_descricao:"Aguardando")}</span>
    ${completo?'<span class="mesa-existente-badge">✓ Pronto</span>':""}
  </div>`;
}
function mesaStepPosicaoHtml(pos){
  const tipoMaterial = pos==="nucleo" ? _mesaEstrutura.nucleo : "aco";
  const existentes = COMPONENTES.filter(c=>c.item_id===_mesaItem.id && c.posicao===pos).sort((a,b)=>a.lote_numero-b.lote_numero);
  const linhas = _mesaPosicoes[pos] || [];
  const total = parseInt(_mesaItem.quantidade,10)||0;
  const alocado = mesaAlocado(pos);
  const pct = total>0 ? Math.min(100, alocado/total*100) : 0;
  const n = linhas.length;

  const chips = [0,1,2,3,4,5].map(x=>
    `<button type="button" class="wz-nbtn${n===x?" on":""}" onclick="mesaDefinirNLotes('${pos}',${x})">${x}</button>`
  ).join("") + `<button type="button" class="wz-nbtn mais" onclick="mesaDefinirNLotes('${pos}',${n+1})">+ mais</button>`;

  const existentesHtml = existentes.length
    ? `<div class="wz-sec-l">Lotes que já existem (${existentes.length}) <span style="color:var(--text3);font-weight:400">— clique para ver no Kanban</span></div>
       <div class="mesa-existentes">${existentes.map(mesaLoteExistenteHtml).join("")}</div>`
    : "";

  const lotesHtml = linhas.length
    ? linhas.map((l,i)=>mesaLinhaHtml(pos,l,i,tipoMaterial,existentes.length)).join("")
    : `<div class="mesa-hint">Nenhum lote novo — escolha um número acima.</div>`;

  return `<div class="wz-q"><span style="color:${mesaCorPosicao(pos)}">${POS_ICONE[pos]}</span> ${POS_LABEL[pos]} · ${MATERIAL_LABEL[tipoMaterial]}</div>
  <div class="wz-q-sub">${total} pç no total do item.${existentes.length?" Já existem "+existentes.length+" lote(s) desta parte.":""}</div>
  <div class="wz-sec-l">Em quantos lotes novos essa parte vai ser separada?</div>
  <div class="wz-nlotes">${chips}</div>
  <div>
    <div class="mesa-alloc-track"><div class="mesa-alloc-fill${alocado>total?" over":""}" id="mesaAllocFill_${pos}" style="width:${pct}%"></div></div>
    <div class="mesa-alloc-lbl" id="mesaAllocLbl_${pos}">${alocado} de ${total} pç alocada${alocado>total?" — ⚠ passou do total":""}</div>
  </div>
  ${lotesHtml}
  ${existentesHtml}`;
}

// ---- ETAPA FINAL: revisão ----
function mesaStepRevisaoHtml(){
  const total = parseInt(_mesaItem.quantidade,10)||0;
  const passos = mesaPassos();
  const linhasHtml = passos.map(pos=>{
    const linhas = _mesaPosicoes[pos]||[];
    const alocado = mesaAlocado(pos);
    const salvos = COMPONENTES.filter(c=>c.item_id===_mesaItem.id && c.posicao===pos).length;
    const tipoMaterial = pos==="nucleo" ? _mesaEstrutura.nucleo : "aco";
    const desalinhado = linhas.length && alocado!==total;
    const detalhe = linhas.length
      ? linhas.map(l=>l.quantidade).join(" + ")+" pç"
      : (salvos ? "nada novo" : "nenhum lote");
    return `<div class="wz-rev-row${desalinhado?" alerta":""}">
      <span class="wz-rev-sw" style="background:${mesaCorPosicao(pos)}"></span>
      <span><span class="wz-rev-t">${POS_LABEL[pos]}</span> <span style="color:var(--text3)">· ${MATERIAL_LABEL[tipoMaterial]}</span>
        ${desalinhado?`<div class="wz-rev-warn">⚠ soma ${alocado} pç ≠ ${total} pç do item</div>`:""}</span>
      <span class="wz-rev-q">${linhas.length} lote${linhas.length===1?"":"s"} novo${linhas.length===1?"":"s"}<br>${detalhe}</span>
    </div>`;
  }).join("");

  const n = mesaTotalLinhasNovas();
  return `<div class="wz-final">${n?"🎯":"👀"} ${n? "Tudo pronto para criar "+n+" lote"+(n>1?"s":"") : "Nada novo para criar"}</div>
  <div class="wz-q-sub">Confira o resumo. Se algo estiver errado, use ← Voltar.</div>
  <div class="wz-rev">${linhasHtml}</div>
  <label class="chk-row" style="margin-top:6px"><input type="checkbox" id="mesaConcluirChk" ${_mesaConcluirChecked?"checked":""} onchange="_mesaConcluirChecked=this.checked;mesaAtualizarBotaoSalvar()"> Marcar o planejamento deste item como concluído</label>`;
}

// ---- render ----
function mesaFooterHtml(){
  const totalSteps = mesaTotalSteps();
  const esq = _mesaStep>0
    ? `<button type="button" class="wz-btn" onclick="mesaVoltar()">← Voltar</button>`
    : `<button type="button" class="wz-btn" onclick="fecharMesa()">Cancelar</button>`;
  let dir;
  if(_mesaStep < totalSteps-1){
    const bloqueado = _mesaStep===0 && !_mesaEstrutura.nucleo;
    dir = `<button type="button" class="wz-btn prim" onclick="mesaProximo()" ${bloqueado?"disabled":""}>Próximo →</button>`;
  }else{
    const n = mesaTotalLinhasNovas();
    const concluirMudou = _mesaConcluirChecked !== !!_mesaItem.plano_separacao_concluido;
    dir = `<button type="button" class="wz-btn go" id="mesaSalvarBtn" onclick="mesaSalvar()" ${(n>0||concluirMudou)?"":"disabled"}>${n?"✓ Criar "+n+" lote"+(n>1?"s":""):"✓ Salvar"}</button>`;
  }
  return esq+dir;
}
function renderMesa(){
  if(!_mesaItem) return;
  const item = _mesaItem;
  const passos = mesaPassos(), totalSteps = passos.length+2;
  if(_mesaStep > totalSteps-1) _mesaStep = totalSteps-1;

  document.getElementById("mesaTitle").textContent = "Planejar separação — "+item.codigo_peca;
  document.getElementById("mesaSub").textContent = "Pedido "+(item.pedido||"—")+" · OS "+(item.os||"—")+" · "+(item.quantidade||"—")+" pç";
  document.getElementById("mesaSteps").innerHTML =
    Array.from({length:totalSteps},(_,i)=>`<span class="wz-seg${i<_mesaStep?" done":(i===_mesaStep?" cur":"")}"></span>`).join("") +
    `<span class="wz-stepnum">${_mesaStep+1}/${totalSteps}</span>`;

  let html, destaque = null;
  if(_mesaStep===0) html = mesaStepEstruturaHtml();
  else if(_mesaStep<=passos.length){ destaque = passos[_mesaStep-1]; html = mesaStepPosicaoHtml(destaque); }
  else html = mesaStepRevisaoHtml();

  const main = document.getElementById("mesaBody");
  const scroll = main.scrollTop;
  main.innerHTML = html;
  document.getElementById("mesaAside").innerHTML = mesaAsideHtml(destaque);
  document.getElementById("mesaFooter").innerHTML = mesaFooterHtml();
  main.scrollTop = (_mesaStepRenderizado===_mesaStep) ? scroll : 0; // trocou de etapa → começa do topo
  _mesaStepRenderizado = _mesaStep;
}

// habilita/desabilita o botão sem re-renderizar a Mesa inteira (o clique no checkbox não pode perder o rascunho digitado)
function mesaAtualizarBotaoSalvar(){
  const btn = document.getElementById("mesaSalvarBtn");
  if(!btn || !_mesaItem) return;
  const concluirMudou = _mesaConcluirChecked !== !!_mesaItem.plano_separacao_concluido;
  btn.disabled = !(mesaTotalLinhasNovas()>0 || concluirMudou);
}

async function mesaSalvar(){
  if(!_mesaItem) return;
  const posicoesAtivas = ["nucleo","carcaca","luva"].filter(p=>_mesaPosicoes[p]);
  const totalLinhasNovas = posicoesAtivas.reduce((s,p)=>s+_mesaPosicoes[p].length,0);
  const concluirMudou = _mesaConcluirChecked !== !!_mesaItem.plano_separacao_concluido;
  if(!totalLinhasNovas && !concluirMudou){ toast("Nada para salvar", "erro"); return; }

  for(const p of posicoesAtivas){
    for(const l of _mesaPosicoes[p]){
      const qtd = parseInt(l.quantidade,10);
      if(!qtd || qtd<=0){ toast("Informe uma quantidade válida em todos os lotes", "erro"); return; }
    }
  }

  const total = parseInt(_mesaItem.quantidade,10)||0;
  for(const p of posicoesAtivas){
    if(!_mesaPosicoes[p].length) continue;
    const alocado = mesaAlocado(p);
    if(alocado!==total){
      const msg = alocado>total
        ? `${POS_LABEL[p]}: a soma dos lotes (${alocado} pç) passa da quantidade do item (${total} pç). Salvar assim mesmo?`
        : `${POS_LABEL[p]}: a soma dos lotes (${alocado} pç) é menor que a quantidade do item (${total} pç) — ${total-alocado} pç ainda sem lote. Salvar assim mesmo?`;
      if(!confirm(msg)) return;
    }
  }

  const itemId = _mesaItem.id;
  try{
    for(const p of posicoesAtivas){
      const linhas = _mesaPosicoes[p];
      if(!linhas.length) continue;
      let nLotesExistentes = COMPONENTES.filter(c=>c.item_id===itemId && c.posicao===p).length;
      const tipoMaterial = p==="nucleo" ? _mesaEstrutura.nucleo : "aco";
      for(const l of linhas){
        nLotesExistentes++;
        const payload = {
          item_id: itemId, posicao: p, tipo_material: tipoMaterial,
          lote_numero: nLotesExistentes, quantidade: parseInt(l.quantidade,10),
          observacao: (l.observacao||"").trim() || null,
          entrada_prevista_ordem: (l.fato>0) ? null : (l.intencao || null)
        };
        const novo = await supaWrite("/rest/v1/material_lote_componentes","POST",payload);
        const row = Array.isArray(novo)?novo[0]:novo;
        if(row) COMPONENTES.push(row);
        if(l.fato>0 && row){
          const col = ESTAGIOS.find(e=>e.ordem===l.fato);
          if(col) await registrarEvento(row, col);
        }
      }
    }

    if(concluirMudou){
      await supaWrite(`/rest/v1/itens?id=eq.${itemId}`,"PATCH",{plano_separacao_concluido:_mesaConcluirChecked},"return=minimal");
      _mesaItem.plano_separacao_concluido = _mesaConcluirChecked;
      const itemRef = ITENS_CAD.find(i=>i.id===itemId);
      if(itemRef) itemRef.plano_separacao_concluido = _mesaConcluirChecked;
    }

    renderBoard();
    toast(totalLinhasNovas ? (totalLinhasNovas>1 ? totalLinhasNovas+" lotes criados" : "Lote criado") : "Planejamento atualizado");
    fecharMesa();
  }catch(e){
    toast(e.message.includes("duplicate") ? "Conflito ao salvar — recarregue a página e tente de novo" : "Erro ao criar: "+e.message, "erro");
  }
}

// ---- DETALHE DO COMPONENTE (histórico, leitura) ----
async function abrirComponente(compId){
  if(Date.now() - _dragEndedAt < 200) return; // evita abrir o painel logo após soltar o arraste
  const comp = COMPONENTES.find(c=>c.id===compId);
  if(!comp) return;
  const item = itemDoComponente(comp);
  document.getElementById("spTitle").textContent = (item?item.codigo_peca:"Componente") + " — " + POS_LABEL[comp.posicao];
  document.getElementById("spSub").textContent = (item?("Pedido: "+(item.pedido||"—")+" · OS: "+(item.os||"—")+" · "):"") + MATERIAL_LABEL[comp.tipo_material] + " · lote "+comp.lote_numero;

  const historico = await supaFetch(`/rest/v1/material_eventos?select=estagio_descricao,data_evento&componente_id=eq.${compId}&order=data_evento.desc,id.desc&limit=30`);
  const histHtml = Array.isArray(historico) && historico.length
    ? historico.map(h=>`<div class="mat-hist-item"><span>→ ${escHtml(h.estagio_descricao)}</span><span>${fmtDataHora(h.data_evento)}</span></div>`).join("")
    : `<div class="mat-hist-item" style="opacity:.6">ainda em Aguardando — nenhum evento</div>`;

  const resumoItem = item ? materialResumoItem(item.id, {componentes:COMPONENTES, ultimos:ULTIMOS, estagios:ESTAGIOS}) : null;
  const outrosLotesHtml = resumoItem && resumoItem.total>1 ? `<div class="sp-f"><span class="sp-l">Outros lotes deste item</span>` +
    resumoItem.detalhe.filter(d=>d.id!==compId).map(d=>
      `<div class="mat-hist-item"><span>${POS_LABEL[d.posicao]} · lote ${d.numero} (${d.quantidade} pç)</span><span>${d.completo?"✓ Pronto":"em andamento"}</span></div>`
    ).join("") + `</div>` : "";

  const moverHtml = botoesMoverHtml(comp);

  document.getElementById("spBody").innerHTML = `
    ${moverHtml}
    <div class="comp-block"><div class="sp-l" style="margin-bottom:6px">Histórico</div><div class="mat-hist">${histHtml}</div></div>
    ${outrosLotesHtml}
    <button class="btn-g" style="color:var(--danger);border-color:var(--danger)" onclick="excluirComponente(${compId})">🗑 Excluir este lote</button>
  `;
  abrirPainel();
}

// botões "mover para" no painel — alternativa ao arrastar (tablet/touch não dispara drag-and-drop HTML5)
function botoesMoverHtml(comp){
  const atual = ordemAtual(comp.id);
  const opts = colunas().filter(c=>colunaAplica(c, comp.tipo_material) && c.ordem!==atual);
  if(!opts.length) return "";
  return `<div class="comp-block"><div class="sp-l" style="margin-bottom:8px">Mover para</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px">
      ${opts.map(c=>`<button class="btn-g" onclick="moverComponente(${comp.id},${c.id})">${escHtml(c.ordem===0?"Aguardando":c.descricao)}</button>`).join("")}
    </div>
  </div>`;
}
async function moverComponente(compId, estagioId){
  const comp = COMPONENTES.find(c=>c.id===compId);
  const col = ESTAGIOS.find(e=>e.id===estagioId);
  if(!comp || !col) return;
  await registrarEvento(comp, col);
  toast("Movido para "+col.descricao);
  abrirComponente(compId);
}

// exclui um lote (cartão) — imutável, cascade apaga o histórico de eventos dele junto
async function excluirComponente(compId){
  const comp = COMPONENTES.find(c=>c.id===compId);
  if(!comp) return;
  const item = itemDoComponente(comp);
  const label = (item?item.codigo_peca:"item") + " — " + POS_LABEL[comp.posicao] + " lote " + comp.lote_numero;
  if(!confirm(`Excluir o lote "${label}" (${comp.quantidade} pç)? O histórico dele também será apagado.`)) return;
  try{
    await supaWrite(`/rest/v1/material_lote_componentes?id=eq.${compId}`,"DELETE",undefined,"return=minimal");
    COMPONENTES = COMPONENTES.filter(c=>c.id!==compId);
    ULTIMOS = ULTIMOS.filter(u=>u.componente_id!==compId);
    fecharPainel();
    renderBoard();
    toast("Lote excluído");
  }catch(e){ toast("Erro ao excluir: "+e.message, "erro"); }
}

function fmtDataHora(v){
  if(!v) return "—";
  const d = new Date(v);
  return isNaN(d) ? "—" : d.toLocaleDateString("pt-BR")+" "+d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
}

// ---- PAINEL ----
function abrirPainel(){
  document.getElementById("overlay").classList.add("open");
  document.getElementById("sidePanel").classList.add("open");
}
function fecharPainel(){
  document.getElementById("overlay").classList.remove("open");
  document.getElementById("sidePanel").classList.remove("open");
}

// ---- INIT ----
async function init(){
  setSync("carregando...");
  _tvMode = new URLSearchParams(location.search).get("tv")==="1";
  aplicarTvMode();
  const [itensCad, estagios, componentes, ultimos] = await Promise.all([
    supaFetch("/rest/v1/itens?select=*&order=created_at.desc&limit=2000"),
    supaFetch("/rest/v1/material_estagios?select=*&ativo=eq.true&order=ordem&limit=20"),
    supaFetch("/rest/v1/material_lote_componentes?select=*&limit=2000"),
    supaFetch("/rest/v1/material_ultimo_evento?select=*&limit=5000")
  ]);
  ITENS_CAD = Array.isArray(itensCad) ? itensCad : [];
  ESTAGIOS = Array.isArray(estagios) ? estagios : [];
  COMPONENTES = Array.isArray(componentes) ? componentes : [];
  ULTIMOS = Array.isArray(ultimos) ? ultimos : [];
  renderBoard();
  setSync("atualizado " + new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}));
}
init();

// fallback: sem realtime nesta página (PCP é o único ator) — recarrega itens/componentes a cada 60s,
// pra pegar item novo cadastrado em outra aba/pessoa sem precisar de F5. ESTAGIOS não muda, não recarrega.
async function atualizarAuto(){
  try{
    const [itensCad, componentes, ultimos] = await Promise.all([
      supaFetch("/rest/v1/itens?select=*&order=created_at.desc&limit=2000"),
      supaFetch("/rest/v1/material_lote_componentes?select=*&limit=2000"),
      supaFetch("/rest/v1/material_ultimo_evento?select=*&limit=5000")
    ]);
    if(Array.isArray(itensCad)) ITENS_CAD = itensCad;
    if(Array.isArray(componentes)) COMPONENTES = componentes;
    if(Array.isArray(ultimos)) ULTIMOS = ultimos;
    renderBoard();
    setSync("atualizado " + new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}));
  }catch(e){ /* falha silenciosa — tenta de novo no próximo ciclo */ }
}
setInterval(atualizarAuto, 60000);
</script>
