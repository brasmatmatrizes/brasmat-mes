<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRASMAT MES — Buscar Peça</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0F1117;--bg2:#181C27;--bg3:#1F2433;--border:#2A3045;--border2:#3A4560;--text:#E8ECF5;--text2:#C4CBDA;--text3:#8E9AB0;--accent:#3B7FFF;--ok:#2DBF7E;--warn:#F5A623;--danger:#F04545;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0}html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--sans)}

/* TOPBAR */
.topbar{height:56px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;gap:8px;position:sticky;top:0;z-index:50}
.brand{display:flex;align-items:center;gap:8px;flex-shrink:0}
.bm{width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;color:#fff;flex-shrink:0}
.bn{font-size:14px;font-weight:500;letter-spacing:0.04em}.bs{font-size:11px;color:var(--text3);font-family:var(--mono)}
.nav{display:flex;gap:4px;overflow-x:auto;flex:1;justify-content:center}
.nav::-webkit-scrollbar{height:0}
.nb{font-size:12px;padding:6px 12px;border-radius:6px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-family:var(--sans);transition:all 0.15s;white-space:nowrap}
.nb:hover{background:var(--bg3);color:var(--text)}.nb.active{background:var(--accent);color:#fff}
.tr-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--ok);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.sync-lbl{font-size:11px;color:var(--text2);font-family:var(--mono)}
.btn-sm{background:transparent;border:1px solid var(--border);border-radius:6px;padding:3px 10px;font-size:11px;color:var(--text3);cursor:pointer}

/* MOBILE NAV */
.mobile-nav{display:none;overflow-x:auto;padding:10px 14px;gap:6px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:56px;z-index:49}
.mobile-nav::-webkit-scrollbar{height:0}
.mnb{font-size:11px;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;white-space:nowrap;flex-shrink:0}
.mnb.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* SEARCH HERO */
.hero{display:flex;flex-direction:column;align-items:center;padding:48px 20px 24px;max-width:640px;margin:0 auto}
.hero-title{font-size:22px;font-weight:500;color:var(--text);margin-bottom:6px;text-align:center}
.hero-sub{font-size:13px;color:var(--text3);margin-bottom:28px;text-align:center;line-height:1.5}
.search-wrap{position:relative;width:100%}
.search-input{width:100%;background:var(--bg2);border:2px solid var(--border);border-radius:12px;padding:14px 18px 14px 48px;font-size:16px;color:var(--text);outline:none;transition:border-color 0.2s;font-family:var(--sans)}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--text3)}
.search-ico{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:20px;color:var(--text3);pointer-events:none}
.search-hint{font-size:11px;color:var(--text3);margin-top:8px;text-align:center;font-family:var(--mono)}

/* RESULTADOS */
.results{width:100%;max-width:640px;margin:0 auto;padding:0 20px 40px}
.res-list{display:flex;flex-direction:column;gap:8px}
.ri{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:12px}
.ri:hover{border-color:var(--accent);background:var(--bg3)}
.ri-stripe{width:4px;height:40px;border-radius:2px;flex-shrink:0}
.ri-info{flex:1;min-width:0}
.ri-codigo{font-size:15px;font-weight:500;font-family:var(--mono);color:var(--text)}
.ri-pedido{font-size:12px;color:var(--text3);font-family:var(--mono);margin-top:2px}
.ri-proc{font-size:12px;color:var(--text2);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ri-right{text-align:right;flex-shrink:0}
.ri-status{font-size:11px;padding:3px 10px;border-radius:10px;white-space:nowrap}
.ri-dias{font-size:12px;font-family:var(--mono);margin-top:4px}

/* TIMELINE */
.det-wrap{max-width:700px;margin:0 auto;padding:0 20px 40px}
.det-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px 20px}
.det-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.det-codigo{font-size:20px;font-weight:500;color:var(--text);font-family:var(--mono)}
.det-pedido{font-size:13px;color:var(--text2);font-family:var(--mono);margin-top:3px}
.det-meta{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin-bottom:16px}
.dm{background:var(--bg3);border-radius:8px;padding:9px 11px}
.dml{font-size:10px;color:var(--text2);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:2px}
.dmv{font-size:13px;font-weight:500;color:var(--text)}
.det-lbl{font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);font-family:var(--mono);margin-bottom:12px}
.btn-voltar{background:transparent;border:1px solid var(--border);border-radius:8px;padding:8px 16px;font-size:13px;color:var(--text2);cursor:pointer;flex-shrink:0}
.btn-voltar:hover{border-color:var(--border2);color:var(--text)}

/* TIMELINE ITEMS */
.tl-item{position:relative;margin-bottom:12px}.tl-item:last-child{margin-bottom:0}
.tl-dot{position:absolute;left:-28px;top:4px;width:13px;height:13px;border-radius:50%;border:2px solid var(--bg2)}
.tl-dot.entrada{background:var(--accent)}.tl-dot.saida{background:var(--ok)}.tl-dot.atual{background:var(--warn);box-shadow:0 0 0 3px rgba(245,166,35,0.2)}
.tl-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.tl-card.atual{border-color:rgba(245,166,35,0.4)}
.tl-top{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:5px}
.tl-proc{font-size:12px;font-weight:500;color:var(--text)}
.tl-evt{font-size:10px;padding:1px 7px;border-radius:8px}
.evt-entrada{background:rgba(59,127,255,0.12);color:var(--accent)}.evt-saida{background:rgba(45,191,126,0.1);color:var(--ok)}
.tl-tag{font-size:10px;padding:1px 7px;border-radius:8px;background:rgba(245,166,35,0.12);color:var(--warn)}
.tl-sub{font-size:11px;color:var(--text2);margin-bottom:6px}
.tl-foot{display:flex;gap:8px;flex-wrap:wrap}.tl-m{font-size:11px;color:var(--text3);font-family:var(--mono)}
.timeline{list-style:none;position:relative;padding-left:28px}
.timeline::before{content:"";position:absolute;left:9px;top:0;bottom:0;width:1px;background:var(--border)}

.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--text3);font-family:var(--mono);font-size:12px;gap:10px}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* RESPONSIVE */
@media(max-width:768px){
  .bs,.sync-lbl{display:none}
  .nav{display:none}
  .mobile-nav{display:flex}
  .hero{padding:24px 16px 16px}
  .hero-title{font-size:18px}
  .hero-sub{font-size:12px;margin-bottom:20px}
  .search-input{font-size:16px;padding:13px 16px 13px 44px}
  .results{padding:0 16px 30px}
  .det-wrap{padding:0 14px 30px}
  .det-meta{grid-template-columns:1fr 1fr}
  .det-card{padding:14px 16px}
}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">
    <div class="bm">BM</div>
    <div><div class="bn">BRASMAT MES</div><div class="bs">sistema de execução de manufatura</div></div>
  </div>
  <div class="nav">
    <button class="nb active">Buscar Peça</button>
    <button class="nb" onclick="navTo('demanda.html')">Demanda Cliente</button>
    <button class="nb" onclick="navTo('expedicao.html')">Expedição</button>
    <button class="nb" onclick="navTo('kanban.html')">Kanban</button>
    <button class="nb" onclick="navTo('op-kanban.html')">Painel</button>
    <button class="nb" onclick="navTo('cliente.html')">Consulta Cliente</button>
    <button class="nb" onclick="navTo('apontamentos.html')">Apontamentos</button>
    <button class="nb" onclick="navTo('prazos.html')">Prazos</button>
    <button class="nb" onclick="navTo('otd.html')">OTD</button>
    <button class="nb" onclick="navTo('ordens.html')">Ordens em Aberto</button>
    <button class="nb" onclick="navTo('paradas.html')">Peças paradas</button>

<div class="mobile-nav">
  <button class="mnb active">Buscar Peça</button>
  <button class="mnb" onclick="navTo('demanda.html')">Demanda</button>
  <button class="mnb" onclick="navTo('expedicao.html')">Expedição</button>
  <button class="mnb" onclick="navTo('kanban.html')">Kanban</button>
  <button class="mnb" onclick="navTo('op-kanban.html')">Painel</button>
  <button class="mnb" onclick="navTo('cliente.html')">Cliente</button>
  <button class="mnb" onclick="navTo('apontamentos.html')">Apontamentos</button>
  <button class="mnb" onclick="navTo('prazos.html')">Prazos</button>

  <button class="mnb" onclick="navTo('ordens.html')">Ordens</button>

<!-- HERO SEARCH -->
<div id="hero-section">
  <div class="hero">
    <div class="hero-title">Localizar peça</div>
    <div class="hero-sub">Busque pelo código da peça, número do pedido ou OS.<br>A linha do tempo completa aparece ao selecionar.</div>
    <div class="search-wrap">
      <span class="search-ico">⌕</span>
      <input class="search-input" id="search" placeholder="Código, pedido ou OS..." autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="search-hint" id="shint">aguardando...</div>
  </div>
  <div class="results" id="results"></div>
</div>

<!-- DETALHE -->
<div id="det-section" style="display:none">
  <div class="det-wrap" id="det-wrap"></div>
</div>

<script src="status.js"></script>
<script>
let POS = [];

async function init(){
  POS = await buscarPosicao();
  document.getElementById("slbl").textContent = `${POS.length} peças`;
  document.getElementById("shint").textContent = `${POS.length} peças disponíveis — código, pedido ou OS`;
}

async function buscarTipo(codigo, pedido){
  const c = encodeURIComponent(codigo);
  const filtroTipo = "&or=(razao_social.not.is.null,classificacao_fiscal.not.is.null)";
  // Mesmo critério da linha do tempo: filtra por pedido + código (registro mais recente)
  if(pedido){
    const r = await supaFetch(
      `/rest/v1/producao_eventos?select=razao_social,classificacao_fiscal&codigo_peca=eq.${c}&pedido=eq.${encodeURIComponent(pedido)}${filtroTipo}&order=id.desc&limit=1`
    );
    if(Array.isArray(r)&&r.length>0) return r[0];
  }
  // Fallback: sem pedido, busca só por código
  const r2 = await supaFetch(
    `/rest/v1/producao_eventos?select=razao_social,classificacao_fiscal&codigo_peca=eq.${c}${filtroTipo}&order=id.desc&limit=1`
  );
  return Array.isArray(r2)&&r2.length>0 ? r2[0] : null;
}

document.getElementById("search").addEventListener("input", function(){
  const q = this.value.trim().toUpperCase();
  const res = document.getElementById("results");
  if(q.length < 2){ res.innerHTML = ""; return; }

  const found = POS.filter(r=>
    String(r.codigo_peca||"").toUpperCase().includes(q)||
    String(r.pedido||"").toUpperCase().includes(q)||
    String(r.os||"").toUpperCase().includes(q)
  ).slice(0, 10);

  if(!found.length){
    res.innerHTML = `<div style="text-align:center;padding:30px;color:var(--text3);font-size:13px">Nenhuma peça encontrada para "${this.value}"</div>`;
    return;
  }

  renderFound(res, found);
  found.forEach(async (r, i)=>{
    if(getTipo(r)) return;
    const t = await buscarTipo(r.codigo_peca, r.pedido);
    if(!t) return;
    r.razao_social = t.razao_social;
    r.classificacao_fiscal = t.classificacao_fiscal;
    const el = document.getElementById(`badge-${i}`);
    if(el) el.outerHTML = renderTipoBadge(r)||`<span id="badge-${i}"></span>`;
  });
});

function renderFound(res, found){
  res.innerHTML = `<div class="res-list">${found.map((r,i)=>{
    const st = status(r);
    const d  = diasDesde(r);
    const dc = diasCls(d);
    const osInfo = r.os&&String(r.os).trim() ? ` · OS: ${r.os}` : "";
    const qtd = String(r.quantidade_solicitada||"").trim();
    const qtdInfo = qtd ? ` · Qtd: ${qtd} pç` : "";
    const badge  = getTipo(r) ? renderTipoBadge(r) : `<span id="badge-${i}"></span>`;
    return `<div class="ri" onclick="abrirPeca('${esc(r.pedido)}','${esc(r.codigo_peca)}')">
      <div class="ri-stripe" style="background:${st.cor}"></div>
      <div class="ri-info">
        <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">
          <div class="ri-codigo">${r.codigo_peca||"—"}</div>
          ${badge}
        </div>
        <div class="ri-pedido">${r.pedido||"(sem pedido)"}${osInfo}${qtdInfo}</div>
        <div class="ri-proc">${String(r.processo||"").trim()||"—"} · ${getSubop(r)}</div>
      </div>
      <div class="ri-right">
        <div class="ri-status" style="background:${st.cor}22;color:${st.cor}">${st.ico} ${st.label.split("—")[0].trim()}</div>
        <div class="ri-dias" style="color:var(--${dc})">${diasStr(d)}</div>
      </div>
    </div>`;
  }).join("")}</div>`;
}

async function abrirPeca(pedido, codigo){
  document.getElementById("hero-section").style.display = "none";
  document.getElementById("det-section").style.display  = "block";

  const wrap = document.getElementById("det-wrap");
  wrap.innerHTML = `<div class="loading"><div class="spinner"></div>carregando histórico...</div>`;

  const eventos = await buscarHistorico(pedido, codigo);
  if(!eventos.length){
    wrap.innerHTML = `<div style="text-align:center;padding:60px;color:var(--text3)">Nenhum evento encontrado.</div>`;
    return;
  }

  const ultimo  = eventos[eventos.length-1];
  const prog    = calcProgresso(eventos);
  const anexos  = await buscarAnexosDemanda(pedido, codigo);
  const st      = status(ultimo);
  const prazoD  = ultimo.prazo_entrega ? new Date(ultimo.prazo_entrega) : null;
  const prazoFmt= prazoD ? prazoD.toLocaleDateString("pt-BR") : "—";
  const prazoCor= prazoD && prazoD < new Date() ? "var(--danger)" : "var(--text)";
  const prazoOk = prazoD ? (prazoD > new Date() ? '<span style="color:var(--ok)">✓</span>' : '<span style="color:var(--danger)">⚠</span>') : "";
  const ret     = eventos.filter(r=>String(r.retrabalho||"").trim()).length;
  const osNum   = ultimo.os ? String(ultimo.os).trim() : "—";
  const qtdSol  = ultimo.quantidade_solicitada ? String(ultimo.quantidade_solicitada).trim() : "—";

  const tl = eventos.map((ev,i)=>{
    const isUlt = i===eventos.length-1;
    const evtS  = String(ev.evento||"").trim().toUpperCase();
    const isEnt = evtS==="ENTRADA";
    const dot   = isUlt&&isEnt?"atual":isEnt?"entrada":"saida";
    const sub   = getSubop(ev);
    const prazoRef  = eventos.find(e=>e.prazo_entrega&&String(e.prazo_entrega).trim());
    const prazoDate = prazoRef ? new Date(prazoRef.prazo_entrega) : null;
    const evDate    = ev.data_evento ? new Date(ev.data_evento) : null;
    const dataVencida = prazoDate && evDate && evDate > prazoDate;
    const dataCor   = dataVencida ? "var(--danger)" : "var(--text3)";
    const dataIco   = dataVencida ? "⚠" : "📅";
    let dur = "";
    if(!isEnt&&i>0){
      const ant=eventos[i-1];
      if(ant&&String(ant.evento||"").trim().toUpperCase()==="ENTRADA"){
        const ms=new Date(ev.data_evento)-new Date(ant.data_evento);
        if(ms>0){const h=Math.floor(ms/3600000);const d=Math.floor(h/24);dur=`<span style="font-size:10px;font-family:var(--mono);padding:2px 7px;border-radius:6px;background:var(--bg3);color:var(--text2)">${d>0?d+"d ":""}${h%24}h</span>`;}
      }
    }
    return `<li class="tl-item">
      <div class="tl-dot ${dot}"></div>
      <div class="tl-card${isUlt&&isEnt?" atual":""}">
        <div class="tl-top">
          <span class="tl-proc">${ev.processo||"—"}</span>
          <span class="tl-evt ${isEnt?"evt-entrada":"evt-saida"}">${evtS}</span>
          ${isUlt?`<span class="tl-tag">${st.ico} ${st.label}</span>`:""}
          ${ev.retrabalho&&String(ev.retrabalho).trim()?`<span style="font-size:10px;padding:1px 6px;border-radius:8px;background:rgba(240,69,69,0.12);color:var(--danger)">retrabalho</span>`:""}
          ${dataVencida?`<span style="font-size:10px;padding:1px 7px;border-radius:8px;background:rgba(240,69,69,0.12);color:var(--danger)">fora do prazo</span>`:""}
        </div>
        <div class="tl-sub">${sub}</div>
        <div class="tl-foot">
          <span class="tl-m">👤 ${ev.operador||"—"}</span>
          <span style="font-size:11px;font-family:var(--mono);color:${dataCor}">${dataIco} ${ev.data_evento?new Date(ev.data_evento).toLocaleDateString("pt-BR")+" "+new Date(ev.data_evento).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}):"—"}</span>
          ${ev.sequencial_operacao?`<span class="tl-m">op. ${ev.sequencial_operacao}</span>`:""}
          ${ev.quantidade_produzida&&String(ev.quantidade_produzida).trim()?`<span style="font-size:11px;font-family:var(--mono);color:var(--ok);background:rgba(45,191,126,0.1);padding:1px 7px;border-radius:6px">📦 ${ev.quantidade_produzida} pç</span>`:""}
          ${dur}
        </div>
        ${ev.observacao&&String(ev.observacao).trim()?`<div style="margin-top:6px;font-size:11px;color:var(--text3);border-top:1px solid var(--border);padding-top:6px;line-height:1.5">${ev.observacao}</div>`:""}
      </div>
    </li>`;
  }).join("");

  wrap.innerHTML = `<div class="det-card">
    <div class="det-hdr">
      <div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <div class="det-codigo">${codigo}</div>
          ${renderTipoBadge(ultimo)}
        </div>
        <div class="det-pedido">Pedido: ${pedido||"(sem pedido)"}${osNum!=="—"?" · OS: "+osNum:""}</div>
        ${renderAnexosIcons(anexos)}
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <span style="font-size:12px;padding:6px 14px;border-radius:20px;border:1px solid ${st.cor}44;background:${st.cor}22;color:${st.cor}">${st.ico} ${st.label}</span>
        <button class="btn-voltar" onclick="voltar()">← voltar</button>
      </div>
    </div>
    <div class="det-meta">
      <div class="dm"><div class="dml">Prazo</div><div class="dmv" style="color:${prazoCor}">${prazoFmt} ${prazoOk}</div></div>
      <div class="dm"><div class="dml">OS</div><div class="dmv" style="font-family:var(--mono)">${osNum}</div></div>
      <div class="dm"><div class="dml">Qtd. Solic.</div><div class="dmv" style="font-family:var(--mono)">${qtdSol}</div></div>
      <div class="dm"><div class="dml">Cliente</div><div class="dmv" style="font-size:12px">${ultimo.cliente||"—"}</div></div>
      <div class="dm"><div class="dml">Eventos</div><div class="dmv" style="font-family:var(--mono)">${eventos.length}</div></div>
      <div class="dm"><div class="dml">Retrabalhos</div><div class="dmv" style="color:${ret>0?"var(--danger)":"var(--ok)"};font-family:var(--mono)">${ret}</div></div>
    </div>
    ${renderProgresso(prog)}
    <div class="det-lbl">linha do tempo</div>
    <ul class="timeline">${tl}</ul>
  </div>`;
}
