<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRASMAT MES — Expedição</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="design.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans)}
.wrap{display:grid;grid-template-rows:56px auto 1fr;height:100vh;overflow:hidden}
.topbar{height:56px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;gap:8px}
.brand{display:flex;align-items:center;gap:8px;flex-shrink:0}.bm{width:28px;height:28px;border-radius:6px;object-fit:cover;flex-shrink:0}
.bn{font-size:14px;font-weight:500;letter-spacing:0.04em}.bs{font-size:9px;color:var(--text3);font-family:var(--mono)}
.nav{display:flex;gap:4px;flex:1;justify-content:center}.nav::-webkit-scrollbar{height:0}
.nb{font-size:12px;padding:6px 12px;border-radius:6px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-family:var(--sans);transition:all 0.15s;white-space:nowrap}
.nb:hover{background:var(--bg3);color:var(--text)}.nb.active{background:var(--accent);color:#fff}
.tr-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--ok);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.sync-lbl{font-size:11px;color:var(--text2);font-family:var(--mono)}
.mobile-nav{display:none;flex-wrap:wrap;padding:8px 12px;gap:6px;background:var(--bg2);border-bottom:1px solid var(--border)}
.mobile-nav::-webkit-scrollbar{height:0}
.mnb{font-size:11px;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;white-space:nowrap;flex-shrink:0}
.mnb.active{background:var(--accent);border-color:var(--accent);color:#fff}
.toolbar{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;padding:10px 16px;overflow-x:auto}
.toolbar::-webkit-scrollbar{height:0}
.tt{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;flex-shrink:0;margin-right:6px}
.fchip{font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;white-space:nowrap;flex-shrink:0}
.fchip.on{background:var(--accent);border-color:var(--accent);color:#fff}
.content{overflow-y:auto;padding:16px 18px 40px}
.placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:70%;color:var(--text3);gap:12px}
.ph-ico{font-size:46px;opacity:0.3}.ph-txt{font-size:14px;text-align:center;max-width:340px;line-height:1.6}
/* GRUPO CLIENTE */
.cli-group{margin-bottom:20px}
.cli-hdr{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;margin-bottom:8px}
.cli-name{font-size:14px;font-weight:600;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cli-cnt{font-size:11px;font-family:var(--mono);color:var(--text2)}
.sub-tipo{display:flex;align-items:center;gap:10px;margin:12px 0 6px}
.sub-tipo .pill{font-size:11px;font-weight:600;font-family:var(--mono);text-transform:uppercase;letter-spacing:0.04em;padding:3px 11px;border-radius:10px}
.sub-tipo .ln{flex:1;height:1px;background:var(--border)}
/* ITEM */
.exp-item{display:grid;grid-template-columns:150px 1fr 70px 100px 120px 280px;gap:12px;align-items:center;background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:11px 14px;margin-bottom:7px}
.ei-cod{font-size:14px;font-weight:500;font-family:var(--mono);color:var(--text);cursor:pointer}
.ei-cod:hover .ei-cnum{color:var(--accent)}
.ei-chk{width:15px;height:15px;cursor:pointer;accent-color:var(--ok);vertical-align:middle;margin-right:7px}
.ei-tipo{margin-top:4px}
.ei-qtd{font-size:14px;font-family:var(--mono);color:var(--text);text-align:center;font-weight:500}
.ei-qcap{display:block;font-size:9px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.05em;font-weight:400}
.fsel-exp{font-size:12px;padding:5px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;outline:none;height:30px;flex-shrink:0}
.fdata-exp{font-size:12px;padding:5px 8px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);outline:none;height:30px;flex-shrink:0;font-family:var(--mono)}
.fdata-wrap{display:flex;align-items:center;gap:5px;flex-shrink:0}
.fdata-wrap .lbl-mini{font-size:11px;color:var(--text3);white-space:nowrap}
.btn-x-exp{font-size:12px;padding:5px 8px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text3);cursor:pointer;height:30px;flex-shrink:0}
.btn-x-exp:hover{border-color:var(--danger);color:var(--danger)}
.btn-print{font-size:12px;padding:6px 13px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;white-space:nowrap;margin-left:auto;flex-shrink:0}
.btn-print:hover{border-color:var(--accent);color:var(--text)}
@keyframes pisca-critico{0%,100%{opacity:1}50%{opacity:0.45}}
.badge-critico-exp{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-family:var(--mono);font-weight:700;padding:1px 6px;border-radius:4px;background:rgba(220,38,38,0.12);color:#DC2626;border:1px solid rgba(220,38,38,0.45);animation:pisca-critico 1s ease-in-out infinite;margin-left:5px;vertical-align:middle}
.ei-desc{font-size:12px;color:var(--text3);min-width:0}
.ei-dtext{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ei-ultop{font-size:10px;font-family:var(--mono);color:var(--text3);margin-top:4px;line-height:1.4;white-space:normal}
.ei-prazo{font-size:12px;font-family:var(--mono);color:var(--text2)}
.ei-prazo.venc{color:var(--danger)}
.sit{font-size:11px;font-weight:500;padding:3px 10px;border-radius:10px;white-space:nowrap;text-align:center}
.seg{display:flex;gap:4px;justify-content:flex-end}
.seg button{font-size:10px;padding:4px 9px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text3);cursor:pointer;white-space:nowrap}
.seg button:hover{border-color:var(--border2);color:var(--text2)}
.seg button.on-p{background:var(--text3);color:#0F172A;border-color:transparent}
.seg button.on-sp{background:var(--roxo);color:#fff;border-color:transparent}
.seg button.on-s{background:var(--warn);color:#3A2800;border-color:transparent}
.seg button.on-e{background:var(--ok);color:#06281A;border-color:transparent}
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--text3);font-family:var(--mono);font-size:12px;gap:10px}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* PAINEL DETALHE */
.det-panel{display:none;position:fixed;right:0;top:56px;bottom:0;width:460px;background:var(--bg2);border-left:1px solid var(--border);z-index:100;overflow-y:auto;animation:si 0.18s ease}
.det-panel.open{display:block}
@keyframes si{from{transform:translateX(30px);opacity:0}to{transform:none;opacity:1}}
.det-hdr{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;position:sticky;top:0;background:var(--bg2);z-index:1}
.det-close{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:12px;color:var(--text2);cursor:pointer}
.det-body{padding:16px 20px}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.mb{background:var(--bg3);border-radius:8px;padding:10px 12px}.ml{font-size:10px;color:var(--text3);font-family:var(--mono);margin-bottom:3px;text-transform:uppercase;letter-spacing:0.07em}.mv{font-size:13px;font-weight:500;color:var(--text)}
.pos-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:12px}
.tl-lbl{font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);font-family:var(--mono);margin-bottom:12px}
.timeline{list-style:none;position:relative;padding-left:28px}
.timeline::before{content:"";position:absolute;left:9px;top:0;bottom:0;width:1px;background:var(--border)}
.tl-item{position:relative;margin-bottom:12px}.tl-item:last-child{margin-bottom:0}
.tl-dot{position:absolute;left:-28px;top:4px;width:13px;height:13px;border-radius:50%;border:2px solid var(--bg2)}
.tl-dot.entrada{background:var(--accent)}.tl-dot.saida{background:var(--ok)}.tl-dot.atual{background:var(--warn);box-shadow:0 0 0 3px rgba(245,166,35,0.2)}
.tl-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px}.tl-card.atual{border-color:rgba(245,166,35,0.4)}
.tl-top{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:5px}
.tl-proc{font-size:12px;font-weight:500;color:var(--text)}
.tl-evt{font-size:10px;padding:1px 7px;border-radius:8px}
.ent{background:rgba(59,127,255,0.12);color:var(--accent)}.sai{background:rgba(45,191,126,0.1);color:var(--ok)}
.tl-tag{font-size:10px;padding:1px 7px;border-radius:8px;background:rgba(245,166,35,0.12);color:var(--warn)}
.tl-ret{font-size:10px;padding:1px 7px;border-radius:8px;background:rgba(240,69,69,0.12);color:var(--danger)}
.tl-sub{font-size:11px;color:var(--text2);margin-bottom:6px}
.tl-foot{display:flex;gap:12px;flex-wrap:wrap}.tl-m{font-size:11px;color:var(--text3);font-family:var(--mono)}
.tl-obs{margin-top:6px;font-size:11px;color:var(--text3);border-top:1px solid var(--border);padding-top:6px;line-height:1.5}
@media(max-width:768px){
  .bs,.sync-lbl{display:none}.nav{display:none}.mobile-nav{display:flex}
  .topbar{padding:0 10px}
  .exp-item{grid-template-columns:1fr auto;gap:6px 10px}
  .ei-desc{grid-column:1/-1;order:5}
  .ei-qtd{order:4;text-align:left}.ei-qcap{display:inline;margin-left:4px}
  .ei-prazo{order:3}.sit{order:2;justify-self:end}.seg{grid-column:1/-1;order:6;justify-content:flex-start}
  .det-panel{width:100%;max-width:100vw}
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="status.js"></script>
<script>
let ITENS=[], CFG={}, POSMAP={}, POSMAPC={}, TIPO_CACHE={}, FILTRO="todos", FCLI="", FSIT="", FPRAZO_DE="", FPRAZO_ATE="";
let EXCLUIDOS_IMPRESSAO = new Set();   // ids desmarcados: ficam de fora da impressão (todo item nasce marcado)

function navTo(p){ window.location.href=p; }
function nomeExib(c){ return (CFG[c]&&CFG[c].nome_fantasia)||c; }
const PALETA=["#3B7FFF","#2DBF7E","#F5A623","#9B5DE5","#DC2626","#0891B2","#DB2777","#65A30D","#D97706","#7C3AED","#0E7490","#B45309"];
function autoCor(c){let h=0;const s=String(c||"");for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;return PALETA[h%PALETA.length];}
function corCliente(c){ return (CFG[c]&&CFG[c].cor)||autoCor(c); }
function hexRgba(hex,a){const n=parseInt(String(hex).replace("#",""),16);return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;}

async function init(){
  try{
    const [itens, pos, cfg] = await Promise.all([
      supaFetch("/rest/v1/demanda_itens?select=*&order=id.asc"),
      buscarPosicao(),
      supaFetch("/rest/v1/demanda_clientes?select=*")
    ]);
    ITENS = Array.isArray(itens)?itens:[];
    (Array.isArray(cfg)?cfg:[]).forEach(r=>{ if(r.cliente) CFG[r.cliente]={nome_fantasia:r.nome_fantasia||"",cor:r.cor||""}; });
    POSMAP={}; POSMAPC={};
    (Array.isArray(pos)?pos:[]).forEach(r=>{
      const k=(r.codigo_peca||"")+"|"+(r.pedido||"");
      POSMAP[k]=r;
      if(!(r.codigo_peca in POSMAPC)) POSMAPC[r.codigo_peca]=r;
    });
    popularFiltroClientes();
    render();
    await enriquecerTipos();   // tipo V/I — mesmo critério da linha do tempo (por pedido+código)
    render();
  }catch(e){
    document.getElementById("content").innerHTML=`<div class="placeholder"><div class="ph-ico">⚠️</div><div class="ph-txt">Erro ao carregar.</div></div>`;
  }
}

// Situação de produção do item
function situacao(it){
  if(it.concluido) return {key:"pronto",label:"Pronto p/ expedir",cor:"var(--ok)"};
  const row = POSMAP[(it.codigo_peca||"")+"|"+(it.pedido||"")] || POSMAPC[it.codigo_peca];
  if(row){
    const s=status(row).s;
    if(s==="expedida") return {key:"expedido",label:"Expedido (sistema)",cor:"var(--text3)"};
    if(s==="em_estoque"||s==="aprovada") return {key:"pronto",label:"Pronto p/ expedir",cor:"var(--ok)"};
    return {key:"producao",label:"Em produção",cor:"var(--accent)"};
  }
  return {key:"producao",label:"Em produção",cor:"var(--text3)"};
}

const SIT_ORDEM={pronto:0,producao:1,expedido:2};

// Tipo (V/I) e quantidade solicitada — vêm de producao_eventos / posicao_atual
// Mesmo critério da linha do tempo: registro mais recente por pedido+código (order=id.desc)
async function enriquecerTipos(){
  const pend=[], seen=new Set();
  ITENS.forEach(it=>{
    const key=(it.codigo_peca||"")+"|"+(it.pedido||"");
    if(seen.has(key)||(key in TIPO_CACHE)) return;
    seen.add(key); pend.push(it);
  });
  await Promise.all(pend.map(async it=>{
    const key=(it.codigo_peca||"")+"|"+(it.pedido||"");
    const c=encodeURIComponent(it.codigo_peca||"");
    const ped=it.pedido?`&pedido=eq.${encodeURIComponent(it.pedido)}`:"";
    try{
      const r=await supaFetch(`/rest/v1/producao_eventos?select=razao_social,classificacao_fiscal&codigo_peca=eq.${c}${ped}&or=(razao_social.not.is.null,classificacao_fiscal.not.is.null)&order=id.desc&limit=1`);
      TIPO_CACHE[key]=(Array.isArray(r)&&r[0])?r[0]:null;
    }catch(e){ TIPO_CACHE[key]=null; }
  }));
}
function tipoRowDe(it){
  return TIPO_CACHE[(it.codigo_peca||"")+"|"+(it.pedido||"")] || null;
}
function tipoBadgeDe(it){ const r=tipoRowDe(it); return r?renderTipoBadge(r):""; }
function tipoTextoDe(it){ const r=tipoRowDe(it); const t=r?getTipo(r):null; return t?t.full:"—"; }
function qtdDe(it){
  const r = POSMAP[(it.codigo_peca||"")+"|"+(it.pedido||"")] || POSMAPC[it.codigo_peca];
  const q = r && r.quantidade_solicitada!=null ? String(r.quantidade_solicitada).trim() : "";
  return q || "—";
}

function popularFiltroClientes(){
  const sel=document.getElementById("fcli"); if(!sel) return;
  const clientes=[...new Set(ITENS.map(it=>it.cliente||"—"))].sort((a,b)=>nomeExib(a).localeCompare(nomeExib(b),"pt-BR"));
  const atual=FCLI;
  sel.innerHTML='<option value="">Todos os clientes</option>'+clientes.map(c=>`<option value="${esc(c)}">${nomeExib(c)}</option>`).join("");
  if(atual && clientes.includes(atual)) sel.value=atual; else FCLI="";
}
function setCliente(v){ FCLI=v; render(); }
function setSituacao(v){ FSIT=v; render(); }
function setPrazo(){
  FPRAZO_DE = document.getElementById("fprazo-de").value||"";
  FPRAZO_ATE = document.getElementById("fprazo-ate").value||"";
  render();
}
function limparPrazo(){
  document.getElementById("fprazo-de").value="";
  document.getElementById("fprazo-ate").value="";
  FPRAZO_DE=""; FPRAZO_ATE="";
  render();
}
function passaPrazo(it){
  if(!FPRAZO_DE && !FPRAZO_ATE) return true;
  if(!it.prazo_confirmado) return false;
  if(FPRAZO_DE && it.prazo_confirmado<FPRAZO_DE) return false;
  if(FPRAZO_ATE && it.prazo_confirmado>FPRAZO_ATE) return false;
  return true;
}

function setFiltro(f){
  FILTRO=f;
  ["todos","pendente","sem_pedido","separado","expedido"].forEach(t=>document.getElementById("f-"+t).classList.toggle("on",t===f));
  render();
}

function render(){
  const cont=document.getElementById("content");
  let itens = ITENS.slice();
  if(FILTRO!=="todos") itens = itens.filter(it=>(it.exp_status||"pendente")===FILTRO);
  if(FCLI) itens = itens.filter(it=>(it.cliente||"—")===FCLI);
  if(FSIT) itens = itens.filter(it=>situacao(it).key===FSIT);
  itens = itens.filter(passaPrazo);
  if(!itens.length){
    cont.innerHTML=`<div class="placeholder"><div class="ph-ico">📦</div><div class="ph-txt">${ITENS.length?'Nenhum item neste filtro.':'Nenhum item na demanda ainda. Os itens lançados na Demanda Cliente aparecem aqui.'}</div></div>`;
    document.getElementById("slbl").textContent=`${ITENS.length} itens`;
    return;
  }
  // agrupa por cliente
  const grupos={};
  itens.forEach(it=>{ const c=it.cliente||"—"; (grupos[c]=grupos[c]||[]).push(it); });
  const clientes=Object.keys(grupos).sort((a,b)=>nomeExib(a).localeCompare(nomeExib(b),"pt-BR"));
  const sortSit=(a,b)=>(SIT_ORDEM[situacao(a).key]-SIT_ORDEM[situacao(b).key])||(a.prazo_confirmado||"9999-99-99").localeCompare(b.prazo_confirmado||"9999-99-99")||String(a.codigo_peca).localeCompare(String(b.codigo_peca));
  // sub-grupos por classificação (mesmo critério da linha do tempo)
  const TIPOS=[
    {k:"I", full:"Industrialização", cor:"#F5A623", bg:"rgba(245,166,35,0.15)"},
    {k:"V", full:"Vendas",           cor:"#3B7FFF", bg:"rgba(59,127,255,0.15)"},
    {k:"?", full:"Sem classificação",cor:"#8E9AB0", bg:"rgba(142,154,176,0.15)"}
  ];
  function chaveTipo(it){ const r=tipoRowDe(it); const t=r?getTipo(r):null; return t?t.label:"?"; }
  cont.innerHTML=clientes.map(c=>{
    const cor=corCliente(c);
    const lista=grupos[c];
    const nExp=lista.filter(it=>(it.exp_status||"pendente")==="expedido").length;
    const corpos=TIPOS.map(tp=>{
      const subset=lista.filter(it=>chaveTipo(it)===tp.k).sort(sortSit);
      if(!subset.length) return "";
      return `<div class="sub-tipo"><span class="pill" style="background:${tp.bg};color:${tp.cor};border:1px solid ${tp.cor}44">${tp.full} · ${subset.length}</span><span class="ln"></span></div>`
        + subset.map(linhaItem).join("");
    }).join("");
    return `<div class="cli-group">
      <div class="cli-hdr" style="background:${hexRgba(cor,0.14)};border-left:4px solid ${cor}">
        <div class="cli-name">${nomeExib(c)}</div>
        <div class="cli-cnt">${lista.length} ${lista.length===1?'item':'itens'} · ${nExp} expedido(s)</div>
      </div>
      ${corpos}
    </div>`;
  }).join("");
  document.getElementById("slbl").textContent=`${itens.length} itens`;
}

function ultimaOpDe(it){
  const r = POSMAP[(it.codigo_peca||"")+"|"+(it.pedido||"")] || POSMAPC[it.codigo_peca];
  if(!r) return "";
  const isEnt = String(r.evento||"").trim().toUpperCase()==="ENTRADA";
  const sub = getSubop(r);
  const proc = [String(r.processo||"").trim(), (sub&&sub!=="—")?sub:""].filter(Boolean).join(" · ")||"—";
  const quando = r.data_evento ? new Date(r.data_evento).toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}) : "";
  return `<div class="ei-ultop"><span style="color:${isEnt?'var(--accent)':'var(--ok)'}">${isEnt?'⬆':'⬇'}</span> ${proc}${quando?` · ${quando}`:""}</div>`;
}
function linhaItem(it){
  const sit=situacao(it);
  const st=it.exp_status||"pendente";
  const prazoD=it.prazo_confirmado?new Date(it.prazo_confirmado+"T00:00:00"):null;
  const venc=prazoD && prazoD<new Date(new Date().toDateString());
  const prazo=prazoD?prazoD.toLocaleDateString("pt-BR"):"—";
  return `<div class="exp-item">
    <div class="ei-cod" onclick="abrirDet('${esc(it.pedido||"")}','${esc(it.codigo_peca||"")}')">
      <div><input type="checkbox" class="ei-chk" ${EXCLUIDOS_IMPRESSAO.has(it.id)?"":"checked"} onclick="event.stopPropagation()" onchange="toggleImprimir(${it.id},this.checked)" title="Incluir na impressão"><span class="ei-cnum">${it.codigo_peca||"—"}</span>${it.critico?'<span class="badge-critico-exp">🔴 CRÍTICO</span>':''}</div>
      ${tipoBadgeDe(it)?`<div class="ei-tipo">${tipoBadgeDe(it)}</div>`:""}
    </div>
    <div class="ei-desc"><div class="ei-dtext">${it.descricao?String(it.descricao).replace(/</g,"&lt;"):(it.pedido?"Ped: "+it.pedido:"")}</div>${ultimaOpDe(it)}</div>
    <div class="ei-qtd">${qtdDe(it)}<span class="ei-qcap">qtd</span></div>
    <div class="ei-prazo ${venc?'venc':''}">${prazo}${venc?" ⚠":""}</div>
    <div class="sit" style="background:${sit.cor}22;color:${sit.cor}">${sit.label}</div>
    <div class="seg">
      <button class="${st==='pendente'?'on-p':''}" onclick="marcar(${it.id},'pendente')">Pendente</button>
      <button class="${st==='sem_pedido'?'on-sp':''}" onclick="marcar(${it.id},'sem_pedido')">Sem pedido</button>
      <button class="${st==='separado'?'on-s':''}" onclick="marcar(${it.id},'separado')">Separado</button>
      <button class="${st==='expedido'?'on-e':''}" onclick="marcar(${it.id},'expedido')">Expedido</button>
    </div>
  </div>`;
}

function toggleImprimir(id, checked){
  if(checked) EXCLUIDOS_IMPRESSAO.delete(id); else EXCLUIDOS_IMPRESSAO.add(id);
}

async function marcar(id, novo){
  const it=ITENS.find(x=>x.id===id); if(!it) return;
  const antigo=it.exp_status||"pendente";
  it.exp_status = (antigo===novo) ? "pendente" : novo;   // clicar no mesmo volta p/ pendente
  render();
  try{
    await fetch(`${SUPA_URL}/rest/v1/demanda_itens?id=eq.${id}`, {
      method:"PATCH",
      headers:{ apikey:SUPA_KEY, Authorization:"Bearer "+SUPA_KEY, "Content-Type":"application/json", Prefer:"return=minimal" },
      body:JSON.stringify({ exp_status: it.exp_status })
    });
  }catch(e){}
}

async function abrirDet(pedido,codigo){
  if(!pedido && !codigo) return;
  document.getElementById("dp").classList.add("open");
  await abrirPainelDetalhe(pedido,codigo,"dp","dt","db");
}
function fechar(){ document.getElementById("dp").classList.remove("open"); }

// ---------- Impressão A4 ----------
function escH(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
const EXP_LBL={pendente:"Pendente",sem_pedido:"Sem pedido",separado:"Separado",expedido:"Expedido"};

function imprimir(){
  let itens=ITENS.slice();
  if(FILTRO!=="todos") itens=itens.filter(it=>(it.exp_status||"pendente")===FILTRO);
  if(FCLI) itens=itens.filter(it=>(it.cliente||"—")===FCLI);
  if(FSIT) itens=itens.filter(it=>situacao(it).key===FSIT);
  itens=itens.filter(passaPrazo);
  itens=itens.filter(it=>!EXCLUIDOS_IMPRESSAO.has(it.id));
  if(!itens.length){ alert("Nenhum item marcado para imprimir. Marque o checkbox dos itens desejados na lista."); return; }

  const grupos={};
  itens.forEach(it=>{ const c=it.cliente||"—"; (grupos[c]=grupos[c]||[]).push(it); });
  const clientes=Object.keys(grupos).sort((a,b)=>nomeExib(a).localeCompare(nomeExib(b),"pt-BR"));

  const fStatus = FILTRO==="todos" ? "Todos os status" : EXP_LBL[FILTRO]||FILTRO;
  const fCliTxt = FCLI ? nomeExib(FCLI) : "Todos os clientes";
  const agora = new Date().toLocaleString("pt-BR");

  const sortSit=(a,b)=>(SIT_ORDEM[situacao(a).key]-SIT_ORDEM[situacao(b).key])||(a.prazo_confirmado||"9999-99-99").localeCompare(b.prazo_confirmado||"9999-99-99")||String(a.codigo_peca).localeCompare(String(b.codigo_peca));
  const chaveTipo=(it)=>{ const r=tipoRowDe(it); const t=r?getTipo(r):null; return t?t.label:"?"; };
  const TIPOS_P=[{k:"I",full:"Industrialização"},{k:"V",full:"Vendas"},{k:"?",full:"Sem classificação"}];
  const linhaTr=(it)=>{
    const sit=situacao(it);
    const st=it.exp_status||"pendente";
    const prazoD=it.prazo_confirmado?new Date(it.prazo_confirmado+"T00:00:00"):null;
    const prazo=prazoD?prazoD.toLocaleDateString("pt-BR"):"—";
    const desc=it.descricao?escH(it.descricao):(it.pedido?"Ped: "+escH(it.pedido):"—");
    return `<tr${it.critico?' class="crit"':''}>
      <td class="ck"></td>
      <td class="cod">${escH(it.codigo_peca||"—")}${it.critico?' <b>CRÍTICO</b>':''}</td>
      <td class="tp">${escH(tipoTextoDe(it))}</td>
      <td>${desc}</td>
      <td class="ped">${escH(it.pedido||"—")}</td>
      <td class="num">${escH(qtdDe(it))}</td>
      <td class="dt">${prazo}</td>
      <td>${escH(sit.label)}</td>
      <td>${escH(EXP_LBL[st]||st)}</td>
    </tr>`;
  };
  const secoes = clientes.map(c=>{
    const cor=corCliente(c);
    const lista=grupos[c];
    const linhas=TIPOS_P.map(tp=>{
      const subset=lista.filter(it=>chaveTipo(it)===tp.k).sort(sortSit);
      if(!subset.length) return "";
      return `<tr class="subt"><td colspan="9">${escH(tp.full)} · ${subset.length} ${subset.length===1?"item":"itens"}</td></tr>`
        + subset.map(linhaTr).join("");
    }).join("");
    return `<div class="cli">
      <div class="clihdr" style="border-left:5px solid ${cor}"><span class="clinome">${escH(nomeExib(c))}</span><span class="cliqt">${lista.length} ${lista.length===1?"item":"itens"}</span></div>
      <table>
        <colgroup><col style="width:3%"><col style="width:11%"><col style="width:13%"><col style="width:27%"><col style="width:11%"><col style="width:6%"><col style="width:9%"><col style="width:12%"><col style="width:8%"></colgroup>
        <thead><tr><th class="ck">✓</th><th>Código</th><th>Tipo</th><th>Descrição</th><th>Pedido</th><th>Qtd</th><th>Prazo</th><th>Situação produção</th><th>Status expedição</th></tr></thead>
        <tbody>${linhas}</tbody>
      </table>
    </div>`;
  }).join("");

  const html=`<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Lista de Expedição — Brasmat</title>
  <style id="page-style">@page{size:A4 landscape;margin:12mm}</style>
  <style>
    *{box-sizing:border-box}
    body{font-family:Arial,Helvetica,sans-serif;color:#111;margin:0;font-size:11px;background:#525659}
    .page{background:#fff;max-width:1080px;margin:16px auto;padding:22px 26px;box-shadow:0 2px 14px rgba(0,0,0,0.4)}
    .top{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:2px solid #111;padding-bottom:8px;margin-bottom:12px}
    .ttl{font-size:18px;font-weight:700;letter-spacing:0.5px}
    .sub{font-size:11px;color:#444;margin-top:3px}
    .meta{font-size:10px;color:#555;text-align:right;line-height:1.5}
    .cli{margin-bottom:16px;page-break-inside:avoid}
    .clihdr{display:flex;justify-content:space-between;align-items:center;background:#f1f3f6;padding:5px 9px;border-radius:4px;margin-bottom:4px}
    .clinome{font-size:13px;font-weight:700}
    .cliqt{font-size:10px;color:#555}
    table{width:100%;border-collapse:collapse;table-layout:fixed}
    th,td{border:1px solid #c8ccd4;padding:4px 6px;text-align:left;vertical-align:top;overflow-wrap:break-word;word-break:break-word}
    th{background:#e9ecf1;font-size:9px;text-transform:uppercase;letter-spacing:0.03em}
    td.cod{font-family:'Courier New',monospace;font-weight:700}
    td.ped{font-family:'Courier New',monospace}
    td.num{text-align:center;font-weight:700}
    td.dt{white-space:nowrap}
    th.ck,td.ck{text-align:center}
    tr.subt td{background:#dfe4ea;font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:0.04em;border-color:#b8bfc9}
    tr.crit td{background:#fdeaea}
    tr.crit td.cod b{color:#c00}
    tbody tr:nth-child(even) td{background:#fafbfc}
    tbody tr.crit:nth-child(even) td{background:#fce0e0}
    .foot{margin-top:14px;font-size:9px;color:#888;text-align:center;border-top:1px solid #ddd;padding-top:6px}
    .bar{position:sticky;top:0;z-index:10;display:flex;flex-wrap:wrap;gap:8px;align-items:center;background:#1F2433;padding:10px 14px;border-bottom:1px solid #333}
    .bar span{color:#8E9AB0;font-size:12px;margin-right:4px}
    .bar button{font-size:13px;padding:7px 16px;border-radius:7px;border:1px solid #3A4560;background:#2A3045;color:#C4CBDA;cursor:pointer}
    .bar button.on{background:#3B7FFF;border-color:#3B7FFF;color:#fff;font-weight:600}
    .bar .fechar{background:#3a2530;border-color:#5a2f3f;color:#f0a8b8}
    .bar .imp{margin-left:auto;background:#2DBF7E;border-color:#2DBF7E;color:#06281A;font-weight:700}
    @media print{
      body{background:#fff}
      .page{max-width:none;margin:0;padding:0;box-shadow:none}
      .noprint{display:none!important}
      .cli{margin-bottom:10px}
      .cli:last-of-type{margin-bottom:0}
      .foot{margin-top:8px;padding-top:5px}
      table{margin-bottom:0}
    }
  </style></head><body>
    <div class="bar noprint">
      <span>Orientação:</span>
      <button id="o-l" class="on" onclick="setOrient('landscape')">Paisagem</button>
      <button id="o-p" onclick="setOrient('portrait')">Retrato</button>
      <button class="fechar" onclick="window.close()">✕ Fechar</button>
      <button class="imp" onclick="window.print()">🖨️ Imprimir</button>
    </div>
    <div class="page">
    <div class="top">
      <div><div class="ttl">BRASMAT — Lista de Expedição</div><div class="sub">Cliente: ${escH(fCliTxt)} &nbsp;·&nbsp; Filtro: ${escH(fStatus)} &nbsp;·&nbsp; ${itens.length} ${itens.length===1?"item":"itens"}</div></div>
      <div class="meta">Emitido em<br>${escH(agora)}</div>
    </div>
    ${secoes}
    <div class="foot">BRASMAT MES — documento gerado automaticamente</div>
    </div>
    <script>
      function setOrient(o){
        document.getElementById("page-style").textContent="@page{size:A4 "+o+";margin:12mm}";
        document.getElementById("o-l").classList.toggle("on",o==="landscape");
        document.getElementById("o-p").classList.toggle("on",o==="portrait");
      }
    <\/script>
  </body></html>`;

  const win=window.open("","_blank");
  if(!win){ alert("Permita pop-ups para imprimir."); return; }
  win.document.write(html);
  win.document.close();
  win.focus();
}

// Realtime: atualiza quando a produção concluir peça ou a demanda mudar
let _rtTimer=null;
let _rtConectado=false;
function refreshDebounced(){ clearTimeout(_rtTimer); _rtTimer=setTimeout(init,3000); }
function iniciarRealtime(){
  try{
    if(!window.supabase) return;
    const sb=window.supabase.createClient(SUPA_URL,SUPA_KEY);
    sb.channel("exp-rt")
      .on("postgres_changes",{event:"*",schema:"public",table:"producao_eventos"},refreshDebounced)
      .on("postgres_changes",{event:"*",schema:"public",table:"demanda_itens"},refreshDebounced)
      .subscribe((status)=>{ _rtConectado = (status==="SUBSCRIBED"); });
  }catch(e){}
}
iniciarRealtime();
setInterval(()=>{ if(!_rtConectado) init(); }, 60000);   // só recarrega no polling se o realtime não estiver conectado
init();
</script>
</body>
</html>
