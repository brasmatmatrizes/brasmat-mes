<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRASMAT MES — Separação de Material</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="design.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden}
.topbar{height:56px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;gap:12px;flex-shrink:0}
.brand{display:flex;align-items:center;gap:10px}.bm{width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:500;color:#fff}
.bn{font-size:14px;font-weight:500;letter-spacing:0.04em}.bs{font-size:9px;color:var(--text3);font-family:var(--mono)}
.nav{display:flex;gap:4px}
.nb{font-size:12px;padding:6px 12px;border-radius:6px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-family:var(--sans);transition:all 0.15s;white-space:nowrap}
.nb:hover{background:var(--bg3);color:var(--text)}.nb.active{background:var(--accent);color:#fff}
.tr-right{display:flex;align-items:center;gap:8px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--ok);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.sync-lbl{font-size:11px;color:var(--text3);font-family:var(--mono)}

.toolbar{height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:0 20px;flex-shrink:0}
.tt{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap}
.hint{font-size:11px;color:var(--text3);font-family:var(--mono)}
.btn-g{background:transparent;border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-size:12px;color:var(--text2);cursor:pointer;height:32px;font-family:var(--sans)}
.btn-g:hover{border-color:var(--border2);color:var(--text)}
.btn-acc{background:var(--accent);border:1px solid var(--accent);color:#fff}
.btn-acc:hover{opacity:0.9;color:#fff}
.search-wrap{position:relative;flex:1;max-width:420px}
.search-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:12px;color:var(--text);outline:none;font-family:var(--mono)}
.search-input:focus{border-color:var(--accent)}
.sugg{position:absolute;top:100%;left:0;right:0;margin-top:6px;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;z-index:80;max-height:340px;overflow-y:auto;box-shadow:0 12px 30px rgba(0,0,0,.5);display:none}
.sugg-item{padding:9px 13px;cursor:pointer;border-bottom:1px solid var(--border)}
.sugg-item:last-child{border-bottom:none}
.sugg-item:hover{background:var(--bg3)}
.sugg-cod{font-family:var(--mono);font-size:13px;color:var(--text);font-weight:500}
.sugg-desc{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:2px}
.badge-pill{font-size:10px;font-family:var(--mono);padding:2px 7px;border-radius:999px}

.board-wrap{height:calc(100vh - 108px);padding:14px 20px;display:flex;gap:12px;overflow-x:auto}
.board-empty{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);font-size:13px;text-align:center;gap:2px}
.col{width:250px;min-width:250px;display:flex;flex-direction:column;height:100%;flex-shrink:0}
.col.aguardando{width:220px;min-width:220px}
.col-hdr{background:var(--bg2);border:1px solid var(--border);border-radius:10px 10px 0 0;padding:9px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.col-stripe{width:3px;height:15px;border-radius:2px;flex-shrink:0}
.col-name{font-size:11.5px;font-weight:500;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.col-cnt{font-size:10px;font-family:var(--mono);padding:1px 7px;border-radius:10px;background:var(--bg3);color:var(--text2)}
.col-body{background:var(--bg3);border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px;flex:1;overflow-y:auto;padding:7px;display:flex;flex-direction:column;gap:6px;transition:background .12s}
.col-body.dragover{background:rgba(59,127,255,.12);outline:2px dashed var(--accent);outline-offset:-2px}
.col-empty{font-size:10.5px;color:var(--text3);text-align:center;padding:18px 4px;font-family:var(--mono)}

.mat-card{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:9px 10px;cursor:grab;transition:transform .1s,box-shadow .1s}
.mat-card:hover{border-color:var(--border2);box-shadow:0 4px 12px rgba(0,0,0,.25)}
.mat-card.dragging{opacity:.4}
.mc-top{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:4px}
.mc-cod{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mc-pos{font-size:9px;font-family:var(--mono);padding:1px 6px;border-radius:999px;font-weight:600;letter-spacing:.03em}
.mc-pos.nucleo{background:rgba(59,127,255,.15);color:var(--accent)}
.mc-pos.carcaca{background:rgba(124,58,237,.15);color:var(--roxo)}
.mc-pos.luva{background:rgba(249,115,22,.15);color:var(--orange)}
.mc-meta{font-size:9.5px;color:var(--text3);font-family:var(--mono);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mc-bottom{display:flex;align-items:center;justify-content:space-between;gap:6px;flex-wrap:wrap}
.mc-mat{font-size:9.5px;font-family:var(--mono);color:var(--text2)}
.mc-qtd{font-size:9px;font-family:var(--mono);color:var(--text3);background:var(--bg3);border-radius:999px;padding:1px 6px}
.mc-dias{font-size:9px;font-family:var(--mono);color:var(--text3);margin-left:auto}
.mc-dias.atraso{color:var(--warn)}
.mc-prazo{font-size:9px;font-family:var(--mono);color:var(--text3)}
.mc-prazo.hoje{color:var(--warn);font-weight:700}
.mc-prazo.atrasado{color:var(--danger);font-weight:700}
.mc-completo{margin-top:6px;font-size:9.5px;font-family:var(--mono);color:var(--ok);background:rgba(45,191,126,.12);border-radius:6px;padding:3px 6px;text-align:center}
.mc-aguardando{margin-top:6px;font-size:9.5px;font-family:var(--mono);color:var(--warn);background:rgba(245,166,35,.12);border-radius:6px;padding:3px 6px;text-align:center}
.mc-lotes{margin-top:6px;font-size:9.5px;font-family:var(--mono);border-radius:6px;padding:3px 6px;text-align:center}
.mc-lotes.ok{color:var(--ok);background:rgba(45,191,126,.12)}
.mc-lotes.warn{color:var(--warn);background:rgba(245,166,35,.12)}
.mc-trilha{display:flex;gap:3px;margin-top:6px}
.mc-dot{width:5px;height:5px;border-radius:50%;background:var(--border2);flex-shrink:0}
.mc-dot.filled{background:var(--accent)}
.mat-card.mc-dim{opacity:.28}
.mat-card.mc-lote-hover{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.col-sub{font-size:8.5px;color:var(--text3);font-family:var(--mono);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.col-body.drag-valid{outline:2px solid rgba(45,191,126,.3);outline-offset:-2px}
.col-body.drag-invalid{opacity:.35}
.andon{display:flex;gap:6px;flex-shrink:0}
.andon-chip{font-size:11px;font-family:var(--mono);padding:5px 10px;border-radius:999px;border:1px solid var(--border);background:transparent;cursor:pointer;white-space:nowrap;color:var(--text2)}
.andon-chip:hover{border-color:var(--border2)}
.andon-chip.ok{color:var(--ok);border-color:rgba(45,191,126,.35)}
.andon-chip.warn{color:var(--warn);border-color:rgba(245,166,35,.35)}
.andon-chip.active{outline:2px solid var(--accent);outline-offset:1px}

.loading{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text3);font-family:var(--mono);font-size:12px;gap:10px}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* PAINEL LATERAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:150;display:none}
.overlay.open{display:block}
.side-panel{position:fixed;top:0;right:0;bottom:0;width:420px;max-width:94vw;background:var(--bg2);border-left:1px solid var(--border2);z-index:160;transform:translateX(100%);transition:transform .2s;display:flex;flex-direction:column}
.side-panel.open{transform:translateX(0)}
.sp-hdr{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sp-title{font-size:15px;font-weight:500}
.sp-sub{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:3px}
.sp-close{background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;line-height:1}
.sp-close:hover{color:var(--text)}
.sp-body{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:16px}
.sp-f{display:flex;flex-direction:column;gap:4px}
.sp-l{font-size:9px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.07em}
.sp-inp{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:13px;color:var(--text);outline:none;font-family:var(--mono)}
.sp-inp:focus{border-color:var(--accent)}
.sp-static{font-size:13px;font-family:var(--mono);color:var(--text2)}
.chk-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2)}
.mat-hist{display:flex;flex-direction:column;gap:3px;margin-top:6px}
.mat-hist-item{font-size:10px;font-family:var(--mono);color:var(--text3);display:flex;justify-content:space-between;gap:6px}
.comp-block{border:1px solid var(--border);border-radius:10px;padding:10px 12px;background:var(--bg3)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg4);border:1px solid var(--border2);color:var(--text);padding:9px 18px;border-radius:9px;font-size:12px;font-family:var(--mono);z-index:300;display:none;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.toast-erro{border:2px solid var(--danger);color:var(--danger);font-size:14px;font-weight:600;padding:13px 22px;box-shadow:0 8px 28px rgba(240,69,69,.4)}

/* MESA DE PLANEJAMENTO */
.mesa-panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-48%) scale(.98);width:min(1080px,92vw);max-height:88vh;background:var(--bg2);border:1px solid var(--border2);border-radius:14px;z-index:170;opacity:0;pointer-events:none;transition:opacity .18s,transform .18s;display:flex;flex-direction:column;box-shadow:0 24px 70px rgba(0,0,0,.55)}
.mesa-panel.open{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
.mesa-sec{display:flex;flex-direction:column;gap:8px}
.mesa-sec-hdr{display:flex;align-items:center;justify-content:space-between;gap:8px}
.mesa-chips{display:flex;flex-wrap:wrap;gap:7px}
.mesa-chip{background:var(--bg3);border:1px solid var(--border);border-radius:999px;padding:6px 13px;font-size:11.5px;color:var(--text2);cursor:pointer;font-family:var(--sans);transition:all .12s}
.mesa-chip:hover{border-color:var(--border2);color:var(--text)}
.mesa-chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
.mesa-chip.mini{padding:3px 9px;font-size:10px}
.mesa-alloc-track{height:9px;background:var(--bg3);border:1px solid var(--border);border-radius:999px;overflow:hidden}
.mesa-alloc-fill{height:100%;background:var(--accent);border-radius:999px;transition:width .15s}
.mesa-alloc-fill.over{background:var(--warn)}
.mesa-alloc-lbl{font-size:10.5px;color:var(--text3);font-family:var(--mono);margin-top:4px}
.mesa-hint{font-size:12px;color:var(--text3);font-family:var(--mono);padding:14px;text-align:center;background:var(--bg3);border-radius:10px}
.mesa-linhas{display:flex;flex-direction:column;gap:10px}
.mesa-lote{border:1px solid var(--border);border-radius:10px;padding:11px 13px;background:var(--bg3)}
.mesa-lote-hdr{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.mesa-lote-tag{font-size:11px;font-family:var(--mono);color:var(--text2);font-weight:500;background:var(--bg4);border-radius:999px;padding:3px 10px}
.mesa-qtd-inp{width:64px;text-align:right}
.mesa-qtd-suf{font-size:10.5px;color:var(--text3);font-family:var(--mono)}
.mesa-obs-inp{flex:1;min-width:120px}
.mesa-lote-acoes{display:flex;gap:5px;margin-left:auto}
.mesa-lote-acoes .danger{color:var(--danger);border-color:var(--danger)}
.mesa-lote-comps{display:flex;gap:14px;flex-wrap:wrap}
.mesa-comp{min-width:150px;flex:1}
.mesa-comp-lbl{font-size:10.5px;color:var(--text2);font-family:var(--mono);margin-bottom:6px}
.mesa-comp-mat{color:var(--text3)}
.mesa-trilha{display:flex;align-items:center;gap:5px;margin-bottom:6px}
.mesa-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--border2);background:var(--bg2);cursor:pointer;flex-shrink:0;transition:all .12s}
.mesa-dot:hover{border-color:var(--accent)}
.mesa-dot.filled{background:var(--ok);border-color:var(--ok)}
.mesa-comp-status{font-size:10px;font-family:var(--mono);color:var(--ok)}
.mesa-intencao{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.mesa-intencao-lbl{font-size:9.5px;color:var(--text3);font-family:var(--mono)}
.mesa-existentes{display:flex;flex-direction:column;gap:5px}
.mesa-existente-row{display:flex;align-items:center;gap:10px;font-size:11px;font-family:var(--mono);color:var(--text2);padding:6px 10px;border:1px solid var(--border);border-radius:8px;cursor:pointer}
.mesa-existente-row:hover{border-color:var(--border2)}
.mesa-existente-row.ok{border-color:rgba(45,191,126,.3)}
.mesa-existente-num{color:var(--text)}
.mesa-existente-status{color:var(--text3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mesa-existente-badge{color:var(--ok)}
.mesa-footer{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;padding-top:6px;border-top:1px solid var(--border)}

/* MODO TV — monitor fixo na parede, só leitura, fonte maior, sem drag/clique */
body.tv-mode .search-wrap,body.tv-mode .hint{display:none}
body.tv-mode .toolbar{height:auto;padding:16px 28px}
body.tv-mode .tt{font-size:20px}
body.tv-mode .andon{gap:10px;margin-left:auto}
body.tv-mode .andon-chip{font-size:15px;padding:8px 18px}
body.tv-mode .board-wrap{height:calc(100vh - 88px);padding:18px 28px}
body.tv-mode .col{width:310px;min-width:310px}
body.tv-mode .col.aguardando{width:270px;min-width:270px}
body.tv-mode .col-hdr{padding:13px 15px}
body.tv-mode .col-name{font-size:14.5px}
body.tv-mode .col-sub{font-size:11px}
body.tv-mode .col-cnt{font-size:12px;padding:2px 9px}
body.tv-mode .mat-card{padding:13px 14px;cursor:default}
body.tv-mode .mc-cod{font-size:15px}
body.tv-mode .mc-pos{font-size:11px;padding:2px 8px}
body.tv-mode .mc-meta{font-size:12px}
body.tv-mode .mc-mat,body.tv-mode .mc-qtd,body.tv-mode .mc-dias,body.tv-mode .mc-prazo{font-size:11.5px}
body.tv-mode .mc-completo,body.tv-mode .mc-aguardando,body.tv-mode .mc-lotes{font-size:12px;padding:5px 8px;margin-top:8px}
body.tv-mode .mc-dot{width:7px;height:7px}
</style>
</head>
<body>

<div style="display:grid;grid-template-rows:56px 52px 1fr;height:100vh">

<!-- TOPBAR -->
<div class="topbar">
  <div class="brand"><div class="bm">BM</div><div><div class="bn">BRASMAT MES</div><div class="bs">sistema de execução de manufatura</div></div></div>
  <div class="nav">
    <button class="nb" data-href="index.html" onclick="navTo('index.html')">Buscar Peça</button>
    <div class="nav-group">
      <button class="nb nb-group">Cliente ▾</button>
      <div class="nav-dropdown">
        <button class="nb" data-href="demanda.html" onclick="navTo('demanda.html')">Demanda Cliente</button>
        <button class="nb" data-href="cliente.html" onclick="navTo('cliente.html')">Consulta Cliente</button>
        <button class="nb" data-href="expedicao.html" onclick="navTo('expedicao.html')">Expedição</button>
      </div>
    </div>
    <div class="nav-group">
      <button class="nb nb-group">Produção ▾</button>
      <div class="nav-dropdown">
        <button class="nb" data-href="kanban.html" onclick="navTo('kanban.html')">Kanban</button>
        <button class="nb" data-href="op-kanban.html" onclick="navTo('op-kanban.html')">Painel</button>
        <button class="nb" data-href="apontamentos.html" onclick="navTo('apontamentos.html')">Apontamentos</button>
        <button class="nb" data-href="paradas.html" onclick="navTo('paradas.html')">Peças paradas</button>
      </div>
    </div>
    <div class="nav-group">
      <button class="nb nb-group">Indicadores ▾</button>
      <div class="nav-dropdown">
        <button class="nb" data-href="prazos.html" onclick="navTo('prazos.html')">Prazos</button>
        <button class="nb" data-href="otd.html" onclick="navTo('otd.html')">OTD</button>
        <button class="nb" data-href="ordens.html" onclick="navTo('ordens.html')">Ordens em Aberto</button>
        <button class="nb" data-href="operadores.html" onclick="navTo('operadores.html')">Performance</button>
        <button class="nb" data-href="qualidade.html" onclick="navTo('qualidade.html')">Qualidade</button>
        <button class="nb" data-href="separacao-relatorio.html" onclick="navTo('separacao-relatorio.html')">Separação Relatório</button>
      </div>
    </div>
    <div class="nav-group group-active">
      <button class="nb nb-group active">Cadastro ▾</button>
      <div class="nav-dropdown">
        <button class="nb" data-href="cadastro-item.html" onclick="navTo('cadastro-item.html')">Item</button>
        <button class="nb active" data-href="separacao-material.html">Separação</button>
        <button class="nb" data-href="engenharia.html" onclick="navTo('engenharia.html')">Roteiro</button>
      </div>
    </div>
  </div>
  <div class="tr-right">
    <button class="btn-g" id="tvToggleBtn" onclick="toggleTvMode()">📺 Modo TV</button>
    <div class="sync-dot"></div>
    <span class="sync-lbl" id="slbl">carregando...</span>
  </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="tt">Separação de Material</div>
  <div class="search-wrap">
    <input class="search-input" id="buscaInput" placeholder="Buscar item por código, pedido ou OS para criar lote..." oninput="onBusca()" autocomplete="off">
    <div class="sugg" id="sugg"></div>
  </div>
  <div class="andon" id="andonBar"></div>
  <div class="hint">arraste o cartão pra próxima etapa</div>
</div>

<!-- BOARD -->
<div class="board-wrap" id="boardWrap">
  <div class="loading"><div class="spinner"></div>carregando...</div>
</div>

</div>

<!-- PAINEL LATERAL -->
<div class="overlay" id="overlay" onclick="fecharPainel();fecharMesa()"></div>
<div class="side-panel" id="sidePanel">
  <div class="sp-hdr">
    <div>
      <div class="sp-title" id="spTitle">—</div>
      <div class="sp-sub" id="spSub">—</div>
    </div>
    <button class="sp-close" onclick="fecharPainel()">✕</button>
  </div>
  <div class="sp-body" id="spBody"></div>
</div>

<!-- MESA DE PLANEJAMENTO -->
<div class="mesa-panel" id="mesaPanel">
  <div class="sp-hdr">
    <div>
      <div class="sp-title" id="mesaTitle">—</div>
      <div class="sp-sub" id="mesaSub">—</div>
    </div>
    <button class="sp-close" onclick="fecharMesa()">✕</button>
  </div>
  <div class="sp-body" id="mesaBody"></div>
</div>

<div class="toast" id="toast"></div>

<script src="status.js"></script>
<script>
function navTo(p){ location.href = p; }

const POS_LABEL = { nucleo:"Núcleo", carcaca:"Carcaça", luva:"Luva" };
const MATERIAL_LABEL = { metal_duro:"Metal Duro", aco:"Aço" };

let ITENS_CAD = [];     // itens cadastrados (fonte da busca p/ criar lote)
let LOTES = [];         // material_lotes
let COMPONENTES = [];   // material_lote_componentes
let ESTAGIOS = [];      // material_estagios (5 colunas reais, ordem 1-5)
let ULTIMOS = [];       // material_ultimo_evento (por componente_id)
let _dragCompId = null;
let _dragTipo = null;
let _dragEndedAt = 0;
let _filtroTexto = "";     // texto da busca, também usado pra esmaecer cartões no board
let _andonFiltro = null;   // 'prontos' | 'parados' | 'compra' | null — clique nos contadores da toolbar
let _tvMode = false;       // modo TV: monitor fixo na parede, só leitura, sem drag/clique

// modo TV — liga/desliga sem recarregar; a URL guarda o estado (?tv=1) pra uma TV fixa poder só abrir o link salvo
function toggleTvMode(){
  _tvMode = !_tvMode;
  aplicarTvMode();
  renderBoard();
}
function aplicarTvMode(){
  document.body.classList.toggle("tv-mode", _tvMode);
  const btn = document.getElementById("tvToggleBtn");
  if(btn) btn.textContent = _tvMode ? "✕ Sair do modo TV" : "📺 Modo TV";
  const url = new URL(location.href);
  if(_tvMode) url.searchParams.set("tv","1"); else url.searchParams.delete("tv");
  history.replaceState(null, "", url.toString());
}

async function supaWrite(path, method, body, prefer){
  const r = await fetch(SUPA_URL + path, {
    method,
    headers:{ apikey:SUPA_KEY, Authorization:"Bearer "+SUPA_KEY, "Content-Type":"application/json", Prefer: prefer||"return=representation" },
    body: body!==undefined ? JSON.stringify(body) : undefined
  });
  if(r.status===204) return null;
  const j = await r.json().catch(()=>null);
  if(!r.ok) throw new Error((j&&j.message)||("HTTP "+r.status));
  return j;
}
function toast(msg, tipo){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast" + (tipo==="erro" ? " toast-erro" : "");
  t.style.display = "block";
  clearTimeout(t._tm);
  t._tm = setTimeout(()=>{ t.style.display="none"; }, tipo==="erro"?4800:2200);
}
function setSync(s){ document.getElementById("slbl").textContent = s; }

// colunas: todas reais em material_estagios, incluindo "Aguardando" (ordem 0) — permite arrastar de volta pra lá
function colunas(){
  return ESTAGIOS.slice().sort((a,b)=>a.ordem-b.ordem);
}
function colunaAplica(col, tipoMaterial){
  return tipoMaterial==="metal_duro" ? col.aplica_metal_duro : col.aplica_aco;
}
// rótulo "só Aço" / "só Metal Duro" quando a coluna não vale pros dois materiais
function subLabelColuna(col){
  if(col.aplica_metal_duro && !col.aplica_aco) return "só Metal Duro";
  if(col.aplica_aco && !col.aplica_metal_duro) return "só Aço";
  return "";
}

function ultimoDoComponente(compId){
  return ULTIMOS.find(u=>u.componente_id===compId) || null;
}
function ordemAtual(compId){
  const u = ultimoDoComponente(compId);
  return u ? u.estagio_ordem : 0;
}
function itemDoLote(lote){
  return ITENS_CAD.find(i=>i.id===lote.item_id) || null;
}
function loteDoComponente(comp){
  return LOTES.find(l=>l.id===comp.lote_id) || null;
}
function diasParado(compId){
  const u = ultimoDoComponente(compId);
  if(!u) return null;
  const d = new Date(u.data_evento);
  if(isNaN(d)) return null;
  return Math.max(0, Math.floor((Date.now()-d.getTime())/86400000)); // relógio do servidor pode diferir por ms
}
function loteCompleto(loteId){
  const comps = COMPONENTES.filter(c=>c.lote_id===loteId);
  if(!comps.length) return false;
  const maxOrdem = Math.max(...ESTAGIOS.map(e=>e.ordem), 0);
  return comps.every(c=>ordemAtual(c.id)>=maxOrdem);
}
// outras peças do mesmo lote que ainda não chegaram no Pronto (pra avisar "aguardando X")
function pendentesDoLote(loteId, exceptCompId){
  const maxOrdem = Math.max(...ESTAGIOS.map(e=>e.ordem), 0);
  return COMPONENTES.filter(c=>c.lote_id===loteId && c.id!==exceptCompId && ordemAtual(c.id)<maxOrdem);
}

// chave de urgência: vencido (mais atrasado primeiro) > vence hoje/em breve (mais próximo primeiro) > sem prazo (mais dias parado primeiro)
function chavePrioridade(comp){
  const lote = loteDoComponente(comp);
  const item = lote ? itemDoLote(lote) : null;
  const dias = diasParado(comp.id) || 0;
  let prazoRank = 2, prazoValor = 0;
  if(item && item.prazo_entrega){
    const hoje = new Date(); hoje.setHours(0,0,0,0);
    const pz = new Date(String(item.prazo_entrega).slice(0,10)+"T00:00:00");
    if(!isNaN(pz)){
      const diffDias = Math.round((pz-hoje)/86400000);
      prazoRank = diffDias<0 ? 0 : 1;
      prazoValor = diffDias;
    }
  }
  return { prazoRank, prazoValor, dias };
}
function ordenarPorUrgencia(comps){
  return comps.slice().sort((a,b)=>{
    const ka=chavePrioridade(a), kb=chavePrioridade(b);
    if(ka.prazoRank!==kb.prazoRank) return ka.prazoRank-kb.prazoRank;
    if(ka.prazoRank<2 && ka.prazoValor!==kb.prazoValor) return ka.prazoValor-kb.prazoValor;
    return kb.dias-ka.dias;
  });
}

// filtro de texto (mesmo campo que cria lote) — só esmaece, nunca esconde
function cardBateFiltro(item){
  if(!_filtroTexto) return true;
  if(!item) return false;
  const cod = String(item.codigo_peca||"").toUpperCase();
  const ped = String(item.pedido||"").toUpperCase();
  const os  = String(item.os||"").toUpperCase();
  return cod.includes(_filtroTexto) || ped.includes(_filtroTexto) || os.includes(_filtroTexto);
}
// filtro dos contadores Andon da toolbar
function cardBateAndon(comp){
  if(!_andonFiltro) return true;
  const maxOrdem = Math.max(...ESTAGIOS.map(e=>e.ordem), 0);
  if(_andonFiltro==="parados"){
    const d = diasParado(comp.id);
    return d!==null && d>=3 && ordemAtual(comp.id)<maxOrdem;
  }
  if(_andonFiltro==="compra"){
    const compraCol = ESTAGIOS.find(e=>/compra/i.test(e.descricao));
    return !!compraCol && ordemAtual(comp.id)===compraCol.ordem;
  }
  if(_andonFiltro==="prontos"){
    const lote = loteDoComponente(comp);
    const item = lote ? itemDoLote(lote) : null;
    if(!item) return false;
    const r = materialResumoItem(item.id, {lotes:LOTES, componentes:COMPONENTES, ultimos:ULTIMOS, estagios:ESTAGIOS});
    return !!(r && r.completo);
  }
  return true;
}
function calcAndon(){
  const maxOrdem = Math.max(...ESTAGIOS.map(e=>e.ordem), 0);
  let kitsProntos = 0;
  const itensComLote = new Set(LOTES.map(l=>l.item_id));
  itensComLote.forEach(itemId=>{
    const r = materialResumoItem(itemId, {lotes:LOTES, componentes:COMPONENTES, ultimos:ULTIMOS, estagios:ESTAGIOS});
    if(r && r.completo) kitsProntos++;
  });
  const parados = COMPONENTES.filter(c=>{
    const d = diasParado(c.id);
    return d!==null && d>=3 && ordemAtual(c.id)<maxOrdem;
  }).length;
  const compraCol = ESTAGIOS.find(e=>/compra/i.test(e.descricao));
  const emCompra = compraCol ? COMPONENTES.filter(c=>ordemAtual(c.id)===compraCol.ordem).length : 0;
  return { kitsProntos, parados, emCompra };
}
function renderAndon(){
  const box = document.getElementById("andonBar");
  if(!box) return;
  const a = calcAndon();
  box.innerHTML = `
    <button class="andon-chip ok${_andonFiltro==='prontos'?' active':''}" onclick="toggleAndonFiltro('prontos')" title="Itens com todos os lotes prontos p/ roteiro">✓ ${a.kitsProntos} pronto(s) p/ roteiro</button>
    <button class="andon-chip warn${_andonFiltro==='parados'?' active':''}" onclick="toggleAndonFiltro('parados')" title="Cartões sem movimento há 3 dias ou mais">⏱ ${a.parados} parado(s) ≥3d</button>
    <button class="andon-chip${_andonFiltro==='compra'?' active':''}" onclick="toggleAndonFiltro('compra')" title="Cartões parados na etapa de Compra">🛒 ${a.emCompra} em compra</button>
  `;
}
function toggleAndonFiltro(tipo){
  _andonFiltro = (_andonFiltro===tipo) ? null : tipo;
  renderBoard();
}

let _mostrarConcluidos = false;
function toggleConcluidos(){
  _mostrarConcluidos = !_mostrarConcluidos;
  renderBoard();
}

// ---- BOARD ----
function renderBoard(){
  renderAndon();
  const cols = colunas();
  const maxOrdem = Math.max(...ESTAGIOS.map(e=>e.ordem), 0);
  const wrap = document.getElementById("boardWrap");
  if(!COMPONENTES.length){
    wrap.innerHTML = `<div class="board-empty">
      <div style="font-size:24px;margin-bottom:8px">📦</div>
      <div>Nenhum lote criado ainda.</div>
      <div style="margin-top:4px">Busque um item no campo acima e clique nele para criar o primeiro lote.</div>
    </div>`;
    return;
  }
  wrap.innerHTML = cols.map(col=>{
    let comps = ordenarPorUrgencia(COMPONENTES.filter(c=>ordemAtual(c.id)===col.ordem));
    let concluidosCount = 0;
    // coluna Pronto: cartão cujo lote já está 100% completo "sai" da vista por padrão (kit já pode ir pro Roteiro)
    if(col.ordem===maxOrdem){
      const pendentes = comps.filter(c=>!loteCompleto(c.lote_id));
      const concluidos = comps.filter(c=>loteCompleto(c.lote_id));
      concluidosCount = concluidos.length;
      comps = _mostrarConcluidos ? comps : pendentes;
    }
    const body = comps.length
      ? comps.map(c=>renderCard(c)).join("")
      : '<div class="col-empty">vazio</div>';
    const toggleHtml = concluidosCount
      ? `<button class="col-cnt" style="cursor:pointer;background:rgba(45,191,126,.15);color:var(--ok);border:none" onclick="toggleConcluidos()">${_mostrarConcluidos?'ocultar':'✓'} ${concluidosCount} concluído(s)</button>`
      : "";
    const cor = col.ordem===0 ? "var(--text3)" : (col.ordem>=maxOrdem ? "var(--ok)" : "var(--warn)");
    const sub = subLabelColuna(col);
    return `<div class="col${col.ordem===0?' aguardando':''}" data-ordem="${col.ordem}">
      <div class="col-hdr"><div class="col-stripe" style="background:${cor}"></div><div style="flex:1;min-width:0"><div class="col-name">${escHtml(col.descricao)}</div>${sub?`<div class="col-sub">${sub}</div>`:''}</div><div class="col-cnt">${comps.length}</div>${toggleHtml}</div>
      <div class="col-body" data-ordem="${col.ordem}" ondragover="onDragOver(event,${col.ordem})" ondragleave="onDragLeave(event)" ondrop="onDrop(event,${col.ordem})">${body}</div>
    </div>`;
  }).join("");
}

function renderCard(comp){
  const lote = loteDoComponente(comp);
  const item = lote ? itemDoLote(lote) : null;
  const cod = item ? item.codigo_peca : "(?)";
  const dias = diasParado(comp.id);
  const diasHtml = dias===null ? "" : `<span class="mc-dias${dias>=3?' atraso':''}">${dias===0?"hoje":dias+"d parado"}</span>`;
  const resumoItem = item ? materialResumoItem(item.id, {lotes:LOTES, componentes:COMPONENTES, ultimos:ULTIMOS, estagios:ESTAGIOS}) : null;
  const loteTag = resumoItem && resumoItem.total>1 ? ` · lote ${lote.lote_numero}` : "";
  const lotesResumoHtml = resumoItem && resumoItem.total>1
    ? `<div class="mc-lotes ${resumoItem.completo?'ok':'warn'}">${resumoItem.completo ? `✓ todos os ${resumoItem.total} lotes prontos` : `⚠ ${resumoItem.prontos} de ${resumoItem.total} lotes prontos`}</div>`
    : "";
  const maxOrdem = Math.max(...ESTAGIOS.map(e=>e.ordem), 0);
  const estaNoPronto = ordemAtual(comp.id)>=maxOrdem;
  const completo = estaNoPronto && loteCompleto(comp.lote_id);
  const pendentes = estaNoPronto && !completo && lote ? pendentesDoLote(comp.lote_id, comp.id) : [];
  const aguardandoHtml = pendentes.length
    ? `<div class="mc-aguardando">pronto — aguardando ${pendentes.map(p=>POS_LABEL[p.posicao]).join(", ")}</div>` : "";
  let prazoHtml = "";
  if(item && item.prazo_entrega && !completo){
    const hoje = new Date();
    const hojeISO = hoje.getFullYear()+"-"+String(hoje.getMonth()+1).padStart(2,"0")+"-"+String(hoje.getDate()).padStart(2,"0");
    const pz = String(item.prazo_entrega).slice(0,10);
    const cls = pz<hojeISO ? " atrasado" : (pz===hojeISO ? " hoje" : "");
    prazoHtml = `<span class="mc-prazo${cls}">📅 ${new Date(pz+"T00:00:00").toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"})}</span>`;
  }
  const dimCls = (cardBateFiltro(item) && cardBateAndon(comp)) ? "" : " mc-dim";
  // modo TV: sem drag, sem clique, sem hover — só leitura, pra monitor fixo na parede
  const interAttrs = _tvMode ? "" : `draggable="true"
      ondragstart="onDragStart(event,${comp.id},'${comp.tipo_material}')" ondragend="onDragEnd(event)"
      onmouseenter="destacarLote(${comp.lote_id})" onmouseleave="limparDestaqueLote()"
      onclick="abrirComponente(${comp.id})"`;
  return `<div class="mat-card${dimCls}" data-comp-id="${comp.id}" data-lote-id="${comp.lote_id}" ${interAttrs}>
    <div class="mc-top"><div class="mc-cod">${escHtml(cod)}</div><span class="mc-pos ${comp.posicao}">${POS_LABEL[comp.posicao]}</span></div>
    <div class="mc-meta">${item?("Pedido "+escHtml(item.pedido||"—")+" · OS "+escHtml(item.os||"—")):""}${loteTag}</div>
    <div class="mc-bottom"><span class="mc-mat">${MATERIAL_LABEL[comp.tipo_material]}</span><span class="mc-qtd">${lote?lote.quantidade:"—"} pç</span>${prazoHtml}${diasHtml}</div>
    ${trilhaHtml(comp)}
    ${aguardandoHtml}
    ${completo ? '<div class="mc-completo">✓ kit completo</div>' : ''}
    ${lotesResumoHtml}
  </div>`;
}
// pontinhos com as etapas aplicáveis ao material do cartão, preenchidos até a etapa atual
function trilhaHtml(comp){
  const aplicaveis = ESTAGIOS.filter(e=>colunaAplica(e, comp.tipo_material)).sort((a,b)=>a.ordem-b.ordem);
  if(aplicaveis.length<2) return "";
  const atual = ordemAtual(comp.id);
  return `<div class="mc-trilha">${aplicaveis.map(e=>`<span class="mc-dot${e.ordem<=atual?' filled':''}"></span>`).join("")}</div>`;
}
// realça no board os cartões irmãos do mesmo lote (revela a hierarquia item→lote→componente sob demanda)
function destacarLote(loteId){
  document.querySelectorAll(`.mat-card[data-lote-id="${loteId}"]`).forEach(el=>el.classList.add("mc-lote-hover"));
}
function limparDestaqueLote(){
  document.querySelectorAll(".mat-card.mc-lote-hover").forEach(el=>el.classList.remove("mc-lote-hover"));
}

// ---- DRAG AND DROP ----
function onDragStart(ev, compId, tipo){
  _dragCompId = compId; _dragTipo = tipo;
  ev.target.classList.add("dragging");
  ev.dataTransfer.effectAllowed = "move";
  destacarColunasDrag(tipo, ordemAtual(compId));
}
function onDragEnd(ev){
  ev.target.classList.remove("dragging");
  _dragEndedAt = Date.now();
  _dragCompId = null; _dragTipo = null;
  limparDestaqueColunasDrag();
}
// ao começar o arraste, mostra de cara em quais colunas o cartão pode ser solto (evita descobrir só tentando)
function destacarColunasDrag(tipo, ordemDoAtual){
  document.querySelectorAll(".col-body").forEach(el=>{
    const ordem = parseInt(el.dataset.ordem,10);
    const col = colunas().find(c=>c.ordem===ordem);
    if(!col || ordem===ordemDoAtual){ el.classList.remove("drag-valid","drag-invalid"); return; }
    const valida = colunaAplica(col, tipo);
    el.classList.toggle("drag-valid", valida);
    el.classList.toggle("drag-invalid", !valida);
  });
}
function limparDestaqueColunasDrag(){
  document.querySelectorAll(".col-body").forEach(el=>el.classList.remove("drag-valid","drag-invalid"));
}
function onDragOver(ev, ordem){
  const col = colunas().find(c=>c.ordem===ordem);
  if(!col || !_dragTipo || !colunaAplica(col,_dragTipo)) return; // não permite — sem preventDefault o navegador bloqueia o drop
  ev.preventDefault();
  ev.currentTarget.classList.add("dragover");
}
function onDragLeave(ev){
  ev.currentTarget.classList.remove("dragover");
}
async function onDrop(ev, ordem){
  ev.preventDefault();
  ev.currentTarget.classList.remove("dragover");
  const compId = _dragCompId;
  const comp = COMPONENTES.find(c=>c.id===compId);
  if(!comp) return;
  const col = colunas().find(c=>c.ordem===ordem);
  if(!col || !colunaAplica(col, comp.tipo_material)){
    toast("Essa etapa não se aplica a "+MATERIAL_LABEL[comp.tipo_material], "erro");
    return;
  }
  if(ordemAtual(compId)===ordem) return; // já está aí
  await registrarEvento(comp, col);
}

async function registrarEvento(comp, col){
  try{
    const novo = await supaWrite("/rest/v1/material_eventos","POST",{
      componente_id: comp.id,
      estagio_id: col.id, estagio_descricao: col.descricao, estagio_ordem: col.ordem
    });
    const row = Array.isArray(novo)?novo[0]:novo;
    const idx = ULTIMOS.findIndex(u=>u.componente_id===comp.id);
    const novoUltimo = { componente_id:comp.id, estagio_id:col.id, estagio_descricao:col.descricao, estagio_ordem:col.ordem, data_evento: row?row.data_evento:new Date().toISOString() };
    if(idx>=0) ULTIMOS[idx]=novoUltimo; else ULTIMOS.push(novoUltimo);
    renderBoard();
  }catch(e){ toast("Erro ao registrar: "+e.message, "erro"); }
}

// ---- BUSCA / CRIAR LOTE ----
let _suggTimer=null;
function onBusca(){
  const q = document.getElementById("buscaInput").value.trim();
  _filtroTexto = q.toUpperCase();
  renderBoard(); // mesmo campo também esmaece no board os cartões que não batem, sem precisar de outro controle
  clearTimeout(_suggTimer);
  if(q.length<2){ document.getElementById("sugg").style.display="none"; return; }
  _suggTimer = setTimeout(()=>buscarSugg(q), 180);
}
function buscarSugg(q){
  const qU = q.toUpperCase();
  const lista = ITENS_CAD.filter(r=>{
    const cod = String(r.codigo_peca||"").trim();
    return cod.toUpperCase().includes(qU) || String(r.pedido||"").toUpperCase().includes(qU) || String(r.os||"").toUpperCase().includes(qU);
  }).slice(0,12);
  const box = document.getElementById("sugg");
  if(!lista.length){
    box.innerHTML = `<div class="sugg-item" style="cursor:default"><div style="color:var(--text3);font-size:12px">Nenhum item encontrado com "${escHtml(q)}". Cadastre em Cadastro › Item.</div></div>`;
  }else{
    box.innerHTML = lista.map(r=>{
      const nLotes = LOTES.filter(l=>l.item_id===r.id).length;
      const tag = nLotes ? `<span class="badge-pill" style="background:rgba(59,127,255,.15);color:var(--accent)">${nLotes} lote(s)</span>` : `<span class="badge-pill" style="background:var(--bg4);color:var(--text3)">sem lote</span>`;
      return `<div class="sugg-item" onclick="abrirMesa(${r.id})">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:6px">
          <div class="sugg-cod">${escHtml(r.codigo_peca)}</div>${tag}
        </div>
        <div class="sugg-desc">${[r.pedido?"Pedido: "+escHtml(r.pedido):"",r.os?"OS: "+escHtml(r.os):"",r.quantidade?"Qtd: "+escHtml(r.quantidade)+" pç":""].filter(Boolean).join(" · ")}</div>
      </div>`;
    }).join("");
  }
  box.style.display="block";
}
document.addEventListener("click", e=>{
  if(!e.target.closest(".search-wrap")) document.getElementById("sugg").style.display="none";
});

// monta as opções de "situação atual" válidas pro material (Aguardando + as colunas que se aplicam a ele)
// usada pelo fluxo de "adicionar componente faltante" (renderAdicionarComponente) — a Mesa não usa esta função
function opcoesSituacaoHtml(tipoMaterial){
  const opts = ESTAGIOS.filter(e=>tipoMaterial==="metal_duro" ? e.aplica_metal_duro : e.aplica_aco).sort((a,b)=>a.ordem-b.ordem);
  return opts.map(o=>`<option value="${o.ordem}">${escHtml(o.ordem===0?"Aguardando (nada feito ainda)":o.descricao)}</option>`).join("");
}

// ---- MESA DE PLANEJAMENTO ----
// Planeja TODOS os lotes de um item de uma vez, antes de qualquer cartão existir no Kanban.
// Estado é só rascunho em memória até "Criar lotes" — nada é gravado antes disso.
let _mesaItem = null;
let _mesaEstrutura = { nucleo:null, carcaca:false, luva:false }; // molde: quais posições as linhas abaixo têm
let _mesaLinhas = [];      // rascunho de lotes: [{tempId, quantidade, observacao, comp:{nucleo:{fato,intencao},...}}]
let _mesaTempSeq = 1;
let _mesaConcluirChecked = false; // estado do checkbox "planejamento concluído" — em variável pra sobreviver a um clique sem precisar re-renderizar tudo

function abrirMesa(itemId){
  document.getElementById("sugg").style.display="none";
  document.getElementById("buscaInput").value="";
  _filtroTexto = "";
  renderBoard();
  const item = ITENS_CAD.find(i=>i.id===itemId);
  if(!item) return;
  _mesaItem = item;
  _mesaEstrutura = { nucleo:null, carcaca:false, luva:false };
  _mesaLinhas = [];
  _mesaConcluirChecked = !!item.plano_separacao_concluido;
  renderMesa();
  abrirMesaPainel();
}
function abrirMesaPainel(){
  document.getElementById("overlay").classList.add("open");
  document.getElementById("mesaPanel").classList.add("open");
}
function fecharMesa(){
  document.getElementById("overlay").classList.remove("open");
  document.getElementById("mesaPanel").classList.remove("open");
}

function mesaNovaLinhaObj(qtd, comp){
  return { tempId:_mesaTempSeq++, quantidade:qtd, observacao:"", comp: comp ? JSON.parse(JSON.stringify(comp)) : {} };
}
function mesaAlocado(){
  const drafts = _mesaLinhas.reduce((s,l)=>s+(parseInt(l.quantidade,10)||0),0);
  const existentes = _mesaItem ? LOTES.filter(l=>l.item_id===_mesaItem.id).reduce((s,l)=>s+(parseInt(l.quantidade,10)||0),0) : 0;
  return drafts+existentes;
}
// garante que toda linha tenha exatamente as posições ativas na estrutura (molde) — chamada sempre que a estrutura muda
function mesaSincronizarComponentes(){
  _mesaLinhas.forEach(l=>{
    ["nucleo","carcaca","luva"].forEach(pos=>{
      const ativo = pos==="nucleo" ? !!_mesaEstrutura.nucleo : !!_mesaEstrutura[pos];
      if(ativo && !l.comp[pos]) l.comp[pos] = { fato:0, intencao:null };
      if(!ativo && l.comp[pos]) delete l.comp[pos];
    });
  });
}
function mesaSetNucleo(tipo){
  const primeiraVez = !_mesaEstrutura.nucleo && !_mesaLinhas.length;
  _mesaEstrutura.nucleo = (_mesaEstrutura.nucleo===tipo) ? null : tipo;
  mesaSincronizarComponentes();
  if(_mesaEstrutura.nucleo && primeiraVez){
    const total = parseInt(_mesaItem.quantidade,10)||0;
    const restante = Math.max(0, total-mesaAlocado());
    _mesaLinhas.push(mesaNovaLinhaObj(restante||1));
    mesaSincronizarComponentes();
  }
  renderMesa();
}
function mesaToggle(pos){
  _mesaEstrutura[pos] = !_mesaEstrutura[pos];
  mesaSincronizarComponentes();
  renderMesa();
}
function mesaAdicionarLinha(){
  const total = parseInt(_mesaItem.quantidade,10)||0;
  const restante = Math.max(0, total-mesaAlocado());
  _mesaLinhas.push(mesaNovaLinhaObj(restante||1));
  mesaSincronizarComponentes();
  renderMesa();
}
function mesaDividir(tempId){
  const idx = _mesaLinhas.findIndex(l=>l.tempId===tempId);
  if(idx<0) return;
  const l = _mesaLinhas[idx];
  const qtd = parseInt(l.quantidade,10)||0;
  if(qtd<2){ toast("Quantidade insuficiente para dividir", "erro"); return; }
  const metade1 = Math.ceil(qtd/2), metade2 = qtd-metade1;
  l.quantidade = metade1;
  const nova = mesaNovaLinhaObj(metade2, l.comp);
  nova.observacao = l.observacao;
  _mesaLinhas.splice(idx+1,0,nova);
  renderMesa();
}
function mesaDuplicar(tempId){
  const idx = _mesaLinhas.findIndex(l=>l.tempId===tempId);
  if(idx<0) return;
  const l = _mesaLinhas[idx];
  const nova = mesaNovaLinhaObj(l.quantidade, l.comp);
  nova.observacao = l.observacao;
  _mesaLinhas.splice(idx+1,0,nova);
  renderMesa();
}
function mesaRemoverLinha(tempId){
  _mesaLinhas = _mesaLinhas.filter(l=>l.tempId!==tempId);
  renderMesa();
}
// digitação de quantidade/observação: só atualiza estado + a barra (renderMesa() completo perderia o foco do campo)
function mesaOnQtdInput(tempId, val){
  const l = _mesaLinhas.find(x=>x.tempId===tempId);
  if(!l) return;
  l.quantidade = val;
  mesaAtualizarBarra();
}
function mesaOnQtdChange(tempId){
  const l = _mesaLinhas.find(x=>x.tempId===tempId);
  if(!l) return;
  const n = parseInt(l.quantidade,10);
  l.quantidade = (n && n>0) ? n : 1;
  renderMesa();
}
function mesaOnObsInput(tempId, val){
  const l = _mesaLinhas.find(x=>x.tempId===tempId);
  if(l) l.observacao = val;
}
function mesaAtualizarBarra(){
  const fill = document.getElementById("mesaAllocFill");
  const lbl = document.getElementById("mesaAllocLbl");
  if(!fill || !_mesaItem) return;
  const total = parseInt(_mesaItem.quantidade,10)||0;
  const alocado = mesaAlocado();
  const pct = total>0 ? Math.min(100, alocado/total*100) : 0;
  fill.style.width = pct+"%";
  fill.classList.toggle("over", alocado>total);
  lbl.textContent = alocado+" de "+total+" pç alocada"+(alocado>total?" — ⚠ passou do total":"");
}

// clique na trilha = FATO ("já está aqui" — vira evento real ao salvar); clicar de novo no mesmo ponto desfaz
function mesaSetFato(tempId, pos, ordem){
  const l = _mesaLinhas.find(x=>x.tempId===tempId);
  if(!l || !l.comp[pos]) return;
  l.comp[pos].fato = (l.comp[pos].fato===ordem) ? 0 : ordem;
  if(l.comp[pos].fato>0) l.comp[pos].intencao = null;
  renderMesa();
}
// só disponível enquanto o componente ainda está em Aguardando (fato=0) — intenção nunca vira evento sozinha
function mesaSetIntencao(tempId, pos, ordem){
  const l = _mesaLinhas.find(x=>x.tempId===tempId);
  if(!l || !l.comp[pos]) return;
  l.comp[pos].intencao = (l.comp[pos].intencao===ordem) ? null : ordem;
  renderMesa();
}

function mesaTrilhaHtml(tempId, pos, estado, tipoMaterial){
  const maxOrdem = Math.max(...ESTAGIOS.map(e=>e.ordem), 0);
  const aplicaveis = ESTAGIOS.filter(e=>e.ordem>0 && colunaAplica(e,tipoMaterial)).sort((a,b)=>a.ordem-b.ordem);
  const dots = aplicaveis.map(e=>{
    const filled = estado.fato>0 && e.ordem<=estado.fato;
    return `<span class="mesa-dot${filled?' filled':''}" title="${escHtml(e.ordem>=maxOrdem?'Pronto':e.descricao)}" onclick="mesaSetFato(${tempId},'${pos}',${e.ordem})"></span>`;
  }).join("");
  const statusHtml = estado.fato>0
    ? `<div class="mesa-comp-status">${estado.fato>=maxOrdem?"✓ Pronto":"já em: "+escHtml((ESTAGIOS.find(e=>e.ordem===estado.fato)||{}).descricao||"")}</div>`
    : mesaIntencaoHtml(tempId,pos,estado,tipoMaterial);
  return `<div class="mesa-trilha">${dots}</div>${statusHtml}`;
}
// "entra por" — só as etapas intermediárias (exclui Aguardando e Pronto, que não são pontos de entrada)
function mesaIntencaoHtml(tempId, pos, estado, tipoMaterial){
  const maxOrdem = Math.max(...ESTAGIOS.map(e=>e.ordem), 0);
  const opcoes = ESTAGIOS.filter(e=>e.ordem>0 && e.ordem<maxOrdem && colunaAplica(e,tipoMaterial)).sort((a,b)=>a.ordem-b.ordem);
  if(!opcoes.length) return "";
  return `<div class="mesa-intencao"><span class="mesa-intencao-lbl">entra por:</span>${opcoes.map(o=>
    `<button type="button" class="mesa-chip mini${estado.intencao===o.ordem?' on':''}" onclick="mesaSetIntencao(${tempId},'${pos}',${o.ordem})">${escHtml(o.descricao)}</button>`
  ).join("")}</div>`;
}

function mesaLinhaHtml(l, i){
  const posicoes = ["nucleo","carcaca","luva"].filter(p=>l.comp[p]);
  const compsHtml = posicoes.map(p=>{
    const tipoMaterial = p==="nucleo" ? _mesaEstrutura.nucleo : "aco";
    return `<div class="mesa-comp">
      <div class="mesa-comp-lbl">${POS_LABEL[p]} <span class="mesa-comp-mat">${MATERIAL_LABEL[tipoMaterial]}</span></div>
      ${mesaTrilhaHtml(l.tempId,p,l.comp[p],tipoMaterial)}
    </div>`;
  }).join("");
  return `<div class="mesa-lote">
    <div class="mesa-lote-hdr">
      <span class="mesa-lote-tag">Lote ${i+1}</span>
      <input class="sp-inp mesa-qtd-inp" type="number" min="1" id="mesaQtd_${l.tempId}" value="${escHtml(String(l.quantidade))}" oninput="mesaOnQtdInput(${l.tempId},this.value)" onchange="mesaOnQtdChange(${l.tempId})">
      <span class="mesa-qtd-suf">pç</span>
      <input class="sp-inp mesa-obs-inp" placeholder="observação (opcional)" value="${escHtml(l.observacao||"")}" oninput="mesaOnObsInput(${l.tempId},this.value)">
      <div class="mesa-lote-acoes">
        <button type="button" class="btn-g mini" title="Dividir a quantidade em dois lotes" onclick="mesaDividir(${l.tempId})">⑃ dividir</button>
        <button type="button" class="btn-g mini" title="Duplicar este lote" onclick="mesaDuplicar(${l.tempId})">⧉ duplicar</button>
        <button type="button" class="btn-g mini danger" title="Remover este lote do planejamento" onclick="mesaRemoverLinha(${l.tempId})">🗑</button>
      </div>
    </div>
    <div class="mesa-lote-comps">${compsHtml}</div>
  </div>`;
}
function mesaLoteExistenteHtml(lote){
  const maxOrdem = Math.max(...ESTAGIOS.map(e=>e.ordem), 0);
  const comps = COMPONENTES.filter(c=>c.lote_id===lote.id);
  const completo = comps.length>0 && comps.every(c=>ordemAtual(c.id)>=maxOrdem);
  const compsLbl = comps.map(c=>{
    const u = ultimoDoComponente(c.id);
    return POS_LABEL[c.posicao]+": "+(u?escHtml(u.estagio_descricao):"Aguardando");
  }).join(" · ");
  const abrirPrimeiro = comps.length ? `fecharMesa();abrirComponente(${comps[0].id})` : "";
  return `<div class="mesa-existente-row${completo?' ok':''}" ${abrirPrimeiro?`onclick="${abrirPrimeiro}"`:''}>
    <span class="mesa-existente-num">Lote ${lote.lote_numero}</span>
    <span class="mesa-qtd-suf">${lote.quantidade} pç</span>
    <span class="mesa-existente-status">${compsLbl||"sem componentes"}</span>
    ${completo?'<span class="mesa-existente-badge">✓ Pronto</span>':''}
  </div>`;
}

function renderMesa(){
  if(!_mesaItem) return;
  const item = _mesaItem;
  const lotesExistentes = LOTES.filter(l=>l.item_id===item.id).sort((a,b)=>a.lote_numero-b.lote_numero);
  document.getElementById("mesaTitle").textContent = "Planejamento — "+item.codigo_peca;
  document.getElementById("mesaSub").textContent = "Pedido: "+(item.pedido||"—")+" · OS: "+(item.os||"—")+" · Qtd total: "+(item.quantidade||"—")+" pç";

  const total = parseInt(item.quantidade,10)||0;
  const alocado = mesaAlocado();
  const pct = total>0 ? Math.min(100, alocado/total*100) : 0;

  const estruturaHtml = `<div class="mesa-sec">
    <div class="sp-l">Estrutura da peça</div>
    <div class="mesa-chips">
      <button type="button" class="mesa-chip${_mesaEstrutura.nucleo==='metal_duro'?' on':''}" onclick="mesaSetNucleo('metal_duro')">Núcleo: Metal Duro</button>
      <button type="button" class="mesa-chip${_mesaEstrutura.nucleo==='aco'?' on':''}" onclick="mesaSetNucleo('aco')">Núcleo: Aço</button>
      <button type="button" class="mesa-chip${_mesaEstrutura.carcaca?' on':''}" onclick="mesaToggle('carcaca')">+ Carcaça de Aço</button>
      <button type="button" class="mesa-chip${_mesaEstrutura.luva?' on':''}" onclick="mesaToggle('luva')">+ Luva (Aço)</button>
    </div>
  </div>`;

  const allocHtml = `<div class="mesa-sec">
    <div class="mesa-alloc-track"><div class="mesa-alloc-fill${alocado>total?' over':''}" id="mesaAllocFill" style="width:${pct}%"></div></div>
    <div class="mesa-alloc-lbl" id="mesaAllocLbl">${alocado} de ${total} pç alocada${alocado>total?' — ⚠ passou do total':''}</div>
  </div>`;

  const linhasHtml = !_mesaEstrutura.nucleo
    ? `<div class="mesa-hint">Escolha o material do núcleo acima para começar a planejar os lotes.</div>`
    : (_mesaLinhas.length ? _mesaLinhas.map((l,i)=>mesaLinhaHtml(l,i)).join("") : `<div class="mesa-hint">Nenhum lote no planejamento ainda — clique em "+ nova linha".</div>`);

  const existentesHtml = lotesExistentes.length ? `<div class="mesa-sec">
    <div class="sp-l">Lotes já criados (${lotesExistentes.length})</div>
    <div class="mesa-existentes">${lotesExistentes.map(l=>mesaLoteExistenteHtml(l)).join("")}</div>
  </div>` : "";

  const concluirMudou = _mesaConcluirChecked !== !!item.plano_separacao_concluido;
  const podeSalvar = (_mesaEstrutura.nucleo && _mesaLinhas.length) || concluirMudou;
  const btnLabel = _mesaLinhas.length ? "+ Criar "+_mesaLinhas.length+" lote(s)" : "Salvar planejamento";

  document.getElementById("mesaBody").innerHTML = `
    ${estruturaHtml}
    ${allocHtml}
    <div class="mesa-sec">
      <div class="mesa-sec-hdr"><div class="sp-l">Novos lotes a planejar</div>
        <button type="button" class="btn-g mini" onclick="mesaAdicionarLinha()" ${_mesaEstrutura.nucleo?'':'disabled'}>+ nova linha</button>
      </div>
      <div class="mesa-linhas">${linhasHtml}</div>
    </div>
    ${existentesHtml}
    <div class="mesa-footer">
      <label class="chk-row"><input type="checkbox" id="mesaConcluirChk" ${_mesaConcluirChecked?'checked':''} onchange="_mesaConcluirChecked=this.checked;mesaAtualizarBotaoSalvar()"> Marcar planejamento deste item como concluído</label>
      <button type="button" class="btn-g btn-acc" id="mesaSalvarBtn" onclick="mesaSalvar()" ${podeSalvar?'':'disabled'}>${btnLabel}</button>
    </div>
  `;
}

// habilita/desabilita o botão sem re-renderizar a Mesa inteira (o clique no checkbox não pode perder o rascunho digitado)
function mesaAtualizarBotaoSalvar(){
  const btn = document.getElementById("mesaSalvarBtn");
  if(!btn || !_mesaItem) return;
  const concluirMudou = _mesaConcluirChecked !== !!_mesaItem.plano_separacao_concluido;
  btn.disabled = !((_mesaEstrutura.nucleo && _mesaLinhas.length) || concluirMudou);
}

async function mesaSalvar(){
  if(!_mesaItem) return;
  const concluirMudou = _mesaConcluirChecked !== !!_mesaItem.plano_separacao_concluido;
  if(!_mesaLinhas.length && !concluirMudou){ toast("Nada para salvar", "erro"); return; }
  for(const l of _mesaLinhas){
    const qtd = parseInt(l.quantidade,10);
    if(!qtd || qtd<=0){ toast("Informe uma quantidade válida em todos os lotes", "erro"); return; }
    if(!l.comp.nucleo){ toast("Cada lote precisa ter um núcleo definido", "erro"); return; }
  }
  if(_mesaLinhas.length){
    const total = parseInt(_mesaItem.quantidade,10)||0;
    const alocado = mesaAlocado();
    if(alocado!==total){
      const msg = alocado>total
        ? `A soma dos lotes (${alocado} pç) passa da quantidade do item (${total} pç). Salvar assim mesmo?`
        : `A soma dos lotes (${alocado} pç) é menor que a quantidade do item (${total} pç) — ${total-alocado} pç ainda sem lote. Salvar assim mesmo?`;
      if(!confirm(msg)) return;
    }
  }

  const itemId = _mesaItem.id;
  let nLotesExistentes = LOTES.filter(l=>l.item_id===itemId).length;
  try{
    for(const l of _mesaLinhas){
      nLotesExistentes++;
      const novoLote = await supaWrite("/rest/v1/material_lotes","POST",{
        item_id: itemId, lote_numero: nLotesExistentes, quantidade: parseInt(l.quantidade,10),
        observacao: (l.observacao||"").trim() || null
      });
      const lote = Array.isArray(novoLote)?novoLote[0]:novoLote;
      LOTES.unshift(lote);

      const posicoes = Object.keys(l.comp);
      const compsPayload = posicoes.map(p=>({
        lote_id: lote.id, posicao: p,
        tipo_material: p==="nucleo" ? _mesaEstrutura.nucleo : "aco",
        entrada_prevista_ordem: (l.comp[p].fato>0) ? null : (l.comp[p].intencao || null)
      }));
      const novosComps = await supaWrite("/rest/v1/material_lote_componentes","POST",compsPayload);
      const rows = Array.isArray(novosComps)?novosComps:[novosComps];
      rows.forEach(r=>{ if(r) COMPONENTES.push(r); });

      for(const r of rows){
        const fato = l.comp[r.posicao] ? l.comp[r.posicao].fato : 0;
        if(fato>0){
          const col = ESTAGIOS.find(e=>e.ordem===fato);
          if(col) await registrarEvento(r, col);
        }
      }
    }

    if(concluirMudou){
      await supaWrite(`/rest/v1/itens?id=eq.${itemId}`,"PATCH",{plano_separacao_concluido:_mesaConcluirChecked},"return=minimal");
      _mesaItem.plano_separacao_concluido = _mesaConcluirChecked;
      const itemRef = ITENS_CAD.find(i=>i.id===itemId);
      if(itemRef) itemRef.plano_separacao_concluido = _mesaConcluirChecked;
    }

    renderBoard();
    toast(_mesaLinhas.length ? (_mesaLinhas.length>1 ? _mesaLinhas.length+" lotes criados" : "Lote criado") : "Planejamento atualizado");
    fecharMesa();
  }catch(e){
    toast(e.message.includes("duplicate") ? "Conflito ao salvar — recarregue a página e tente de novo" : "Erro ao criar: "+e.message, "erro");
  }
}

// ---- DETALHE DO COMPONENTE (histórico, leitura) ----
async function abrirComponente(compId){
  if(Date.now() - _dragEndedAt < 200) return; // evita abrir o painel logo após soltar o arraste
  const comp = COMPONENTES.find(c=>c.id===compId);
  if(!comp) return;
  const lote = loteDoComponente(comp);
  const item = lote ? itemDoLote(lote) : null;
  document.getElementById("spTitle").textContent = (item?item.codigo_peca:"Componente") + " — " + POS_LABEL[comp.posicao];
  document.getElementById("spSub").textContent = (item?("Pedido: "+(item.pedido||"—")+" · OS: "+(item.os||"—")+" · "):"") + MATERIAL_LABEL[comp.tipo_material] + " · lote "+(lote?lote.lote_numero:"—");

  const historico = await supaFetch(`/rest/v1/material_eventos?select=estagio_descricao,data_evento&componente_id=eq.${compId}&order=data_evento.desc,id.desc&limit=30`);
  const histHtml = Array.isArray(historico) && historico.length
    ? historico.map(h=>`<div class="mat-hist-item"><span>→ ${escHtml(h.estagio_descricao)}</span><span>${fmtDataHora(h.data_evento)}</span></div>`).join("")
    : `<div class="mat-hist-item" style="opacity:.6">ainda em Aguardando — nenhum evento</div>`;

  const outrosComps = lote ? COMPONENTES.filter(c=>c.lote_id===lote.id && c.id!==compId) : [];
  const outrosHtml = outrosComps.length ? `<div class="sp-f"><span class="sp-l">Outras peças do mesmo lote</span>` +
    outrosComps.map(c=>{
      const u = ultimoDoComponente(c.id);
      return `<div class="mat-hist-item"><span>${POS_LABEL[c.posicao]} (${MATERIAL_LABEL[c.tipo_material]})</span><span>${u?escHtml(u.estagio_descricao):"Aguardando"}</span></div>`;
    }).join("") + `</div>` : "";

  const resumoItem = item ? materialResumoItem(item.id, {lotes:LOTES, componentes:COMPONENTES, ultimos:ULTIMOS, estagios:ESTAGIOS}) : null;
  const outrosLotesHtml = resumoItem && resumoItem.total>1 ? `<div class="sp-f"><span class="sp-l">Outros lotes deste item</span>` +
    resumoItem.detalhe.filter(d=>!lote || d.numero!==lote.lote_numero).map(d=>
      `<div class="mat-hist-item"><span>Lote ${d.numero}</span><span>${d.completo?"✓ Pronto":"em andamento"}</span></div>`
    ).join("") + `</div>` : "";

  const excluirLoteBtn = (lote && outrosComps.length)
    ? `<button class="btn-g" style="color:var(--danger);border-color:var(--danger)" onclick="excluirLoteInteiro(${lote.id})">🗑 Excluir lote inteiro (${outrosComps.length+1} cartões)</button>` : "";
  const adicionarHtml = lote ? renderAdicionarComponente(lote.id) : "";
  const moverHtml = botoesMoverHtml(comp);

  document.getElementById("spBody").innerHTML = `
    ${moverHtml}
    <div class="comp-block"><div class="sp-l" style="margin-bottom:6px">Histórico</div><div class="mat-hist">${histHtml}</div></div>
    ${outrosHtml}
    ${outrosLotesHtml}
    ${adicionarHtml}
    <button class="btn-g" style="color:var(--danger);border-color:var(--danger)" onclick="excluirComponente(${compId})">🗑 Excluir esse cartão</button>
    ${excluirLoteBtn}
  `;
  abrirPainel();
}

// botões "mover para" no painel — alternativa ao arrastar (tablet/touch não dispara drag-and-drop HTML5)
function botoesMoverHtml(comp){
  const atual = ordemAtual(comp.id);
  const opts = colunas().filter(c=>colunaAplica(c, comp.tipo_material) && c.ordem!==atual);
  if(!opts.length) return "";
  return `<div class="comp-block"><div class="sp-l" style="margin-bottom:8px">Mover para</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px">
      ${opts.map(c=>`<button class="btn-g" onclick="moverComponente(${comp.id},${c.id})">${escHtml(c.ordem===0?"Aguardando":c.descricao)}</button>`).join("")}
    </div>
  </div>`;
}
async function moverComponente(compId, estagioId){
  const comp = COMPONENTES.find(c=>c.id===compId);
  const col = ESTAGIOS.find(e=>e.id===estagioId);
  if(!comp || !col) return;
  await registrarEvento(comp, col);
  toast("Movido para "+col.descricao);
  abrirComponente(compId);
}

// posições (núcleo/carcaça/luva) que esse lote ainda não tem cartão
function posicoesFaltantes(loteId){
  const existentes = new Set(COMPONENTES.filter(c=>c.lote_id===loteId).map(c=>c.posicao));
  return ["nucleo","carcaca","luva"].filter(p=>!existentes.has(p));
}

// bloco "+ adicionar componente" — conserta lote que ficou sem núcleo/carcaça/luva (ex.: excluído por engano)
function renderAdicionarComponente(loteId){
  const faltantes = posicoesFaltantes(loteId);
  if(!faltantes.length) return "";
  const blocos = faltantes.map(pos=>{
    const label = POS_LABEL[pos];
    const tipoSelect = pos==="nucleo"
      ? `<select class="sp-inp" id="addTipo_${loteId}_${pos}" style="width:180px;margin-bottom:6px" onchange="atualizarSituacaoAdd(${loteId},'${pos}')">
          <option value="">Material — selecione</option>
          <option value="metal_duro">Metal Duro</option>
          <option value="aco">Aço</option>
        </select>` : "";
    const situacaoOpts = pos==="nucleo" ? `<option value="0">Aguardando (nada feito ainda)</option>` : opcoesSituacaoHtml("aco");
    return `<div style="margin-bottom:10px">
      <div class="sp-l" style="margin-bottom:5px">+ ${label}${pos!=="nucleo"?" (Aço)":""}</div>
      ${tipoSelect}
      <select class="sp-inp" id="addSit_${loteId}_${pos}" style="width:220px;margin-bottom:6px">${situacaoOpts}</select>
      <button class="btn-g" onclick="salvarComponenteAdicional(${loteId},'${pos}')">+ Adicionar ${label}</button>
    </div>`;
  }).join("");
  return `<div class="comp-block"><div class="sp-l" style="margin-bottom:8px">Adicionar componente faltante</div>${blocos}</div>`;
}

// atualiza o select de "situação atual" quando o material do núcleo (na seção de adicionar) muda
function atualizarSituacaoAdd(loteId, posicao){
  const tipo = document.getElementById(`addTipo_${loteId}_${posicao}`).value;
  document.getElementById(`addSit_${loteId}_${posicao}`).innerHTML = tipo
    ? opcoesSituacaoHtml(tipo) : `<option value="0">Aguardando (nada feito ainda)</option>`;
}

async function salvarComponenteAdicional(loteId, posicao){
  const tipoMaterial = posicao==="nucleo" ? document.getElementById(`addTipo_${loteId}_${posicao}`).value : "aco";
  if(posicao==="nucleo" && !tipoMaterial){ toast("Selecione o material do núcleo", "erro"); return; }
  const situacao = parseInt(document.getElementById(`addSit_${loteId}_${posicao}`).value,10) || 0;
  try{
    const novo = await supaWrite("/rest/v1/material_lote_componentes","POST",{ lote_id: loteId, posicao, tipo_material: tipoMaterial });
    const row = Array.isArray(novo)?novo[0]:novo;
    if(row) COMPONENTES.push(row);
    if(situacao > 0 && row){
      const col = ESTAGIOS.find(e=>e.ordem===situacao);
      if(col) await registrarEvento(row, col);
    }
    renderBoard();
    toast("Componente adicionado");
    if(row) abrirComponente(row.id); else fecharPainel();
  }catch(e){ toast(e.message.includes("duplicate") ? "Esse lote já tem esse componente" : "Erro ao adicionar: "+e.message, "erro"); }
}

// exclui o lote inteiro (todos os componentes de uma vez) — cascade apaga componentes+eventos junto
async function excluirLoteInteiro(loteId){
  const lote = LOTES.find(l=>l.id===loteId);
  if(!lote) return;
  const item = itemDoLote(lote);
  const comps = COMPONENTES.filter(c=>c.lote_id===loteId);
  const posicoes = comps.map(c=>POS_LABEL[c.posicao]).join(" + ");
  const label = (item?item.codigo_peca:"item") + " — lote " + lote.lote_numero;
  if(!confirm(`Excluir o lote inteiro "${label}" (${posicoes})? Isso apaga os ${comps.length} cartões e todo o histórico deles.`)) return;
  try{
    await supaWrite(`/rest/v1/material_lotes?id=eq.${loteId}`,"DELETE",undefined,"return=minimal");
    const compIds = comps.map(c=>c.id);
    COMPONENTES = COMPONENTES.filter(c=>c.lote_id!==loteId);
    ULTIMOS = ULTIMOS.filter(u=>!compIds.includes(u.componente_id));
    LOTES = LOTES.filter(l=>l.id!==loteId);
    fecharPainel();
    renderBoard();
    toast("Lote excluído");
  }catch(e){ toast("Erro ao excluir: "+e.message, "erro"); }
}

// exclui um componente (cartão) — se era o único do lote, exclui o lote junto (evita lote "fantasma" vazio)
async function excluirComponente(compId){
  const comp = COMPONENTES.find(c=>c.id===compId);
  if(!comp) return;
  const lote = loteDoComponente(comp);
  const item = lote ? itemDoLote(lote) : null;
  const label = (item?item.codigo_peca:"componente") + " — " + POS_LABEL[comp.posicao];
  const irmaosRestantes = lote ? COMPONENTES.filter(c=>c.lote_id===lote.id && c.id!==compId) : [];
  let msg = `Excluir o cartão "${label}"? O histórico dele também será apagado.`;
  if(comp.posicao==="nucleo" && irmaosRestantes.length){
    const outrosNomes = irmaosRestantes.map(c=>POS_LABEL[c.posicao]).join(" e ");
    msg = `⚠ Este lote vai ficar SEM NÚCLEO registrado (continua com ${outrosNomes}). Toda peça normalmente tem um núcleo — se foi engano no cadastro, considere excluir o lote inteiro em vez de só o núcleo. Excluir mesmo assim o cartão "${label}"?`;
  }
  if(!confirm(msg)) return;
  try{
    await supaWrite(`/rest/v1/material_lote_componentes?id=eq.${compId}`,"DELETE",undefined,"return=minimal");
    COMPONENTES = COMPONENTES.filter(c=>c.id!==compId);
    ULTIMOS = ULTIMOS.filter(u=>u.componente_id!==compId);
    const irmaos = lote ? COMPONENTES.filter(c=>c.lote_id===lote.id) : [];
    if(lote && !irmaos.length){
      await supaWrite(`/rest/v1/material_lotes?id=eq.${lote.id}`,"DELETE",undefined,"return=minimal");
      LOTES = LOTES.filter(l=>l.id!==lote.id);
    }
    fecharPainel();
    renderBoard();
    toast("Cartão excluído");
  }catch(e){ toast("Erro ao excluir: "+e.message, "erro"); }
}

function fmtDataHora(v){
  if(!v) return "—";
  const d = new Date(v);
  return isNaN(d) ? "—" : d.toLocaleDateString("pt-BR")+" "+d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
}

// ---- PAINEL ----
function abrirPainel(){
  document.getElementById("overlay").classList.add("open");
  document.getElementById("sidePanel").classList.add("open");
}
function fecharPainel(){
  document.getElementById("overlay").classList.remove("open");
  document.getElementById("sidePanel").classList.remove("open");
}

// ---- INIT ----
async function init(){
  setSync("carregando...");
  _tvMode = new URLSearchParams(location.search).get("tv")==="1";
  aplicarTvMode();
  const [itensCad, estagios, lotes, componentes, ultimos] = await Promise.all([
    supaFetch("/rest/v1/itens?select=*&order=created_at.desc&limit=2000"),
    supaFetch("/rest/v1/material_estagios?select=*&ativo=eq.true&order=ordem&limit=20"),
    supaFetch("/rest/v1/material_lotes?select=*&order=created_at.desc&limit=1000"),
    supaFetch("/rest/v1/material_lote_componentes?select=*&limit=2000"),
    supaFetch("/rest/v1/material_ultimo_evento?select=*&limit=5000")
  ]);
  ITENS_CAD = Array.isArray(itensCad) ? itensCad : [];
  ESTAGIOS = Array.isArray(estagios) ? estagios : [];
  LOTES = Array.isArray(lotes) ? lotes : [];
  COMPONENTES = Array.isArray(componentes) ? componentes : [];
  ULTIMOS = Array.isArray(ultimos) ? ultimos : [];
  renderBoard();
  setSync("atualizado " + new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}));
}
init();

// fallback: sem realtime nesta página (PCP é o único ator) — recarrega itens/lotes/componentes a cada 60s,
// pra pegar item novo cadastrado em outra aba/pessoa sem precisar de F5. ESTAGIOS não muda, não recarrega.
async function atualizarAuto(){
  try{
    const [itensCad, lotes, componentes, ultimos] = await Promise.all([
      supaFetch("/rest/v1/itens?select=*&order=created_at.desc&limit=2000"),
      supaFetch("/rest/v1/material_lotes?select=*&order=created_at.desc&limit=1000"),
      supaFetch("/rest/v1/material_lote_componentes?select=*&limit=2000"),
      supaFetch("/rest/v1/material_ultimo_evento?select=*&limit=5000")
    ]);
    if(Array.isArray(itensCad)) ITENS_CAD = itensCad;
    if(Array.isArray(lotes)) LOTES = lotes;
    if(Array.isArray(componentes)) COMPONENTES = componentes;
    if(Array.isArray(ultimos)) ULTIMOS = ultimos;
    renderBoard();
    setSync("atualizado " + new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}));
  }catch(e){ /* falha silenciosa — tenta de novo no próximo ciclo */ }
}
setInterval(atualizarAuto, 60000);
</script>
