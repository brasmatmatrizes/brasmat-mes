<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRASMAT MES — Posição</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0F1117;--bg2:#181C27;--bg3:#1F2433;--border:#2A3045;--border2:#3A4560;--text:#E8ECF5;--text2:#C4CBDA;--text3:#8E9AB0;--accent:#3B7FFF;--ok:#2DBF7E;--warn:#F5A623;--danger:#F04545;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans)}
.topbar{height:56px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;gap:12px}
.brand{display:flex;align-items:center;gap:10px}.bm{width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:500;color:#fff}
.bn{font-size:14px;font-weight:500;letter-spacing:0.04em}.bs{font-size:11px;color:var(--text3);font-family:var(--mono)}
.nav{display:flex;gap:4px}
.nb{font-size:12px;padding:6px 12px;border-radius:6px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-family:var(--sans);transition:all 0.15s;white-space:nowrap}
.nb:hover{background:var(--bg3);color:var(--text)}.nb.active{background:var(--accent);color:#fff}
.tr-right{display:flex;align-items:center;gap:8px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--ok);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.sync-lbl{font-size:11px;color:var(--text2);font-family:var(--mono)}
.btn-sm{background:transparent;border:1px solid var(--border);border-radius:6px;padding:3px 10px;font-size:11px;color:var(--text3);cursor:pointer;font-family:var(--mono)}
.btn-sm:hover{border-color:var(--border2);color:var(--text2)}
.main{display:grid;grid-template-columns:280px 1fr;height:calc(100vh - 56px);overflow:hidden}
.sidebar{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb{padding:14px}.sb+.sb{border-top:1px solid var(--border)}
.lbl{font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--text2);font-family:var(--mono);margin-bottom:10px}
.si-wrap{position:relative}
.si-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 12px 9px 32px;font-size:13px;color:var(--text);outline:none;transition:border-color 0.15s}
.si-input:focus{border-color:var(--accent)}.si-input::placeholder{color:var(--text3)}
.si-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.sr{margin-top:8px;display:flex;flex-direction:column;gap:4px;max-height:190px;overflow-y:auto}
.rc{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 11px;cursor:pointer;transition:border-color 0.15s}
.rc:hover{border-color:var(--accent)}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.stat{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.sv{font-size:20px;font-weight:500;font-family:var(--mono);line-height:1}.sl{font-size:10px;color:var(--text2);margin-top:3px}
.sv.ok{color:var(--ok)}.sv.warn{color:var(--warn)}.sv.danger{color:var(--danger)}.sv.accent{color:var(--accent)}
.proc-list{display:flex;flex-direction:column;gap:2px;overflow-y:auto;flex:1}
.pr{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;cursor:pointer;transition:background 0.1s}
.pr:hover{background:var(--bg3)}.pn{font-size:11px;color:var(--text2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pc{font-size:11px;font-family:var(--mono);color:var(--text);background:var(--bg);padding:1px 7px;border-radius:10px;min-width:24px;text-align:center}
.pbw{width:46px;height:3px;background:var(--bg);border-radius:2px;overflow:hidden}.pb{height:100%;border-radius:2px}
.content{overflow-y:auto;padding:16px 20px}
.chdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.ctitle{font-size:16px;font-weight:500;color:var(--text)}.csub{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:2px}
.frow{display:flex;gap:6px;flex-wrap:wrap}
.fsel{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:12px;color:var(--text2);outline:none;cursor:pointer}
.fsel:focus{border-color:var(--accent)}
.btn-g{background:transparent;border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-size:12px;color:var(--text2);cursor:pointer}
.btn-g:hover{border-color:var(--border2);color:var(--text)}
.tabs{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.tab{font-size:11px;padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;white-space:nowrap}
.tab:hover{border-color:var(--border2);color:var(--text)}
.tab.active{border-color:transparent;color:#fff}
.tab-todas.active{background:var(--accent)}.tab-em_producao.active{background:#3B7FFF}
.tab-aguardando.active{background:#F5A623}.tab-em_estoque.active{background:#2DBF7E}
.tab-aprovada.active{background:#2DBF7E}.tab-liberada.active{background:#6E7A92}
.tw{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.thead{display:grid;grid-template-columns:120px 155px 140px 155px 155px 100px 75px;border-bottom:1px solid var(--border);padding:0 14px}
.th{font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--text2);font-family:var(--mono);padding:8px 6px}
.tbody{display:flex;flex-direction:column;max-height:calc(100vh - 280px);overflow-y:auto}
.tr{display:grid;grid-template-columns:120px 155px 140px 155px 155px 100px 75px;padding:0 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.1s}
.tr:last-child{border-bottom:none}.tr:hover{background:var(--bg3)}
.td{font-size:12px;color:var(--text2);padding:9px 6px;display:flex;align-items:center;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.chip{font-size:10px;font-family:var(--mono);padding:2px 7px;border-radius:10px;white-space:nowrap;font-weight:500}
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--text3);font-family:var(--mono);font-size:12px;gap:10px}
.tl-item{position:relative;margin-bottom:12px}.tl-item:last-child{margin-bottom:0}
.tl-dot{position:absolute;left:-28px;top:4px;width:13px;height:13px;border-radius:50%;border:2px solid var(--bg2)}
.tl-dot.entrada{background:var(--accent)}.tl-dot.saida{background:var(--ok)}.tl-dot.atual{background:var(--warn);box-shadow:0 0 0 3px rgba(245,166,35,0.2)}
.tl-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.tl-card.atual{border-color:rgba(245,166,35,0.4)}
.tl-top{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:5px}
.tl-proc{font-size:12px;font-weight:500;color:var(--text)}
.tl-evt{font-size:10px;padding:1px 7px;border-radius:8px}
.evt-entrada{background:rgba(59,127,255,0.12);color:var(--accent)}
.evt-saida{background:rgba(45,191,126,0.1);color:var(--ok)}
.tl-atual-tag{font-size:10px;padding:1px 7px;border-radius:8px;background:rgba(245,166,35,0.12);color:var(--warn)}
.tl-sub{font-size:11px;color:var(--text2);margin-bottom:6px}
.tl-foot{display:flex;gap:12px;flex-wrap:wrap}.tl-m{font-size:11px;color:var(--text3);font-family:var(--mono)}
.timeline{list-style:none;position:relative;padding-left:28px}
.timeline::before{content:"";position:absolute;left:9px;top:0;bottom:0;width:1px;background:var(--border)}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* DETALHE */
.det-panel{display:none;position:fixed;right:0;top:56px;bottom:0;width:460px;background:var(--bg2);border-left:1px solid var(--border);z-index:100;overflow-y:auto;animation:si 0.18s ease}
.det-panel.open{display:block}
@keyframes si{from{transform:translateX(30px);opacity:0}to{transform:none;opacity:1}}
.det-hdr{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;position:sticky;top:0;background:var(--bg2);z-index:1}
.det-close{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:12px;color:var(--text2);cursor:pointer}
.det-body{padding:16px 20px}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.mb{background:var(--bg3);border-radius:8px;padding:10px 12px}.ml{font-size:10px;color:var(--text3);font-family:var(--mono);margin-bottom:3px;text-transform:uppercase;letter-spacing:0.07em}.mv{font-size:13px;font-weight:500;color:var(--text)}
.pos-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:12px}
.tl-lbl{font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);font-family:var(--mono);margin-bottom:12px}
.timeline{list-style:none;position:relative;padding-left:28px}
.timeline::before{content:"";position:absolute;left:9px;top:0;bottom:0;width:1px;background:var(--border)}
.tl-item{position:relative;margin-bottom:12px}.tl-item:last-child{margin-bottom:0}
.tl-dot{position:absolute;left:-28px;top:4px;width:13px;height:13px;border-radius:50%;border:2px solid var(--bg2)}
.tl-dot.entrada{background:var(--accent)}.tl-dot.saida{background:var(--ok)}.tl-dot.atual{background:var(--warn);box-shadow:0 0 0 3px rgba(245,166,35,0.2)}
.tl-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.tl-card.atual{border-color:rgba(245,166,35,0.4)}
.tl-top{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:5px}
.tl-proc{font-size:12px;font-weight:500;color:var(--text)}
.tl-evt{font-size:10px;padding:1px 7px;border-radius:8px}
.ent{background:rgba(59,127,255,0.12);color:var(--accent)}.sai{background:rgba(45,191,126,0.1);color:var(--ok)}
.tl-tag{font-size:10px;padding:1px 7px;border-radius:8px;background:rgba(245,166,35,0.12);color:var(--warn)}
.tl-ret{font-size:10px;padding:1px 7px;border-radius:8px;background:rgba(240,69,69,0.12);color:var(--danger)}
.tl-sub{font-size:11px;color:var(--text2);margin-bottom:6px}
.tl-foot{display:flex;gap:12px;flex-wrap:wrap}.tl-m{font-size:11px;color:var(--text3);font-family:var(--mono)}
.tl-obs{margin-top:6px;font-size:11px;color:var(--text3);border-top:1px solid var(--border);padding-top:6px;line-height:1.5}
</style>
</head>
<body>
<div style="display:grid;grid-template-rows:56px 1fr;height:100vh">
<div class="topbar">
  <div class="brand"><div class="bm">BM</div><div><div class="bn">BRASMAT MES</div><div class="bs">sistema de execução de manufatura</div></div></div>
  <div class="nav">
    <button class="nb active">Posição</button>
    <button class="nb" onclick="navTo('kanban.html')">Kanban</button>
    <button class="nb" onclick="navTo('paradas.html')">Peças paradas</button>
    <button class="nb" onclick="navTo('apontamentos.html')">Apontamentos</button>
    <button class="nb" onclick="navTo('operadores.html')">Performance</button>
    <button class="nb" onclick="navTo('prazos.html')">Prazos</button>
    <button class="nb" onclick="navTo('otd.html')">OTD</button>
  </div>
  <div class="tr-right">
    <button class="btn-sm" onclick="init()">↻ atualizar</button>
    <div class="sync-dot"></div>
    <span class="sync-lbl" id="slbl">carregando...</span>
  </div>
</div>
<div class="main">
  <div class="sidebar">
    <div class="sb">
      <div class="lbl">buscar peça</div>
      <div class="si-wrap"><span class="si-ico">⌕</span><input class="si-input" id="search" placeholder="Código ou pedido..." autocomplete="off"></div>
      <div class="sr" id="sr"></div>
    </div>
    <div class="sb">
      <div class="lbl">resumo</div>
      <div class="stats">
        <div class="stat"><div class="sv accent" id="s1">—</div><div class="sl">em produção</div></div>
        <div class="stat"><div class="sv ok" id="s2">—</div><div class="sl">em estoque</div></div>
        <div class="stat"><div class="sv danger" id="s3">—</div><div class="sl">críticas 6+ dias</div></div>
        <div class="stat"><div class="sv warn" id="s4">—</div><div class="sl">aguard. operador</div></div>
      </div>
    </div>
    <div class="sb" style="flex:1;overflow:hidden;display:flex;flex-direction:column">
      <div class="lbl">por processo</div>
      <div class="proc-list" id="pl"></div>
    </div>
  </div>
  <div class="content">
    <div class="chdr">
      <div><div class="ctitle">Posição atual da fábrica</div><div class="csub" id="csub">carregando...</div></div>
      <div class="frow">
        <select class="fsel" id="fp"><option value="">Todos os processos</option></select>
        <select class="fsel" id="fc"><option value="">Todos os clientes</option></select>
        <button class="btn-g" onclick="limpar()">Limpar</button>
      </div>
    </div>
    <div class="tabs" id="tabs"></div>
    <div id="area"><div class="loading"><div class="spinner"></div>carregando dados...</div></div>
  </div>
</div>
</div>
<!-- DETALHE -->
<div class="det-panel" id="dp">
  <div class="det-hdr"><div id="dt"></div><button class="det-close" onclick="fechar()">✕ fechar</button></div>
  <div class="det-body" id="db"></div>
</div>
<script src="status.js"></script>
<script>
let POS=[];
let fP="",fC="",fS="todas";

async function init(){
  document.getElementById("slbl").textContent="carregando...";
  POS = await buscarPosicao();
  popularFiltros(); renderTabs(); renderTabela(); renderProc(); renderStats();
  document.getElementById("slbl").textContent=`${POS.length} peças · ${new Date().toLocaleTimeString("pt-BR")}`;
}

function filtrados(){
  return POS.filter(r=>{
    const p=String(r.processo||"").trim().toUpperCase();
    const c=String(r.cliente||"").trim();
    const s=status(r).s;
    if(fP&&p!==fP) return false;
    if(fC&&c!==fC) return false;
    if(fS!=="todas"&&s!==fS) return false;
    return true;
  }).sort((a,b)=>diasDesde(b)-diasDesde(a));
}

function renderTabs(){
  const cnt={todas:0,em_producao:0,em_estoque:0,aguardando:0,liberada:0,aprovada:0};
  POS.forEach(r=>{cnt.todas++;const s=status(r).s;if(cnt[s]!==undefined)cnt[s]++;});
  const ts=[{k:"em_producao",l:"Em produção"},{k:"aguardando",l:"Aguard. operador"},{k:"em_estoque",l:"Em estoque"},{k:"aprovada",l:"Aprovadas"}];
  document.getElementById("tabs").innerHTML=ts.map(t=>`<button class="tab tab-${t.k}${fS===t.k?" active":""}" onclick="setTab('${t.k}')">${t.l} (${cnt[t.k]})</button>`).join("");
}
function setTab(s){fS=s;renderTabs();renderTabela();}

function renderTabela(){
  const pcs=filtrados();
  document.getElementById("csub").textContent=`${pcs.length} peça(s) · ${new Date().toLocaleTimeString("pt-BR")}`;
  if(!pcs.length){document.getElementById("area").innerHTML=`<div style="text-align:center;padding:60px;color:var(--text3);font-size:13px">Nenhuma peça encontrada.</div>`;return;}
  const rows=pcs.map(r=>{
    const st=status(r);const d=diasDesde(r);const dc=diasCls(d);
    return `<div class="tr" onclick="abrirDet('${esc(r.pedido)}','${esc(r.codigo_peca)}')">
      <div class="td" style="font-family:var(--mono);font-weight:500;color:var(--text)">${r.codigo_peca||"—"}</div>
      <div class="td" style="font-size:11px;color:var(--text)">${String(r.processo||"").trim()||"—"}</div>
      <div class="td" style="font-size:10px;color:var(--text2)">${getSubop(r)}</div>
      <div class="td" style="font-size:11px">${r.cliente||"—"}</div>
      <div class="td" style="font-size:11px">${r.operador||"—"}</div>
      <div class="td"><span class="chip" style="background:${st.cor}22;color:${st.cor}">${st.ico} ${st.label}</span></div>
      <div class="td"><span class="chip" style="background:rgba(${dc==="ok"?"45,191,126":dc==="warn"?"245,166,35":"240,69,69"},0.12);color:var(--${dc})">${diasStr(d)}</span></div>
    </div>`;
  }).join("");
  document.getElementById("area").innerHTML=`<div class="tw">
    <div class="thead"><div class="th">Código</div><div class="th">Processo</div><div class="th">Suboperação</div><div class="th">Cliente</div><div class="th">Operador</div><div class="th">Status</div><div class="th">Tempo</div></div>
    <div class="tbody">${rows}</div></div>`;
}

function renderStats(){
  document.getElementById("s1").textContent=POS.filter(r=>status(r).s==="em_producao").length;
  document.getElementById("s2").textContent=POS.filter(r=>["em_estoque","aprovada"].includes(status(r).s)).length;
  document.getElementById("s3").textContent=POS.filter(r=>diasDesde(r)>=6&&status(r).s==="em_producao").length;
  document.getElementById("s4").textContent=POS.filter(r=>status(r).s==="aguardando").length;
}

function renderProc(){
  const cnt={};
  POS.forEach(r=>{if(status(r).s!=="em_producao")return;const p=String(r.processo||"").trim().toUpperCase()||"SEM PROCESSO";cnt[p]=(cnt[p]||0)+1;});
  const max=Math.max(...Object.values(cnt),1);
  document.getElementById("pl").innerHTML=Object.entries(cnt).sort((a,b)=>b[1]-a[1]).map(([p,c])=>{
    const cor=COR[p]||"#6E7A92";
    return `<div class="pr" onclick="filtrarP('${p}')"><div style="width:7px;height:7px;border-radius:50%;background:${cor};flex-shrink:0"></div><span class="pn">${p}</span><div class="pbw"><div class="pb" style="width:${Math.round(c/max*100)}%;background:${cor}"></div></div><span class="pc">${c}</span></div>`;
  }).join("");
}

function popularFiltros(){
  const procs=[...new Set(POS.map(r=>String(r.processo||"").trim().toUpperCase()).filter(Boolean))].sort();
  const clis=[...new Set(POS.map(r=>String(r.cliente||"").trim()).filter(Boolean))].sort();
  document.getElementById("fp").innerHTML='<option value="">Todos os processos</option>'+procs.map(p=>`<option value="${p}">${p}</option>`).join("");
  document.getElementById("fc").innerHTML='<option value="">Todos os clientes</option>'+clis.map(c=>`<option>${c}</option>`).join("");
}

function filtrarP(p){fP=fP===p?"":p;document.getElementById("fp").value=fP;renderTabela();}
function limpar(){fP="";fC="";fS="todas";document.getElementById("fp").value="";document.getElementById("fc").value="";renderTabs();renderTabela();}

document.getElementById("search").addEventListener("input",function(){
  const q=this.value.trim().toUpperCase();
  const res=document.getElementById("sr");
  if(q.length<2){res.innerHTML="";return;}
  const found=POS.filter(r=>String(r.codigo_peca||"").toUpperCase().includes(q)||String(r.pedido||"").toUpperCase().includes(q)).slice(0,6);
  if(!found.length){res.innerHTML=`<div style="font-size:12px;color:var(--text3);padding:10px 0">Nenhuma peça encontrada</div>`;return;}
  res.innerHTML=found.map(r=>{const st=status(r);return `<div class="rc" onclick="abrirDet('${esc(r.pedido)}','${esc(r.codigo_peca)}')"><div style="font-size:13px;font-weight:500;color:var(--text);font-family:var(--mono)">${r.codigo_peca}</div><div style="font-size:11px;color:var(--text2);font-family:var(--mono);margin-top:1px">${r.pedido}</div><div style="font-size:11px;color:${st.cor};margin-top:3px">${st.ico} ${st.label}</div></div>`;}).join("");
});

async function abrirDet(pedido,codigo){
  document.getElementById("dp").classList.add("open");
  await abrirPainelDetalhe(pedido,codigo,"dp","dt","db");
}
function fechar(){document.getElementById("dp").classList.remove("open");}

async function abrirCentro(pedido,codigo){
  // Expande linha do tempo no centro da tela — igual buscar peça
  const area = document.getElementById("area");
  area.innerHTML = `<div class="loading"><div class="spinner"></div>carregando histórico...</div>`;
  document.getElementById("sr").innerHTML = "";
  document.getElementById("search").value = "";

  const eventos = await buscarHistorico(pedido, codigo);
  if(!eventos.length){ area.innerHTML=`<div style="text-align:center;padding:60px;color:var(--text3)">Nenhum evento encontrado.</div>`; return; }

  const ultimo = eventos[eventos.length-1];
  const st = status(ultimo);
  const prazoD = ultimo.prazo_entrega ? new Date(ultimo.prazo_entrega) : null;
  const prazoFmt = prazoD ? prazoD.toLocaleDateString("pt-BR") : "—";
  const prazoCor = prazoD&&prazoD<new Date() ? "var(--danger)" : "var(--text2)";
  const prazoOk = prazoD?(prazoD>new Date()?'<span style="color:var(--ok)">✓</span>':'<span style="color:var(--danger)">⚠</span>'):"";
  const ret = eventos.filter(r=>String(r.retrabalho||"").trim()).length;

  const tl = eventos.map((ev,i)=>{
    const isUlt=i===eventos.length-1;
    const evtS=String(ev.evento||"").trim().toUpperCase();
    const isEnt=evtS==="ENTRADA";
    const dot=isUlt&&isEnt?"atual":isEnt?"entrada":"saida";
    const sub=getSubop(ev);
    const prazoRef=eventos.find(e=>e.prazo_entrega&&String(e.prazo_entrega).trim());
    const prazoDate=prazoRef?new Date(prazoRef.prazo_entrega):null;
    const evDate=ev.data_evento?new Date(ev.data_evento):null;
    const dataVencida=prazoDate&&evDate&&evDate>prazoDate;
    const dataCor=dataVencida?"var(--danger)":"var(--text3)";
    const dataIco=dataVencida?"⚠":"📅";
    let dur="";
    if(!isEnt&&i>0){
      const ant=eventos[i-1];
      if(ant&&String(ant.evento||"").trim().toUpperCase()==="ENTRADA"){
        const ms=new Date(ev.data_evento)-new Date(ant.data_evento);
        if(ms>0){const h=Math.floor(ms/3600000);const d=Math.floor(h/24);dur=`<span style="font-size:10px;font-family:var(--mono);padding:2px 7px;border-radius:6px;background:var(--bg3);color:var(--text2)">${d>0?d+"d ":""}${h%24}h</span>`;}
      }
    }
    return `<li class="tl-item">
      <div class="tl-dot ${dot}"></div>
      <div class="tl-card${isUlt&&isEnt?" atual":""}">
        <div class="tl-top">
          <span class="tl-proc">${ev.processo||"—"}</span>
          <span class="tl-evt ${isEnt?"evt-entrada":"evt-saida"}">${evtS}</span>
          ${isUlt?`<span class="tl-atual-tag">${st.ico} ${st.label}</span>`:""}
          ${ev.retrabalho&&String(ev.retrabalho).trim()?`<span style="font-size:10px;padding:1px 6px;border-radius:8px;background:rgba(240,69,69,0.12);color:var(--danger)">retrabalho</span>`:""}
          ${dataVencida?`<span style="font-size:10px;padding:1px 7px;border-radius:8px;background:rgba(240,69,69,0.12);color:var(--danger)">fora do prazo</span>`:""}
        </div>
        <div class="tl-sub">${sub}</div>
        <div class="tl-foot">
          <span class="tl-m">👤 ${ev.operador||"—"}</span>
          <span style="font-size:11px;font-family:var(--mono);color:${dataCor}">${dataIco} ${ev.data_evento?new Date(ev.data_evento).toLocaleDateString("pt-BR")+" "+new Date(ev.data_evento).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}):"—"}</span>
          ${ev.sequencial_operacao?`<span class="tl-m">op. ${ev.sequencial_operacao}</span>`:""}
          ${dur}
        </div>
        ${ev.observacao&&String(ev.observacao).trim()?`<div style="margin-top:6px;font-size:11px;color:var(--text3);border-top:1px solid var(--border);padding-top:6px;line-height:1.5">${ev.observacao}</div>`:""}
      </div>
    </li>`;
  }).join("");

  area.innerHTML = `
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:20px">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:16px;flex-wrap:wrap">
        <div>
          <div style="font-size:18px;font-weight:500;color:var(--text);font-family:var(--mono)">${codigo}</div>
          <div style="font-size:13px;color:var(--text2);font-family:var(--mono);margin-top:2px">Pedido: ${pedido}</div>
        </div>
        <div style="display:flex;gap:20px;align-items:center;flex-wrap:wrap">
          <div style="text-align:center">
            <div style="font-size:10px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:2px">Prazo</div>
            <div style="font-size:13px;font-weight:500;color:${prazoCor};font-family:var(--mono)">${prazoFmt} ${prazoOk}</div>
          </div>
          <div style="text-align:center">
            <div style="font-size:10px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:2px">Cliente</div>
            <div style="font-size:13px;color:var(--text2)">${ultimo.cliente||"—"}</div>
          </div>
          <div style="text-align:center">
            <div style="font-size:10px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:2px">Eventos</div>
            <div style="font-size:13px;color:var(--text2);font-family:var(--mono)">${eventos.length}</div>
          </div>
          <div style="text-align:center">
            <div style="font-size:10px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:2px">Retrabalhos</div>
            <div style="font-size:13px;color:${ret>0?"var(--danger)":"var(--ok)"};font-family:var(--mono)">${ret}</div>
          </div>
          <span style="font-size:12px;padding:6px 14px;border-radius:20px;border:1px solid ${st.cor}44;background:${st.cor}22;color:${st.cor}">${st.ico} ${st.label}</span>
          <button onclick="render()" style="background:transparent;border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-size:12px;color:var(--text2);cursor:pointer">← voltar à lista</button>
        </div>
      </div>
      <div style="font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);font-family:var(--mono);margin-bottom:14px">linha do tempo</div>
      <ul class="timeline" style="max-height:calc(100vh - 340px);overflow-y:auto;padding-right:8px">${tl}</ul>
    </div>`;
}
function navTo(p){window.location.href=p;}
document.getElementById("fp").addEventListener("change",function(){fP=this.value;renderTabela();});
document.getElementById("fc").addEventListener("change",function(){fC=this.value;renderTabela();});
init();
</script>
</body>
</html>
